<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>調剤報酬点数表 別添３ 検索 ｜ 令和８年度調剤報酬改定</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@500;700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#F6F1E6;
    --paper-2:#EFE7D6;
    --ink:#232A2E;
    --ink-soft:#5B6266;
    --navy:#1F3A45;
    --navy-2:#2C5364;
    --pine:#3F6A50;
    --pine-light:#E4EEE3;
    --clay:#B5562F;
    --mark:#F6D06F;
    --mark-strong:#F0B93B;
    --line:#DDD2B8;
    --card:#FFFDF7;
    --shadow: 0 2px 10px rgba(35,42,46,0.08);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--paper);
    color:var(--ink);
    font-family:"Noto Sans JP", sans-serif;
    -webkit-font-smoothing:antialiased;
  }
  h1,h2,h3,.serif{font-family:"Noto Serif JP", serif;}

  /* ---------- Layout ---------- */
  .app{
    display:flex;
    min-height:100vh;
  }
  .tabs{
    width:64px;
    flex-shrink:0;
    background:var(--navy);
    display:flex;
    flex-direction:column;
    align-items:center;
    padding:20px 0;
    gap:6px;
    position:sticky;
    top:0;
    height:100vh;
    overflow-y:auto;
  }
  .tab-btn{
    writing-mode:vertical-rl;
    text-orientation:mixed;
    background:var(--navy-2);
    color:#EFE7D6;
    border:none;
    border-radius:6px 0 0 6px;
    padding:14px 8px;
    margin-right:-1px;
    cursor:pointer;
    font-family:"Noto Serif JP", serif;
    font-size:12.5px;
    letter-spacing:0.08em;
    line-height:1.6;
    transition:all .15s ease;
    width:46px;
    min-height:120px;
    display:flex;
    align-items:center;
    justify-content:center;
  }
  .tab-btn:hover{background:var(--pine); color:#fff;}
  .tab-btn.active{
    background:var(--paper);
    color:var(--navy);
    width:56px;
    box-shadow:var(--shadow);
    font-weight:700;
  }
  .tab-btn.all{margin-bottom:10px;}

  .main{
    flex:1;
    min-width:0;
    display:flex;
    flex-direction:column;
  }

  header.top{
    position:sticky;
    top:0;
    z-index:20;
    background:linear-gradient(180deg, var(--navy) 0%, var(--navy-2) 100%);
    color:#F6F1E6;
    padding:18px 28px 16px;
    box-shadow:0 3px 12px rgba(0,0,0,0.18);
  }
  .titlebar{
    display:flex;
    align-items:baseline;
    justify-content:space-between;
    flex-wrap:wrap;
    gap:8px 20px;
    margin-bottom:12px;
  }
  .titlebar h1{
    font-size:19px;
    margin:0;
    font-weight:700;
    letter-spacing:0.02em;
  }
  .titlebar .sub{
    font-size:12px;
    color:#C9D6D2;
    font-family:"Noto Sans JP",sans-serif;
  }
  .titlebar a{
    color:#CFE3D8;
    font-size:11.5px;
    text-decoration:none;
    border-bottom:1px dotted #7FA79A;
  }
  .titlebar a:hover{color:#fff;}

  .searchwrap{
    position:relative;
    max-width:720px;
  }
  #searchbox{
    width:100%;
    padding:13px 46px 13px 44px;
    border-radius:10px;
    border:none;
    font-size:16px;
    font-family:"Noto Sans JP",sans-serif;
    background:#FDFBF5;
    color:var(--ink);
    outline:none;
    box-shadow: inset 0 0 0 2px transparent;
  }
  #searchbox:focus{ box-shadow: inset 0 0 0 2px var(--mark-strong); }
  .searchicon{
    position:absolute;
    left:14px; top:50%; transform:translateY(-50%);
    color:var(--ink-soft);
    pointer-events:none;
  }
  .clearbtn{
    position:absolute;
    right:8px; top:50%; transform:translateY(-50%);
    background:none;border:none;cursor:pointer;
    color:var(--ink-soft);
    font-size:18px;
    padding:6px;
    display:none;
  }
  .searchmeta{
    margin-top:8px;
    font-size:12.5px;
    color:#C9D6D2;
    min-height:16px;
  }
  .searchmeta b{color:#fff;}

  /* ---------- Content ---------- */
  .content{
    flex:1;
    padding:24px 30px 80px;
    max-width:920px;
    width:100%;
    margin:0 auto;
  }

  .breadcrumbs{
    font-size:12px;
    color:var(--ink-soft);
    margin-bottom:6px;
  }

  .chapter-block{
    margin-bottom:34px;
  }
  .chapter-heading{
    font-size:13px;
    letter-spacing:.14em;
    color:var(--clay);
    font-family:"Noto Serif JP",serif;
    font-weight:700;
    border-bottom:2px solid var(--clay);
    display:inline-block;
    padding:0 2px 4px 0;
    margin:0 0 14px;
  }

  .kubun-group{
    background:var(--card);
    border:1px solid var(--line);
    border-radius:10px;
    margin-bottom:14px;
    box-shadow:var(--shadow);
    overflow:hidden;
  }
  .kubun-title{
    padding:13px 18px;
    background:var(--paper-2);
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:space-between;
    font-family:"Noto Serif JP",serif;
    font-weight:700;
    font-size:15px;
    color:var(--navy);
    user-select:none;
  }
  .kubun-title:hover{ background:#E8DFC9; }
  .kubun-title .chev{ transition:transform .15s ease; color:var(--pine); font-size:13px;}
  .kubun-title.open .chev{ transform:rotate(90deg); }

  .kubun-items{
    display:none;
    border-top:1px solid var(--line);
  }
  .kubun-items.open{ display:block; }

  .item{
    padding:14px 20px;
    border-bottom:1px solid #EEE5D0;
    cursor:pointer;
  }
  .item:last-child{border-bottom:none;}
  .item:hover{ background:#FBF6EA; }
  .item .label{
    font-weight:700;
    font-size:14px;
    color:var(--navy);
    margin-bottom:4px;
  }
  .item .snippet{
    font-size:13px;
    color:var(--ink-soft);
    line-height:1.7;
    white-space:pre-line;
    overflow-wrap:anywhere;
  }
  .item.expanded .snippet{
    color:var(--ink);
    font-size:14px;
    white-space:pre-wrap;
    overflow-wrap:anywhere;
  }
  mark{
    background:var(--mark);
    color:var(--ink);
    padding:0 2px;
    border-radius:2px;
  }
  mark.strong{ background:var(--mark-strong); }

  /* Search results */
  .results-header{
    font-size:13px;
    color:var(--ink-soft);
    margin-bottom:14px;
  }
  .result-card{
    background:var(--card);
    border:1px solid var(--line);
    border-left:5px solid var(--pine);
    border-radius:8px;
    padding:16px 18px;
    margin-bottom:12px;
    box-shadow:var(--shadow);
    cursor:pointer;
    transition:transform .1s ease;
  }
  .result-card:hover{ transform:translateY(-1px); border-left-color:var(--clay); }
  .result-crumb{
    font-size:11.5px;
    color:var(--pine);
    font-weight:700;
    letter-spacing:.03em;
    margin-bottom:6px;
  }
  .result-label{
    font-family:"Noto Serif JP",serif;
    font-weight:700;
    font-size:15.5px;
    color:var(--navy);
    margin-bottom:6px;
  }
  .result-snippet{
    font-size:13.5px;
    line-height:1.75;
    color:var(--ink-soft);
    white-space:pre-line;
    overflow-wrap:anywhere;
  }
  .result-snippet mark{ color:var(--ink); }

  .detail-card{
    background:var(--card);
    border:1px solid var(--line);
    border-radius:10px;
    padding:22px 24px;
    box-shadow:var(--shadow);
  }
  .back-btn{
    display:inline-flex;
    align-items:center;
    gap:6px;
    background:none;
    border:1px solid var(--line);
    color:var(--navy);
    font-family:"Noto Sans JP",sans-serif;
    font-size:13px;
    padding:8px 14px;
    border-radius:20px;
    cursor:pointer;
    margin-bottom:16px;
  }
  .back-btn:hover{ background:var(--paper-2); }
  .detail-crumb{
    font-size:12px;
    color:var(--pine);
    font-weight:700;
    margin-bottom:8px;
    letter-spacing:.02em;
  }
  .detail-label{
    font-family:"Noto Serif JP",serif;
    font-size:19px;
    font-weight:700;
    color:var(--navy);
    margin-bottom:14px;
    line-height:1.5;
  }
  .detail-body{
    font-size:15px;
    line-height:1.95;
    white-space:pre-wrap;
    overflow-wrap:anywhere;
    word-break:normal;
    color:var(--ink);
  }
  .detail-body mark{ padding:1px 3px; }

  .empty-note{
    text-align:center;
    color:var(--ink-soft);
    padding:60px 20px;
    font-size:14px;
    line-height:2;
  }
  .empty-note .big{
    font-family:"Noto Serif JP",serif;
    font-size:17px;
    color:var(--navy);
    display:block;
    margin-bottom:10px;
  }

  footer.note{
    text-align:center;
    font-size:11.5px;
    color:var(--ink-soft);
    padding:20px;
    border-top:1px solid var(--line);
  }

  @media (max-width:720px){
    .tabs{ width:44px; }
    .tab-btn{ font-size:11px; min-height:90px; width:32px; padding:10px 5px;}
    .tab-btn.active{ width:40px; }
    .content{ padding:16px 12px 60px; }
    header.top{ padding:14px 14px 12px; }
    .titlebar h1{ font-size:15.5px; }
    .titlebar .sub{ font-size:11px; }
    .detail-card{ padding:16px 14px; }
    .detail-label{ font-size:16.5px; }
    .detail-body{ font-size:14.5px; line-height:1.85; }
    .result-card{ padding:13px 14px; }
    .kubun-title{ padding:12px 14px; font-size:14px; }
    .item{ padding:12px 14px; }
    .chapter-heading{ font-size:12px; }
  }
</style>
</head>

<div class="app">
  <nav class="tabs" id="tabs"></nav>
  <div class="main">
    <header class="top">

    <main class="content" id="content"></main>
    <footer class="note">
      本アプリは令和８年度調剤報酬改定 別添３「調剤報酬点数表に関する事項」（厚生労働省）の内容をもとに作成した検索用ツールです。実務における最終確認は必ず原文でお願いします。
    </footer>
  </div>

剤師法第 26 条に規定する事項及び次回調剤予定日等の必要な事項を記入し、調剤録等を作成した後、リフィル処方箋を患者に返却すること。その際、必要な事項が記入されたリフィル処方箋の写しを調剤録とともに保管すること。なお、当該リフィル処方箋の総使用回数の調剤が終わった場合、調剤済処方箋として保管すること。", "label": "５. 保険薬局においてリフィル処方箋による調剤を行い、当該保険…"}, {"id": "s7", "category": "通則", "kubun": "＜通則＞", "title": "６ 「調剤する薬剤を減量した上で保険医療機関に情報提供」の欄にその旨の指示がある処方箋", "body": "６ 「調剤する薬剤を減量した上で保険医療機関に情報提供」の欄にその旨の指示がある処方箋を受け付けた場合は、調剤録又は薬剤服用歴の記録等（以下「薬剤服用歴等」という。）及び残薬の外形状態・保管状況その他の残薬の状況を確認した上で、処方箋に記載された医薬品について、用法及び用量の変更は行わずに投与日数等を減らす調剤（以下「減数調剤」という。）を、必要に応じて行うこと。当該指示に基づき減数調剤を行った場合は、保険薬剤師は、患者に対して次回受診時に処方医へ残薬の状況を報告することを促すとともに、手帳を用いて服薬管理指導を行う場合には当該手帳にその旨を記載すること。また、患者の残薬の状況、その理由及び実際に患者へ交付した薬剤の投与量、患者への説明内容等について、原則、翌営業日までに当該減数調剤に係る処方箋を発行した保険医療機関に情報提供すること。なお、残薬を確認した結果、減数調剤を行うに当たって、調剤する医薬品の調剤日数又は数量を「０」とすることはできず、必要な場合には従前のとおり、処方医への事前の照会を行うこと。", "label": "６. 「調剤する薬剤を減量した上で保険医療機関に情報提供」の欄…"}, {"id": "s8", "category": "通則", "kubun": "＜通則＞", "title": "７ 調剤基本料の「注５」の地域支援・医薬品供給対応体制加算及び「注８」に係る後発医薬品", "body": "７ 調剤基本料の「注５」の地域支援・医薬品供給対応体制加算及び「注８」に係る後発医薬品については、「「新指標の割合の算出に当たって対象となる後発医薬品」等について」（令和８年３月５日保医発 0305 第 12 号）を参照すること。また、調剤基本料の「注７」のバイオ後続品調剤体制加算については、「「診療報酬における加算等の算定対象等となるバイオ後続品」について」（令和８年３月５日保医発 0305 第 13 号）を参照すること。", "label": "７. 調剤基本料の「注５」の地域支援・医薬品供給対応体制加算及…"}, {"id": "s9", "category": "通則", "kubun": "＜通則＞", "title": "８ 保険薬局は、患者が当該保険薬局における業務内容及びその費用を理解できるよう、調剤報", "body": "８ 保険薬局は、患者が当該保険薬局における業務内容及びその費用を理解できるよう、調剤報酬点数表の一覧等について、薬剤を交付する窓口等、患者が指導等を受ける際に分かりやすい場所に掲示するとともに、患者の求めに応じて、その内容を説明すること。", "label": "８. 保険薬局は、患者が当該保険薬局における業務内容及びその費…"}, {"id": "s10", "category": "通則", "kubun": "＜通則＞", "title": "９ 算定回数が「週」単位又は「月」単位とされているものについては、特に定めのない限り、", "body": "９ 算定回数が「週」単位又は「月」単位とされているものについては、特に定めのない限り、それぞれ日曜日から土曜日までの１週間又は月の初日から月の末日までの１か月を単位として算定する。", "label": "９. 算定回数が「週」単位又は「月」単位とされているものについ…"}, {"id": "s11", "category": "通則", "kubun": "＜通則＞", "title": "10 署名又は記名・押印を要する文書については、自筆の署名（電子的な署名を含む。）がある", "body": "10 署名又は記名・押印を要する文書については、自筆の署名（電子的な署名を含む。）がある場合には印は不要である。", "label": "10. 署名又は記名・押印を要する文書については、自筆の署名（電…"}, {"id": "s12", "category": "通則", "kubun": "＜通則＞", "title": "11 文書による提供等をすることとされている個々の患者の薬剤服用歴等に関する情報を、電磁", "body": "11 文書による提供等をすることとされている個々の患者の薬剤服用歴等に関する情報を、電磁的方法によって、患者、他の保険医療機関、保険薬局、指定訪問看護事業者等に提供等する場合は、厚生労働省「医療情報システムの安全管理に関するガイドライン」を遵守し、安全な通信環境を確保するとともに、書面における署名又は記名・押印に代わり、本ガイドラインに定められた電子署名（厚生労働省の定める準拠性監査基準を満たす保健医療福祉分野 PKI 認証局の発行する電子証明書を用いた電子署名、認定認証事業者（電子署名及び認証業務に関する法律（平成 12 年法律第 102 号）第２条第３項に規定する特定認証業務を行う者をいう。）又は認証事業者（同条第２項に規定する認証業務を行う者（認定認証事業者を除く。）をいう。）の発行する電子証明書を用いた電子署名、電子署名等に係る地方公共団体情報システム機構の認証業務に関する法律（平成 14 年法律第 153 号）に基づき、平成 16 年１月 29 日から開始されている公的個人認証サービスを用いた電子署名等）を施すこと。", "label": "11. 文書による提供等をすることとされている個々の患者の薬剤服…"}, {"id": "s13", "category": "通則", "kubun": "＜通則＞", "title": "12 区分番号は、例えば「区分００」調剤基本料における「００」又は医科点数表区分番号「Ａ", "body": "12 区分番号は、例えば「区分００」調剤基本料における「００」又は医科点数表区分番号「Ａ０００」初診料の「Ａ０００」を指す。なお、以下区分番号という記載は省略し、「００」又は「Ａ０００」のみ記載する。", "label": "12. 区分番号は、例えば「区分００」調剤基本料における「００」…"}, {"id": "s14", "category": "調剤技術料", "kubun": "区分００ 調剤基本料", "title": "１ 受付回数等", "body": "１ 受付回数等\n(１) 調剤基本料は、患者等が提出する処方箋の枚数に関係なく処方箋受付１回につき算定する。なお、分割調剤を行う場合は、７により算定し、リフィル処方箋による調剤を行う場合は、８により算定する。\n(２) 同一患者から同一日に複数の処方箋（リフィル処方箋を含む。）を受け付けた場合、同一保険医療機関の同一医師によって交付された処方箋又は同一の保険医療機関で一連の診療行為に基づいて交付された処方箋については一括して受付１回と数える。ただし、同一の保険医療機関から交付された場合であっても、歯科の処方箋については歯科以外の処方箋と歯科の処方箋を別受付として算定できる。\n(３) 複数の保険医療機関が交付した同一患者の処方箋を同時にまとめて受け付けた場合においては、受付回数はそれぞれ数え２回以上とする。また、この場合において、当該受付のうち、１回目は調剤基本料の所定点数を算定し、２回目以降は「注３」により調剤基本料の所定点数を 100 分の 80 にし、小数点以下第一位を四捨五入した点数を算定する。なお、当該「注３」の規定は、「注９」から「注 11」までの分割調剤に係る処方箋には適用しない。", "label": "１. 受付回数等"}, {"id": "s15", "category": "調剤技術料", "kubun": "区分００ 調剤基本料", "title": "２ 調剤基本料の「注４」に規定する保険薬局", "body": "２ 調剤基本料の「注４」に規定する保険薬局\n(１) 以下のいずれかに該当する保険薬局である場合、調剤基本料を 100 分の 50 に減算する。なお、詳細な施設基準については、「特掲診療料の施設基準等及びその届出に関する手続きの取扱いについて(通知)」（令和８年３月５日保医発 0305 第８号。以下、「特掲診療料施設基準通知」という。）を参照すること。\nア 医療用医薬品の取引価格の妥結率が５割以下であること。\nイ 医療用医薬品の取引価格の妥結率、医療用医薬品の取引に係る状況及び流通改善に関する取組状況を地方厚生（支）局長に報告していない保険薬局\nウ 保険薬剤師のかかりつけ機能に係る基本的業務を１年間実施していない保険薬局\n(２) 調剤基本料の「注４」の減算については、調剤基本料の所定点数を100分の50にし、小数点以下第一位を四捨五入して計算する。", "label": "２. 調剤基本料の「注４」に規定する保険薬局"}, {"id": "s16", "category": "調剤技術料", "kubun": "区分００ 調剤基本料", "title": "３ 地域支援・医薬品供給対応体制加算", "body": "３ 地域支援・医薬品供給対応体制加算\n(１) 地域支援・医薬品供給対応体制加算は、医薬品の安定供給に資する取組や、かかりつけ薬剤師機能の発揮等により、地域医療に貢献する保険薬局の体制等を評価するものであり、施設基準や実績等を満たした上で必要な届出を行った場合に算定できる。ただし、特別調剤基本料Ａを算定している保険薬局においては、地域支援・医薬品供給対応体制加算の所定点数を100分の10にし、小数点以下第一位を四捨五入した点数を算定する。なお、詳細な施設基準については、特掲診療料施設基準通知を参照すること。\n(２) 特掲診療料施設基準通知における「他の保険薬局に医薬品を分譲」するにあたっては、分譲に係る伝票、医療用医薬品の譲渡書又は別紙様式４－１を用いて行い、分譲後２年間保存すること。\n(３) 医薬品の供給不安等により、患者が持参した処方箋に記載された医薬品が入手困難な場合に、当該医薬品の在庫を持つ保険薬局を探し、当該保険薬局に予め連絡して在庫を確認した上で、当該患者に当該保険薬局を案内する場合は、別紙様式４－２を用いること。また、患者から別紙様式４－２を受け取った保険薬局は２年間これを保存すること。\n(４) 地域支援・医薬品供給対応体制加算は、特別調剤基本料Ｂを算定している保険薬局は算定できない。", "label": "３. 地域支援・医薬品供給対応体制加算"}, {"id": "s17", "category": "調剤技術料", "kubun": "区分００ 調剤基本料", "title": "４ 連携強化加算", "body": "４ 連携強化加算\n(１) 連携強化加算は、他の保険薬局、保険医療機関及び都道府県等との連携により、災害又は新興感染症の発生時等の非常時に必要な体制が整備されている保険薬局において、調剤を行った場合に算定できる。この場合において、災害又は新興感染症の発生時等において対応可能な体制を確保していることについて当該保険薬局のほか、当該保険薬局の所在地の行政機関、薬剤師会等のホームページ等で広く周知すること。\n(２) 連携強化加算は、特別調剤基本料Ａを算定する保険薬局において、「特掲診療料の施設基準等（平成 20 年厚生労働省告示第 63 号）」第十五の四の三に規定する保険医療機関が医科点数表の「Ａ０００」初診料の「注 11」及び「Ａ００１」再診料の「注 15」に規定する外来感染対策向上加算又は医科点数表の「Ａ２３４－２」及び歯科点数表の「Ａ２２４－２」感染対策向上加算の届出を行った保険医療機関である場合は、算定できない。\n(３) 災害時においては、オンライン資格確認等システムの「緊急時医療情報・資格確認機能（災害時医療情報閲覧）」（災害時モード）を用いることにより、被災により手帳やマイナ保険証を確認することができない患者であっても薬剤情報等の把握が可能となり、更に電子処方箋管理サービスへの調剤情報の登録により直近の薬剤情報が充実することを念頭に置いて、平時よりこれらのシステム等の活用に努めること。\n(４) 連携強化加算は特別調剤基本料Ｂを算定している保険薬局は算定できない。", "label": "４. 連携強化加算"}, {"id": "s18", "category": "調剤技術料", "kubun": "区分００ 調剤基本料", "title": "５ バイオ後続品調剤体制加算", "body": "５ バイオ後続品調剤体制加算\n(１) バイオ後続品調剤体制加算は、バイオ後続品を調剤し、また患者に適切に説明することができる保険薬局の体制を評価するものであり、バイオ後続品（インスリン製剤を除く。）を調剤した場合に算定することができる。\n(２) 先行バイオ医薬品とバイオ後続品の効能又は効果が異なるバイオ医薬品の一般的名称が記載された処方箋を受け付けた保険薬局の保険薬剤師は、後発医薬品の調剤と同様に、適切な対応を行うこと。\n(３) 先行バイオ医薬品について処方箋に銘柄名の記載がなされた場合は、保険薬局において処方医に事前に確認することなくバイオ後続品に変更して調剤すること（変更調剤）はできないことに留意すること。\n(４) 特別調剤基本料Ａを算定している保険薬局においては、バイオ後続品調剤体制加算の所定点数を 100 分の 10 にし、小数点以下第一位を四捨五入した点数を算定する。\n(５) バイオ後続品調剤体制加算は、特別調剤基本料Ｂを算定している保険薬局は算定できない。", "label": "５. バイオ後続品調剤体制加算"}, {"id": "s19", "category": "調剤技術料", "kubun": "区分００ 調剤基本料", "title": "６ 調剤基本料の「注８」に規定する保険薬局", "body": "６ 調剤基本料の「注８」に規定する保険薬局\n(１) 後発医薬品の調剤数量割合が５割以下の保険薬局（処方箋受付回数が１月に 600 回以下の場合を除く。）である場合は、調剤基本料を５点減算する。なお、詳細な施設基準については、特掲診療料施設基準通知を参照すること。\n(２) 処方箋受付回数が１月に 600 回以下に該当するか否かの取扱いについては、調剤基本料の施設基準に定める処方箋受付回数に準じて取り扱う。", "label": "６. 調剤基本料の「注８」に規定する保険薬局"}, {"id": "s20", "category": "調剤技術料", "kubun": "区分００ 調剤基本料", "title": "７ 分割調剤", "body": "７ 分割調剤\n(１) 通則\nア 「注９」又は「注 10」に係る分割調剤を行う場合は、調剤基本料は初回のみ算定し、２回目以降については「注９」又は「注 10」のとおり算定するが、異なる保険薬局で分割調剤を行う場合は、各保険薬局においてそれぞれ調剤基本料を算定できる。\nイ 「注９」、「注 10」又は「注 11」に係る分割調剤のうち、複数の分割調剤を同一の保険薬局において同一日に行う場合にあっては、「注 11」の分割調剤に係る点数により算定する。\n(２) 長期保存の困難性等の理由による分割調剤\nア 「注９」の分割調剤については、14 日分を超える投薬に係る処方箋によって調剤を行う場合であって、処方薬の長期保存の困難その他の理由によって分割して調剤する必要があり、分割調剤を行った場合で、１処方箋の２回目以降の調剤を同一の保険薬局において２回目以降行った場合に算定する。\nイ 「注９」に係る分割調剤を行う場合は、処方箋の受付時に、当該処方箋を発行した医療機関等に対し照会を行うとともに、分割理由等の必要な事項を調剤録等に記入すること。\n(３) 後発医薬品の試用のための分割調剤\nア 「注 10」の分割調剤については、後発医薬品への変更が可能な処方箋を提出した患者の同意に基づき、処方箋に記載された先発医薬品を初めて後発医薬品に変更して調剤を行う場合であって、当該患者の希望により分割調剤を行った場合で、同一の保険薬局において１処方箋の２回目の調剤を行った場合に限り算定する。この場合において、２回目の調剤を行う際には、先発医薬品から後発医薬品への変更による患者の体調の変化、副作用が疑われる症状の有無等を確認するとともに、患者の意向を踏まえ、後発医薬品又は変更前の先発医薬品の調剤を行うこととする。なお、その際に、所定の要件を満たせば、調剤管理料、服薬管理指導料及び外来服薬支援料２を算定できる。\nイ 「注 10」に係る分割調剤を行った場合は、処方箋を発行した医療機関等にその旨を連絡するとともに、分割理由等の必要な事項を調剤録等に記入すること。また、２回目の調剤の際に、患者の意向により変更前の先発医薬品の調剤を行った場合も、処方箋を発行した医療機関等にその旨を連絡するとともに、先発医薬品に再変更した理由等の必要な事項を調剤録等に記入すること。\nウ １処方箋について、「注９」の長期保存の困難性等の理由による分割調剤の２回目以降の調剤と「注 10」の後発医薬品の試用のための分割調剤の２回目の調剤を同一の保険薬局において同一日に行う場合にあっては、いずれか一方の分割調剤に係る点数のみを算定する。\n(４) 医師の指示による分割調剤\nア 「注 11」については、医師の分割指示に係る処方箋（「注９」の長期保存の困難性等の理由による分割調剤及び「注 10」の後発医薬品の試用のための分割調剤に該当する場合を除く。）により、患者の同意の下、分割調剤を行った場合に算定する。\nイ 調剤基本料及びその加算、薬剤調製料及びその加算並びに薬学管理料については、当該分割調剤を行う保険薬局が当該処方箋において分割調剤を実施しない場合に算定する点数をそれぞれ合算し、分割回数で除した点数を当該調剤時に算定する。当該点数は、小数点以下第一位を四捨五入して計算する。ただし、服薬情報等提供料については、分割回数で除していない点数を算定できる。\nウ 「注 11」の医師の指示による分割調剤の場合、保険薬局の保険薬剤師は、以下を実施する。\n(イ) 分割指示に係る処方箋の交付を受けた患者に対して、処方箋受付前に、継続的な薬学的管理及び指導のため、当該処方箋の１回目の調剤から全ての調剤が完了するまで、同一の保険薬局に処方箋を持参するべきである旨を説明する。\n(ロ) 患者に対し、次回の自局への処方箋持参の意向の有無及び予定時期を確認するとともに、予定時期に患者が来局しない場合は、必要に応じ、電話等で服薬状況を確認し来局を促す。\n(ハ) また、患者から次回は別の保険薬局に処方箋を持参する旨の申し出があった場合は、患者の了解を得た上で、次回の円滑な薬剤交付に資するよう、調剤後遅滞なく、患者が次回処方箋を持参しようとする保険薬局に対し、調剤の状況とともに必要な情報をあらかじめ提供する。\n(ニ) ２回目以降の調剤において患者の服薬状況、服薬期間中の体調の変化等について確認し、その結果を処方医に情報提供する。この場合において、次に掲げる事項を含めるものとする。\n・残薬の有無\n・残薬が生じている場合はその量及び理由\n・患者の服薬中の体調の変化（副作用が疑われる症状など）の有無\n・副作用が疑われる場合はその原因の可能性がある薬剤の推定", "label": "７. 分割調剤"}, {"id": "s21", "category": "調剤技術料", "kubun": "区分００ 調剤基本料", "title": "８ リフィル処方箋による調剤", "body": "８ リフィル処方箋による調剤\n(１) 通則\nア リフィル処方箋による調剤を行う場合は、所定の要件を満たせば、調剤技術料及び薬学管理料を算定できる。なお、リフィル処方箋による調剤を行うごとに、処方箋受付回数１回として取扱う。\nイ 保険医療機関及び保険医療養担当規則（昭和 32 年厚生省令第 15 号）において、投与量に限度が定められている医薬品及び貼付剤（この場合において、「貼付剤」とは、鎮痛・消炎に係る効能及び効果を有するものであって、麻薬若しくは向精神薬であるもの又は専ら皮膚疾患に用いるものを除いたものをいう。）については、リフィル処方箋による調剤を行うことはできない。\nウ 患者又はその家族等からリフィル処方箋に関する質問を受けた場合は、その意義や使用方法等について丁寧に説明を行うこと。\n(２) リフィル処方箋による調剤\nア 保険薬局の保険薬剤師は、リフィル処方箋による１回目又は２回目（総使用回数３回の場合）の調剤を行う場合、リフィル処方箋に調剤日及び次回調剤予定日を所定の欄に記載するとともに、調剤を実施した保険薬局の名称及び保険薬剤師の氏名を余白又は裏面に記載の上、調剤録等を作成した後、リフィル処方箋を患者に返却すること。その際、必要な事項が記入されたリフィル処方箋の写しを調剤録とともに保管すること。また、当該リフィル処方箋の総使用回数の調剤が終わった場合、調剤済処方箋として保管すること。\nイ 保険薬局の保険薬剤師は、リフィル処方箋により調剤を行うに当たって、患者の服薬状況等の確認を行い、リフィル処方箋により調剤を行うことが不適切と判断した場合には、調剤を行わず、受診勧奨を行うとともに、処方医に情報提供を行うこと。また、リフィル処方箋により調剤した場合は、調剤した内容、患者の服薬状況等について必要に応じ処方医へ情報提供を行うこと。\nウ 保険薬局の保険薬剤師は、リフィル処方箋の交付を受けた患者に対して、継続的な薬学的管理指導のため、同一の保険薬局で調剤を受けるべきである旨を説明すること。\nエ 保険薬局の保険薬剤師は、患者の次回の調剤を受ける予定を確認すること。次回の来局の希望があるにもかかわらず予定される時期に患者が来局しない場合は、電話等により患者の状況を確認すること。患者と連絡がつかない、患者が来局しない等の場合は、必要に応じ処方医へ情報提供を行うこと。\nオ 保険薬局の保険薬剤師は、患者が次回の調剤を他の保険薬局において受けることを申し出た場合は、調剤の状況とともに必要な情報を当該他の保険薬局に提供する又は当該情報を記録したものを患者に提供すること。", "label": "８. リフィル処方箋による調剤"}, {"id": "s22", "category": "調剤技術料", "kubun": "区分００ 調剤基本料", "title": "９ 在宅薬学総合体制加算", "body": "９ 在宅薬学総合体制加算\n(１) 在宅薬学総合体制加算１は、在宅患者に対する薬学的管理及び指導を行うにつき必要な体制が整備されているとして、別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生（支）局長に届け出た保険薬局において、在宅患者訪問薬剤管理指導料、在宅患者緊急訪問薬剤管理指導料若しくは在宅患者緊急時等共同指導料又は介護保険における居宅療養管理指導費若しくは介護予防居宅療養管理指導費（以下「在宅患者訪問薬剤管理指導料等」という。）を算定する患者等が提出する処方箋を受け付けて調剤を行った場合に算定できる。\n(２) 在宅薬学総合体制加算２は、在宅患者に対する高度な薬学的管理及び指導を行うために必要な体制が整備されており、かつ高度な薬学的管理及び指導に係る十分な実績を有するものとして、別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生（支）局長に届け出た保険薬局において、在宅患者訪問薬剤管理指導料等を算定する患者等が提出する処方箋を受け付けて調剤を行った場合であって、単一建物診療患者が１人又は単一建物居住者が１人の場合はイ、それ以外の場合はロを算定できる。\n(３) 詳細な施設基準については、特掲診療料施設基準通知を参照すること。\n(４) 「１５」在宅患者訪問薬剤管理指導料の１の(４)において規定する在宅協力薬局が処方箋を受け付けて、訪問薬剤管理指導又は居宅療養管理指導を行った場合は、当該加算を届け出ている在宅協力薬局に限り、当該加算を算定できる。\n(５) 在宅薬学総合体制加算は、特別調剤基本料Ａを算定している保険薬局においては、所定点数を 100 分の 10 にし、小数点以下第一位を四捨五入した点数を算定する。\n(６) 在宅薬学総合体制加算は、特別調剤基本料Ｂを算定している保険薬局は算定できない。\n(７) 次のア又はイに該当する保険薬局において、ウ又はエの患者であって、在宅患者訪問薬剤管理指導料等を算定するものが提出する処方箋を受け付けて調剤を行う場合は、当該患者の単一建物診療患者数又は単一建物居住者数にかかわらず、在宅薬学総合体制加算２のイを算定できる。\nア 地方厚生（支）局長に在宅薬学総合体制加算１に係る届出を行った保険薬局のうち、直近１年間における在宅患者訪問薬剤管理指導料の１、在宅患者緊急訪問薬剤管理指導料、在宅患者緊急時等共同指導料、単一建物居住者が１人の場合の居宅療養管理指導費（薬局の薬剤師が行うものに限り、情報通信機器を用いるものを除く。）及び介護予防居宅療養管理指導費（薬局の薬剤師が行うものに限り、情報通信機器を用いるものを除く。）についての算定回数（在宅協力薬局として連携した場合（同一グループ薬局に対して業務を実施した場合を除く。）及び同等の業務を行った場合を含む。）の合計が、在宅患者訪問薬剤管理指導料等に占める割合にかかわらず、計 480 回以上であるもの。\nイ 地方厚生（支）局長に在宅薬学総合体制加算２に係る届出を行った保険薬局\nウ 「特掲診療料の施設基準等」（平成 20 年厚生労働省告示第 63 号）の別表第８の２（在宅時医学総合管理料及び施設入居時等医学総合管理料に規定する別に厚生労働大臣が定める状態の患者）に該当する以下の患者\n（別表第８の２）\n(イ) 次に掲げる疾患に罹患している患者\n・末期の悪性腫瘍\n・スモン\n・難病の患者に対する医療等に関する法律第五条第一項に規定する指定難病\n・後天性免疫不全症候群\n・脊髄損傷\n・真皮を越える褥瘡\n(ロ) 次に掲げる状態の患者\n・在宅自己連続携行式腹膜灌流を行っている状態\n・在宅血液透析を行っている状態\n・在宅酸素療法を行っている状態\n・在宅中心静脈栄養法を行っている状態\n・在宅成分栄養経管栄養法を行っている状態\n・在宅自己導尿を行っている状態\n・在宅人工呼吸を行っている状態\n・植込型脳・脊髄刺激装置による疼痛管理を行っている状態\n・肺高血圧症であって、プロスタグランジン I2 製剤を投与されている状態\n・気管切開を行っている状態\n・気管カニューレを使用している状態\n・ドレーンチューブ又は留置カテーテルを使用している状態\n・人工肛門又は人工膀胱を設置している状態\nエ 「特掲診療料の施設基準等」（平成 20 年厚生労働省告示第 63 号）の別表第８の３（在宅時医学総合管理料の注 10（施設入居時等医学総合管理料の注５の規定により準用する場合を含む。））に該当し、本通知別添１第２章第２部「Ｃ００２」在宅時医学総合管理料及び「Ｃ００２－２」施設入居時等医学総合管理料の(23)に規定する状態にある以下の患者\n（別表第８の３）\n(イ) 要介護三以上の状態又はこれに準ずる状態介護保険法第７条に規定する要介護状態区分における要介護３、要介護４若しくは要介護５である状態又は障害者総合支援法における障害支援区分において障害支援区分２以上と認定されている状態をいう。\n(ロ) 日常生活に支障を来たすような症状・行動や意思疎通の困難さが見られ、介護を必要とする認知症の状態医師が「認知症高齢者の日常生活自立度」におけるランクⅢ以上と診断した状態をいう。\n(ハ) 頻回の訪問看護を受けている状態週１回以上訪問看護を受けている状態をいう。(二) 訪問診療又は訪問看護において処置を受けている状態訪問診療又は訪問看護において、注射又は喀痰吸引、経管栄養等の処置（特掲診療料の施設基準等第４の１の６(３)に掲げる処置のうち、ヨからレまで及びツからフまでに規定する処置を除く。）を受けている状態をいう。\n(ホ) 介護保険法第８条第 11 項に規定する特定施設等看護職員が配置された施設に入居し、医師の指示を受けた看護職員による処置を受けている状態特定施設、認知症対応型共同生活介護事業所、特別養護老人ホーム、障害者総合支援法第５条第 11 項に規定する障害者支援施設等に入居又は入所する患者であって、医師による文書での指示を受け、当該施設に配置された看護職員による注射又は処置を受けている状態をいう。処置の範囲はエの例による。\n(へ) 麻薬の投薬を受けている状態医師から麻薬の投薬を受けている状態をいう。\n(ト) その他関係機関との調整等のために訪問診療を行う医師による特別な医学管理を必要とする状態以下のいずれかに該当する患者の状態をいう。\n① 脳性麻痺、先天性心疾患、ネフローゼ症候群、ダウン症等の染色体異常、川崎病で冠動脈瘤のあるもの、脂質代謝障害、腎炎、溶血性貧血、再生不良性貧血、血友病、血小板減少性紫斑病、先天性股関節脱臼、内反足、二分脊椎、骨系統疾患、先天性四肢欠損、分娩麻痺、先天性多発関節拘縮症、児童福祉法第６条の２第１項に規定する小児慢性特定疾病（同条第３項に規定する小児慢性特定疾病医療支援の対象に相当する状態のものに限る。）及び同法第 56 条の６第２項に規定する障害児に該当する状態である 15 歳未満の患者\n② 出生時の体重が 1,500ｇ未満であった１歳未満の患者\n③ 「超重症児（者）・準超重症児（者）の判定基準」による判定スコアが 10以上である患者\n④ 訪問診療を行う医師又は当該医師の指示を受けた看護職員の指導管理に基づき、家族等患者の看護に当たる者が注射又は喀痰吸引、経管栄養等の処置（特掲診療料の施設基準等第４の１の６(３)に掲げる処置のうち、ヨからコまでに規定する処置をいう。）を行っている患者\n(８) 在宅薬学総合体制加算２のイの算定に当たっては、算定しようとする保険薬局が（７）のア又はイのいずれに該当するかを調剤報酬明細書の摘要欄に記載すること。また、算定対象の患者が（７）のウ又はエのうちいずれの状態に該当するかを調剤報酬明細書の摘要欄に記載すること。", "label": "９. 在宅薬学総合体制加算"}, {"id": "s23", "category": "調剤技術料", "kubun": "区分００ 調剤基本料", "title": "10 電子的調剤情報連携体制整備加算", "body": "10 電子的調剤情報連携体制整備加算\n(１) 電子的調剤情報連携体制整備加算は、オンライン資格確認により取得した診療情報、薬剤情報等を調剤に実際に活用できる体制を有するとともに、電子処方箋及び電子カルテ情報共有サービスを導入するなど、質の高い医療を提供するため医療ＤＸに対応する体制を評価するものであり、処方箋受付１回につき所定点数に加算する。ただし、患者１人につき同一月に２回以上調剤を行った場合においても、月１回のみの算定とする。\n(２) 電子的調剤情報連携体制整備加算を算定する保険薬局では、オンライン資格確認等システムや電子処方箋管理サービスの重複投薬等チェックを通じて取得した患者の診療情報、薬剤情報等を閲覧及び活用し、調剤、服薬指導等を行う。\n(３) 電子的調剤情報連携体制整備加算は、特別調剤基本料Ｂを算定している保険薬局は算定できない。", "label": "10. 電子的調剤情報連携体制整備加算"}, {"id": "s24", "category": "調剤技術料", "kubun": "区分００ 調剤基本料", "title": "11 門前薬局等立地依存減算", "body": "11 門前薬局等立地依存減算本減算は、薬局、薬剤師、医薬品等の医療資源の分散を防止して地域における効果的な医薬品供給体制の整備を推進すること、また、国民が受ける医療の質の向上の観点からポリファーマシーをはじめとする医薬品に関する諸問題に対して効果的に対処できる体制の整備を促進することを目的としている。具体的には、薬局が特定医療機関の周辺に立地し、特定の医療機関の処方箋に依拠する薬局（いわゆる門前薬局）ではなく、地域全体を「面」として支える体制（面分業）の整備を推進していく観点から、門前薬局等、薬局の業務の成立が、その立地特性に大きく影響を受けているものとして施設基準に該当する保険薬局である場合は、調剤基本料を 15 点減算する。なお、詳細な施設基準については、特掲診療料施設基準通知を参照すること。", "label": "11. 門前薬局等立地依存減算"}, {"id": "s25", "category": "調剤技術料", "kubun": "区分００ 調剤基本料", "title": "12 次に掲げる調剤基本料に規定する加算及び減算について、これらのうち複数に該当する", "body": "12 次に掲げる調剤基本料に規定する加算及び減算について、これらのうち複数に該当する場合は、最初に所定点数に「注３」（100 分の 80）及び「注４」（100 分の 50）のうち該当するものを乗じ、小数点以下第一位を四捨五入する。次に「注５」の地域支援・医薬品供給対応体制加算、「注６」の連携強化加算、「注７」のバイオ後続品調剤体制加算、「注８」の後発医薬品減算、「注 12」の在宅薬学総合体制加算１、「注 13」の在宅薬学総合体制加算２、「注 14」の電子的調剤情報連携体制整備加算及び「注 15」の門前薬局等立地依存減算のうち該当するもの（特別調剤基本料Ａを算定する保険薬局においては、「注５」の地域支援・医薬品供給対応体制加算、「注７」のバイオ後続品調剤体制加算、「注 12」の在宅薬学総合体制加算１及び「注 13」の在宅薬学総合体制加算２の所定点数に 100 分の 1\n0 を乗じ、それぞれ小数点以下第一位を四捨五入する。）の加算等を行う。ただし、当該点数が３点未満になる場合は、３点を算定する。", "label": "12. 次に掲げる調剤基本料に規定する加算及び減算について、これ…"}, {"id": "s26", "category": "調剤技術料", "kubun": "区分０１ 薬剤調製料", "title": "区分０１ 薬剤調製料", "body": "(１) 内服薬\nア 内服薬（浸煎薬及び湯薬を除く。以下同じ。）の薬剤調製料については、内服用滴剤とそれ以外の内服薬とは所定単位及び所定点数が異なる（内服用滴剤は薬剤調製料の「注１」による。）。\nイ 内服薬（内服用滴剤以外のもの）についての薬剤調製料及び薬剤料の算定はそれぞれ「１剤」又は「１剤１日分」を所定単位とし、内服用滴剤についての薬剤調製料及び薬剤料は「１調剤」を所定単位として算定するが、この場合の「１剤」とは、薬剤調製料の算定の上で適切なものとして認められる単位をいうものであり、次の点に留意する。\n(イ) １回の処方において、２種類以上の薬剤を調剤する場合には、それぞれの内服薬を個別の薬包等に調剤しても、服用時点が同一であるものについては、１剤として算定する。\n(ロ) 服用時点が同一である薬剤については、投与日数にかかわらず１剤として算定する。\n(ハ) (イ)及び(ロ)における「服用時点が同一である」とは、２種類以上の薬剤について服用日１日を通じて服用時点（例えば「朝食後、夕食後服用」、「１日３回食後服用」、「就寝前服用」、「６時間ごと服用」等）が同一であることをいう。また、食事を目安とする服用時点については、食前、食後及び食間の３区分とすることとし、服用時点が「食直前」、「食前 30 分」等であっても、薬剤調製料の算定にあっては、「食前」とみなし、１剤として扱う。\n(ニ) (イ)及び(ロ)にかかわらず、次の場合は、それぞれを別剤として算定できる。\n① 配合不適等調剤技術上の必要性から個別に調剤した場合\n② 内服用固形剤（錠剤、カプセル剤、散剤等）と内服用液剤の場合\n③ 内服錠とチュアブル錠又は舌下錠等のように服用方法が異なる場合\n(ホ) 同一有効成分であって同一剤形の薬剤が複数ある場合は、その数にかかわらず１剤として算定する。\nウ 内服薬の薬剤調製料は、１回の処方箋受付について、４剤以上ある場合についても、３剤として算定する。ただし、この場合、内服用滴剤は剤数に含めないが、浸煎薬又は湯薬を同時に調剤した場合には、当該浸煎薬又は湯薬の調剤数を内服薬の剤数に含めることとする。\nエ 同一保険薬局で同一処方箋を分割調剤（調剤基本料の「注９」の長期保存の困難性等の理由による分割調剤又は「注 10」の後発医薬品の試用のための分割調剤に限る。）した場合は、１回目の調剤から通算した日数に対応する点数から前回までに請求した点数を減じて得た点数により算定する。\nオ ドライシロップ剤を投与する場合において、調剤の際に溶解し、液剤（シロップ剤）にして患者に投与するときは内服用液剤として算定し、散剤としてそのまま投与するときは内服用固形剤として算定する。また、ドライシロップ剤を水に溶かして同時服用の他の液剤と一緒に投与する場合は１剤として算定し、ドライシロップ剤を散剤として、同時服用の他の固形剤（錠剤、カプセル剤、散剤、顆粒剤等）と一緒に投与する場合も１剤として算定する。なお、「処方せんに記載された医薬品の後発医薬品への変更について」（平成 24 年３月５日保医発 0305 第 12 号）に基づき、ドライシロップ剤の医薬品から類似する別剤形の後発医薬品に変更して調剤する場合又は類似する別剤形の医薬品からドライシロップ剤の後発医薬品に変更して調剤する場合は、同通知の第３の５を参照すること。\nカ 内服用滴剤を調剤した場合の薬剤調製料は、投薬日数にかかわらず、１調剤につき「注１」の所定点数を算定する。この場合の内服用滴剤とは、内服用の液剤であって、１回の使用量が極めて少量（１滴ないし数滴）であり、スポイト、滴瓶等により分割使用するものをいう。なお、当該薬剤の薬剤料は、１調剤分全量を１単位として薬剤料の項により算定するものであり、１剤１日分を所定単位とするものではない。\n(２) 屯服薬屯服薬の薬剤調製料は、調剤した剤数、回数にかかわらず、１回の処方箋受付につき所定点数を算定する。\n(３) 浸煎薬\nア 浸煎薬とは、生薬を薬局において浸煎し、液剤として製したものをいう。\nイ 浸煎薬の薬剤調製料は、日数にかかわらず、１調剤につき算定する。\nウ 浸煎薬の薬剤調製料は、１回の処方箋受付について４調剤以上ある場合において、３調剤まで算定できる。ただし、内服薬又は湯薬を同時に調剤した場合には、内服薬については剤数を、湯薬については調剤数を浸煎薬の調剤数に含めることとする。\n(４) 湯薬\nア 湯薬とは、薬局において２種以上の生薬（粗切、中切又は細切したもの）を混合調剤し、患者が服用するために煎じる量ごとに分包したものをいう。\nイ 湯薬の薬剤調製料は、１調剤につき投薬日数に応じて所定点数を算定する。\nウ 湯薬の薬剤調製料は、１回の処方箋受付について４調剤以上ある場合において、３調剤まで算定できる。ただし、内服薬又は浸煎薬を同時に調剤した場合には、内服薬については剤数を、浸煎薬については調剤数を湯薬の調剤数に含めることとする。\n(５) 注射薬\nア 注射薬の薬剤調製料は、調剤した調剤数、日数にかかわらず、１回の処方箋受付につき所定点数を算定する。\nイ 注射薬のうち支給できるものは、在宅医療における自己注射等のために投与される薬剤（インスリン製剤、ヒト成長ホルモン剤、遺伝子組換え活性型血液凝固第Ⅶ因子製剤、遺伝子組換え型血液凝固第Ⅷ因子製剤、乾燥濃縮人血液凝固第Ⅹ因子加活性化第Ⅶ因子製剤、乾燥人血液凝固第Ⅷ因子製剤、遺伝子組換え型血液凝固第Ⅸ因子製剤、乾燥人血液凝固第Ⅸ因子製剤、活性化プロトロンビン複合体、乾燥人血液凝固因子抗体迂回活性複合体、自己連続携行式腹膜灌流用灌流液、在宅中心静脈栄養法用輸液、性腺刺激ホルモン放出ホルモン剤、性腺刺激ホルモン製剤、ゴナドトロピン放出ホルモン誘導体、ソマトスタチンアナログ、顆粒球コロニー形成刺激因子製剤、インターフェロンアルファ製剤、インターフェロンベータ製剤、ブプレノルフィン製剤、抗悪性腫瘍剤、グルカゴン製剤、グルカゴン様ペプチド－１受容体アゴニスト、ヒトソマトメジンＣ製剤、人工腎臓用透析液、血液凝固阻止剤、生理食塩水、プロスタグランジンＩ２製剤、モルヒネ塩酸塩製剤、エタネルセプト製剤、注射用水、ペグビソマント製剤、スマトリプタン製剤、フェンタニルクエン酸塩製剤、複方オキシコドン製剤、オキシコドン塩酸塩製剤、ベタメタゾンリン酸エステルナトリウム製剤、デキサメタゾンリン酸エステルナトリウム製剤、デキサメタゾンメタスルホ安息香酸エステルナトリウム製剤、プロトンポンプ阻害剤、Ｈ２遮断剤、カルバゾクロムスルホン酸ナトリウム製剤、トラネキサム酸製剤、フルルビプロフェンアキセチル製剤、メトクロプラミド製剤、プロクロルペラジン製剤、ブチルスコポラミン臭化物製剤、グリチルリチン酸モノアンモニウム・グリシン・Ｌ－システイン塩酸塩配合剤、アダリムマブ製剤、エリスロポエチン、ダルベポエチン、テリパラチド製剤、アドレナリン製剤、ヘパリンカルシウム製剤、アポモルヒネ塩酸塩製剤及びセルトリズマブペゴル製剤、トシリズマブ製剤、メトレレプチン製剤、アバタセプト製剤、ｐＨ４処理酸性人免疫グロブリン（皮下注射）製剤、電解質製剤、注射用抗菌薬、エダラボン製剤、アスホターゼ アルファ製剤、グラチラマー酢酸塩製剤、脂肪乳剤、セクキヌマブ製剤、エボロクマブ製剤、ブロダルマブ製剤、アリロクマブ製剤、ベリムマブ製剤、イキセキズマブ製剤、ゴリムマブ製剤、エミシズマブ製剤、イカチバント製剤、サリルマブ製剤、デュピルマブ製剤、ヒドロモルフォン塩酸塩製剤、インスリン・グルカゴン様ペプチド－１受容体アゴニスト配合剤、ヒドロコルチゾンコハク酸エステルナトリウム製剤、遺伝子組換えヒト von Willebrand 因子製剤、ブロスマブ製剤、アガルシダーゼアルファ製剤、アガルシダーゼベータ製剤、アルグルコシダーゼアルファ製剤、イデュルスルファーゼ製剤、イミグルセラーゼ製剤、エロスルファーゼアルファ製剤、ガルスルファーゼ製剤、セベリパーゼアルファ製剤、ベラグルセラーゼアルファ製剤、ラロニダーゼ製剤、メポリズマブ製剤、オマリズマブ製剤、テデュグルチド製剤、サトラリズマブ製剤、ビルトラルセン製剤、レムデシビル製剤、ガルカネズマブ製剤、オファツムマブ製剤、ボソリチド製剤、エレヌマブ製剤、アバロパラチド酢酸塩製剤、カプラシズマブ製剤、乾燥濃縮人 C1-インアクチベーター製剤、フレマネズマブ製剤、メトトレキサート製剤、チルゼパチド製剤、ビメキズマブ製剤、ホスレボドパ・ホスカルビドパ水和物配合剤、ペグバリアーゼ製剤、パビナフスプ アルファ製剤、アバルグルコシダーゼ アルファ製剤、ラナデルマブ製剤、ネモリズマブ製剤、ペグセタコプラン製剤、ジルコプランナトリウム製剤、コンシズマブ製剤、テゼペルマブ製剤、オゾラリズマブ製剤、トラロキヌマブ製剤、エフガルチギモド アルファ・ボルヒアルロニダーゼ アルファ配合剤、ドブタミン塩酸塩製剤、ドパミン塩酸塩製剤、ノルアドレナリン製剤、ベドリズマブ製剤、ミリキズマブ製剤、乾燥濃縮人プロテインＣ製剤、メコバラミン製剤、ベンラリズマブ製剤、マルスタシマブ製剤、ロザノリキシズマブ製剤、レブリキズマブ製剤、クロバリマブ製剤、シパグルコシダーゼ アルファ製剤及びパロペグテリパラチド製剤）に限る。なお、「モルヒネ塩酸塩製剤」、「フェンタニルクエン酸塩製剤」、「複方オキシコドン製剤」、「オキシコドン塩酸塩製剤」及び「ヒドロモルフォン塩酸塩製剤」は、薬液が取り出せない構造で、かつ患者等が注入速度を変えることができない注入ポンプ等に、必要に応じて生理食塩水等で希釈の上充填して交付した場合に限る。ただし、患者又はその家族等の意を受け、かつ、これらの麻薬である注射薬の処方医の指示を受けた看護師が、患家に当該注射薬を持参し、患者の施用を補助する場合又は保険薬局の保険薬剤師が、患家に麻薬である注射薬を持参し、当該注射薬の処方医の指示を受けた看護師に手渡す場合は、この限りでない。\nウ イの「在宅中心静脈栄養法用輸液」とは、高カロリー輸液をいい、高カロリー輸液以外にビタミン剤、高カロリー輸液用微量元素製剤及び血液凝固阻止剤を投与することができる。なお、上記イに掲げる薬剤のうち、処方医及び保険薬剤師の医学薬学的な判断に基づき適当と認められるものについて、在宅中心静脈栄養法用輸液に添加して投与することは差し支えない。\nエ イの「電解質製剤」とは、経口摂取不能又は不十分な場合の水分・電解質の補給・維持を目的とした注射薬（高カロリー輸液を除く。）をいい、電解質製剤以外に電解質補正製剤（電解質製剤に添加して投与する注射薬に限る。）、ビタミン剤、高カロリー輸液用微量元素製剤及び血液凝固阻止剤を投与することができる。\nオ イの「注射用抗菌薬」とは、病原体に殺菌的又は静菌的に作用する注射薬をいう。\n(６) 外用薬\nア 外用薬の薬剤調製料は、投与日数にかかわらず、１調剤につき算定する。\nイ 外用薬の薬剤調製料は、１回の処方箋受付について４調剤以上ある場合において、３調剤まで算定できる。\nウ トローチについては、外用薬として算定する。\nエ 同一有効成分で同一剤形の外用薬が複数ある場合には、その数にかかわらず、１調剤として取り扱う。\n(７) 注射薬の無菌製剤処理\nア 「注２」の「無菌製剤処理」とは、無菌室・クリーンベンチ・安全キャビネット等の無菌環境の中で、無菌化した器具を使用し、無菌的な製剤を行うことをいう。\nイ 薬剤調製料の無菌製剤処理加算は、次に示す注射薬を無菌的に製剤した場合に、１日分製剤するごとにそれぞれ次に示す点数を所定点数に加算する。\n(イ) ２以上の注射薬を混合して中心静脈栄養法用輸液を無菌的に製剤する場合には 69点（15 歳未満の小児の場合は 237 点）を加算する。\n(ロ) 抗悪性腫瘍剤を含む２以上の注射薬を混合して（生理食塩水等で希釈する場合を含む。）抗悪性腫瘍剤を無菌的に製剤する場合には 79 点（15 歳未満の小児の場合は 14\n7 点）を加算する。\n(ハ) 麻薬を含む２以上の注射薬を混合して（生理食塩水等で希釈する場合を含む。）無菌的に麻薬を製剤する場合又は麻薬の注射薬を無菌的に充填し製剤する場合には 69点（15 歳未満の小児の場合は 137 点）を加算する。\nウ 抗悪性腫瘍剤として無菌製剤処理加算の対象になる薬剤は、悪性腫瘍等に対して用いる細胞毒性を有する注射剤として独立行政法人医薬品医療機器総合機構法（平成 14 年法律第 192 号）第４条第６項第１号の規定に基づき厚生労働大臣が指定した医薬品（医薬品等副作用被害救済制度の対象とならない医薬品等（平成 16 年厚生労働省告示第 185 号）に掲げる医薬品等）をいう。\nエ 無菌製剤処理加算は、同一日の使用のために製剤した場合又は組み合わせて１つの注射剤として製剤した場合においても、１日につき１回に限り、主たるものの所定点数のみ算定するものとする。\nオ 無菌製剤処理を伴わない調剤であって、患者が施用時に混合するものについては、無菌製剤処理加算は算定できない。\nカ 無菌調剤室を共同利用する場合に当たっては、「薬事法施行規則の一部を改正する省令の施行等について」（平成 24 年８月 22 日薬食発 0822 第２号）を遵守し適正に実施すること。なお、この場合の費用については両者の合議とする。\n(８) 麻薬、向精神薬、覚醒剤原料又は毒薬加算\nア 「向精神薬」とは、麻薬及び向精神薬取締法（昭和 28 年法律第 14 号）第２条第６号の規定に基づく同法別表第３に掲げる向精神薬をいう。\nイ 当該加算は、麻薬、向精神薬、覚醒剤原料又は毒薬を調剤する場合において、処方中に麻薬が含まれているときに１調剤行為につき 70 点、それ以外のときに１調剤行為につき８点を加算するものであり、処方中の麻薬、向精神薬、覚醒剤原料又は毒薬の品目数、投薬日数に関係なく当該所定点数を算定する。\nウ 使用した薬剤の成分が麻薬、覚醒剤原料又は毒薬であっても、その倍散の製剤若しくは予製剤等で規制含有量以下のため麻薬、覚醒剤原料又は毒薬の取扱いを受けていない場合は、当該加算は算定できない。\nエ 重複した規制を受けている薬剤については、当該薬剤が麻薬である場合は１調剤につき\n70 点を算定し、それ以外の場合は１調剤につき８点を算定する。\nオ 当該加算は、内服薬のほか、屯服薬、注射薬、外用薬についても算定できる。\n(９) 調剤技術料の時間外加算等\nア 時間外加算は調剤基本料、薬剤調製料及び調剤管理料（基礎額）の 100 分の 100、休日加算は 100 分の 140、深夜加算は 100 分の 200 であり、これらの加算は重複して算定できない。\nイ 時間外加算等を算定する場合の基礎額は、調剤基本料（調剤基本料における「注１」から「注 16」までを適用して算出した点数）、薬剤調製料及び無菌製剤処理加算並びに調剤管理料の合計額とする。麻薬、向精神薬、覚醒剤原料又は毒薬を調剤した場合の加算、自家製剤加算、計量混合調剤加算、調剤時残薬調整加算及び薬学的有害事象等防止加算は基礎額に含まない。\nウ 時間外調剤に係る特別の料金の徴収を行う場合には、時間外加算等を算定できない。\nエ 時間外加算等を算定する保険薬局は、開局時間を当該保険薬局の内側及び外側の分かりやすい場所に表示する。\nオ 時間外加算\n(イ) 各都道府県における保険薬局の開局時間の実態、患者の来局上の便宜等を考慮して、一定の時間以外の時間をもって時間外として取り扱うこととし、その標準は、概ね午前８時前と午後６時以降及び休日加算の対象となる休日以外の日を終日休業日とする保険薬局における当該休業日とする。\n(ロ) (イ)により時間外とされる場合においても、当該保険薬局が常態として調剤応需の態勢をとり、開局時間内と同様な取扱いで調剤を行っているときは、時間外の取扱いとはしない。\n(ハ) 時間外加算を算定する患者については、処方箋の受付時間を当該患者の薬剤服用歴等に記載する。\n(ニ) 「注４」のただし書に規定する「時間外加算の特例の適用を受ける保険薬局」とは、一般の保険薬局の開局時間以外の時間における救急医療の確保のため、国又は地方公共団体等の開設に係る専ら夜間における救急医療の確保のため設けられている保険薬局に限られる。\n(ホ) 「注４」のただし書に規定する「別に厚生労働大臣が定める時間」とは、当該地域において一般の保険薬局が概ね調剤応需の態勢を解除し、翌日調剤応需の態勢を再開するまでの時間であって、深夜時間を除いた時間をいう。\nカ 休日加算\n(イ) 休日加算の対象となる休日とは、日曜日及び国民の祝日に関する法律（昭和 23 年法律第 178 号）第３条に規定する休日をいう。なお、１月２日、３日、12 月 29 日、\n30 日及び 31 日は休日として取り扱う。\n(ロ) 休日加算は次の患者について算定できるものとする。なお、①以外の理由により常態として又は臨時に当該休日に開局している保険薬局の開局時間内に調剤を受けた患者については算定できない。\n① 地域医療の確保の観点から、以下のいずれかの場合において休日に調剤を受けた患者\n・救急医療対策の一環として設けられている保険薬局の場合、輪番制による休日当番保険薬局の場合\n・感染症対応等の一環として地域の行政機関の要請を受けて休日に開局して調剤を行う保険薬局の場合\n② 当該休日を開局しないこととしている保険薬局で、又は当該休日に調剤を行っている保険薬局の開局時間以外の時間（深夜を除く。）に、急病等やむを得ない理由により調剤を受けた患者\nキ 深夜加算\n(イ) 深夜加算は、次の患者について算定できるものとする。なお、①以外の理由により常態として又は臨時に当該深夜時間帯を開局時間としている保険薬局において調剤を受けた患者については算定できない。\n① 地域医療の確保の観点から、以下のいずれかの場合において深夜に調剤を受けた患者\n・救急医療対策の一環として設けられている保険薬局の場合、輪番制による深夜当番保険薬局の場合\n・感染症対応等の一環として地域の行政機関の要請を受けて深夜に開局して調剤を行う保険薬局の場合\n② 深夜時間帯（午後 10 時から午前６時までの間）を開局時間としていない保険薬局、及び当該保険薬局の開局時間が深夜時間帯にまで及んでいる場合にあっては、当該開局時間と深夜時間帯とが重複していない時間に、急病等やむを得ない理由により調剤を受けた患者\n(ロ) 深夜加算を算定する患者については、処方箋の受付時間を当該患者の薬剤服用歴等に記載する。\n(10) 薬剤調製料の夜間・休日等加算\nア 夜間・休日等加算は、午後７時（土曜日にあっては午後１時）から午前８時までの間（休日加算の対象となる休日を除く。）又は休日加算の対象となる休日であって、保険薬局が表示する開局時間内の時間において調剤を行った場合に、処方箋受付１回につき、薬剤調製料の加算として算定する。ただし、時間外加算等の要件を満たす場合には、夜間・休日等加算ではなく、時間外加算等を算定する。\nイ 夜間・休日等加算を算定する保険薬局は開局時間を当該保険薬局の内側及び外側の分かりやすい場所に表示するとともに、夜間・休日等加算の対象となる日及び受付時間帯を薬局内の分かりやすい場所に掲示する。また、平日又は土曜日に夜間・休日等加算を算定する患者については、処方箋の受付時間を当該患者の薬剤服用歴等に記載する。\n(11) 自家製剤加算\nア 自家製剤加算は、イの(1)に掲げる場合以外の場合においては、投薬量、投薬日数等に関係なく、自家製剤による１調剤行為に対し算定し、イの(1)に掲げる錠剤、丸剤、カプセル剤、散剤、顆粒剤又はエキス剤の内服薬を自家製剤の上調剤した場合においては、自家製剤を行った投与日数が７又はその端数を増すごとに所定点数を算定する。ただし、いずれの場合においても、予製剤による場合又は錠剤を分割する場合にあっては所定点数の100 分の 20 に相当する点数を算定する。\nイ 当該加算に係る自家製剤とは、個々の患者に対し薬価基準に収載されている医薬品の剤形では対応できない場合に、医師の指示に基づき、容易に服用できるよう調剤上の特殊な技術工夫（安定剤、溶解補助剤、懸濁剤等必要と認められる添加剤の使用、ろ過、加温、滅菌等）を行った次のような場合であり、既製剤を単に小分けする場合は該当しない。\n(イ) 錠剤を粉砕して散剤とすること。\n(ロ) 主薬を溶解して点眼剤を無菌に製すること。\n(ハ) 主薬に基剤を加えて坐剤とすること。\nウ 「注６」のただし書に規定する「別に厚生労働大臣が定める薬剤」とは、薬価基準に収載されている薬剤と同一剤形及び同一規格を有する薬剤をいう。ただし、当該医薬品が薬価基準に収載されている場合であっても、供給上の問題により当該医薬品が入手困難であり、調剤を行う際に必要な数量を確保できない場合は除く。なお、医薬品の供給上の問題により当該加算を算定する場合には、調剤報酬明細書の摘要欄に調剤に必要な数量が確保できなかった薬剤名とともに確保できなかったやむを得ない事情を記載すること。\nエ 薬価基準に収載されている医薬品に溶媒、基剤等の賦形剤を加え、当該医薬品と異なる剤形の医薬品を自家製剤の上調剤した場合に、次の場合を除き自家製剤加算を算定できる。\n(イ) 調剤した医薬品と同一剤形及び同一規格を有する医薬品が薬価基準に収載されている場合。\n(ロ) 液剤を調剤する場合であって、医薬品、医療機器等の品質、有効性及び安全性の確保等に関する法律（昭和35年法律第145号。以下「医薬品医療機器等法」という。）上の承認事項において用時溶解して使用することとされている医薬品を交付時に溶解した場合\nオ 自家製剤加算を算定した場合には、計量混合調剤加算は算定できない。\nカ 「予製剤」とは、あらかじめ想定される調剤のために、複数回分を製剤し、処方箋受付時に当該製剤を投与することをいう。\nキ 「錠剤を分割する場合」とは、医師の指示に基づき錠剤を分割することをいう。ただし、分割した医薬品と同一規格を有する医薬品が薬価基準に収載されている場合は算定できない。\nク 錠剤を分割して予製剤とする場合においては、予製剤とする場合又は錠剤を分割する場合と同様に自家製剤加算の所定点数を 100 分の 20 にし、小数点以下第一位を四捨五入した点数を算定する。\nケ 通常、成人又は６歳以上の小児に対して矯味剤等を加える必要がない薬剤を６歳未満の乳幼児（以下「乳幼児」という。）に対して調剤する場合において、保険薬剤師が必要性を認めて、処方医の了解を得た後で、単に矯味剤等を加えて製剤した場合であっても、「注６」のイを算定できる。\nコ 自家製剤を行った場合には、賦形剤の名称、分量等を含め製剤工程を調剤録等に記載すること。\nサ 自家製剤は、医薬品の特性を十分理解し、薬学的に問題ないと判断される場合に限り行うこと。\n(12) 計量混合調剤加算\nア 計量混合調剤加算は、薬価基準に収載されている２種類以上の医薬品（液剤、散剤若しくは顆粒剤又は軟・硬膏剤に限る。）を計量し、かつ、混合して、液剤、散剤若しくは顆粒剤として内服薬又は屯服薬を調剤した場合及び軟・硬膏剤等として外用薬を調剤した場合に、投薬量、投薬日数に関係なく、計量して混合するという１調剤行為に対し算定できる。なお、「注７」のただし書に規定する場合とは、次の場合をいう。\n(イ) 液剤、散剤、顆粒剤、軟・硬膏剤について「注６」の自家製剤加算を算定した場合\n(ロ) 薬価基準に収載されている薬剤と同一剤形及び同一規格を有する薬剤を調剤した場合\nイ ドライシロップ剤を液剤と混合した場合は、計量混合調剤加算を算定するものとする。\nウ 処方された医薬品が微量のため、乳幼児に対してそのままでは調剤又は服用が困難である場合において、医師の了解を得た上で賦形剤、矯味矯臭剤等を混合し、乳幼児が正確に、又は容易に服用できるようにした場合は、「注７」を算定できる。ただし、調剤した医薬品と同一剤形及び同一規格を有する医薬品が薬価基準に収載されている場合は、この限りでない。\nエ 計量混合調剤は、医薬品の特性を十分理解し、薬学的に問題ないと判断される場合に限り行うこと。", "label": "区分０１ 薬剤調製料"}, {"id": "s27", "category": "薬学管理料", "kubun": "＜薬学管理料＞", "title": "薬学管理料", "body": "通則\n(１) 薬学管理等は、患者等のプライバシーに十分配慮した上で実施しなければならないものとする。\n(２) 患者に対する服薬指導、服薬支援等を行う際に、日付、曜日、服用時点等の別に薬剤を整理することができる資材（以下「服薬カレンダー等」という。）を提供する場合にあっては、患者から実費を徴収しても差し支えない。\n(３) 服薬管理指導料等を算定する場合における他の薬学管理料の算定の可否は別表１のとおりであるため、参考とされたい。\n(４) 薬学管理等の実施に当たっては、薬剤師法第 28 条で規定される調剤録において情報の提供及び指導の内容の要点等の記入が義務づけられていることから、必要事項等が記録されている薬剤服用歴等を作成すること。薬剤服用歴等は同一患者についての全ての記録が必要に応じ直ちに参照できるよう患者ごとに保存及び管理するものであり、オンライン資格確認等システムを通じて取得した患者の診療情報、薬剤情報等を含めて、次の事項等を記載すること。\nア 患者の基礎情報（氏名、生年月日、性別、被保険者証の記号番号、住所、必要に応じて緊急連絡先）\nイ 処方及び調剤内容等（処方した保険医療機関名、処方医氏名、処方日、調剤日、調剤した薬剤、処方内容に関する照会の要点等）\nウ 以下の患者情報並びに当該情報等を踏まえた薬学的管理及び指導の要点\n(イ) 患者の体質（アレルギー歴、副作用歴等を含む。）、薬学的管理に必要な患者の生活像及び後発医薬品の使用に関する患者の意向\n(ロ) 疾患に関する情報（既往歴、合併症及び他科受診において加療中の疾患に関するものを含む。）\n(ハ) 併用薬（要指導医薬品、一般用医薬品、医薬部外品及び健康食品を含む。）等の状況及び服用薬と相互作用が認められる飲食物の摂取状況\n(ニ) 服薬状況\n(ホ) 残薬状況（残薬がないときは、その旨を記載すること。）\n(へ) 患者の服薬中の体調の変化（副作用が疑われる症状など）及び患者又はその家族等からの相談事項の要点\n(ト) 手帳活用の有無（手帳を活用しなかった場合はその理由と患者への指導の有無。また、複数の手帳を所有しており１冊にまとめなかった場合は、その理由）\nエ 今後の継続的な薬学的管理及び指導の留意点\nオ 指導した保険薬剤師の氏名\n(５) 薬剤服用歴等の記載に当たっては、患者から収集した情報、相談事項及び患者への指導内容を単に全て記載するのではなく、その要点を記載することで差し支えないが、指導後速やかに記載を完了させること。また、定型文を用いて画一的に記載するのではなく、指導等を行った保険薬剤師が必要事項を判断して記載すること。特に、薬学管理料やその加算を算定する場合には、その根拠及び指導内容等について簡潔に記載すること。なお、指導の内容等について処方医等へ情報提供した場合には、情報提供した文書等の写し又はその内容の要点等を薬剤服用歴等に記載又は添付すること。\n(６) 薬剤服用歴等の保存については、最終記入日から起算して３年間保存すること。", "label": "通則"}, {"id": "s28", "category": "薬学管理料", "kubun": "区分１０の２ 調剤管理料", "title": "１ 調剤管理料", "body": "１ 調剤管理料\n(１) 調剤管理料は、保険薬剤師が、患者又はその家族等から収集した当該患者の投薬歴、副作用歴、アレルギー歴、服薬状況等の情報、手帳、医薬品リスク管理計画（（医薬品、医薬部外品、化粧品、医療機器及び再生医療等製品の製造販売後安全管理の基準に関する省令（平成 16 年厚生労働省令第 135 号）第２条第３項に規定するものをいう。以下同じ。）に基づき製造販売業者が策定した医薬品に限る。）、薬剤服用歴等に基づき、受け付けた処方箋の処方内容について、薬学的分析及び評価を行った上で、患者ごとに薬剤服用歴への記録その他必要な薬学的管理を行った場合に算定できる。\n(２) 調剤管理料は、同一患者の１回目の処方箋受付時から算定できる。\n(３) 調剤管理料１は、１回の処方箋受付について、４剤以上ある場合についても、３剤として算定する。\n(４) 内服薬について、隔日投与等の指示により患者が服用しない日がある場合における調剤管理料１は、実際の投与日数により算定する。\n(５) 調剤管理料２は、処方箋受付１回につき所定点数を算定する。また、調剤管理料１を算定した場合は、調剤管理料２は算定することができない。\n(６) 調剤管理料については、特別調剤基本料Ｂを算定している保険薬局は算定できない。\n(７) 同一保険薬局で同一処方箋を分割調剤（調剤基本料の「注９」の薬剤の保存が困難である等の理由による分割調剤又は「注 10」の後発医薬品の試用のための分割調剤に限る。）した場合は、１回目の調剤から通算した日数に対応する点数から前回までに請求した点数を減じて得た点数により算定する。\n(８) 調剤基本料の「注 11」の医師の指示による分割調剤における２回目以降の調剤を行う場合には、患者の服薬状況、服薬期間中の体調の変化等について確認し、その結果を処方医に情報提供する。この場合において、次に掲げる事項を含めるものとする。また、処方医に対して情報提供した内容の要点を薬剤服用歴等に記載する。\n・残薬の有無\n・残薬が生じている場合はその量及び理由\n・患者の服薬中の体調の変化（副作用が疑われる症状など）の有無\n・副作用が疑われる場合はその原因の可能性がある薬剤の推定", "label": "１. 調剤管理料"}, {"id": "s29", "category": "薬学管理料", "kubun": "区分１０の２ 調剤管理料", "title": "２ 調剤時残薬調整加算", "body": "２ 調剤時残薬調整加算\n(１) 調剤時残薬調整加算は、薬剤服用歴等や患者又はその家族等から収集した情報等に基づき、残薬の外形状態・保管状況その他の残薬の状況が確認された患者において、処方医に対して照会を行い、７日分以上相当の調剤日数の変更が行われた場合に、処方箋受付１回につき算定する。調剤日数の変更は、患者が次回受診日等を考慮して意図的に残薬を生じさせているのかなど、残薬調整の必要性を患者又はその家族等に確認してから行うこととし、単に７日分以上の残薬があったことをもって機械的に行ってはならない。ただし、薬剤師が患者の服薬状況等により必要性があると判断し、処方医に対する照会の結果に基づき６日分以下相当の調剤日数の変更を行う場合には、残薬が７日分を超えないにもかかわらず調整する必要性を調剤報酬明細書に記載することで算定可能とする。この場合において、次回受診日（調剤日）を患者又はその家族等に確認した上で、残薬が７日分を超えないにもかかわらず調整する必要性を患者又はその家族等に説明するとともに、これらの概要を薬剤服用歴へ記録しなければならない。認知機能に問題が無い患者等について、継続的に同じような内容の処方箋の発行を受けているため残薬が７日分を超えるまで待つことが合理的な状況において、６日分以下相当の処方日数の変更を行う場合には算定できない。また、処方医が同意していることのみをもって６日分以下相当の処方日数の変更を行う場合も算定できない。\n(２) 処方箋の「調剤する薬剤を減量した上で保険医療機関に情報提供」の欄にその旨の指示があり、薬剤服用歴等や患者又はその家族等から収集した情報等に基づき、残薬の外形状態・保管状況その他の残薬の状況が確認された患者においては、７日分以上相当の減数調剤を行った場合に、処方箋受付１回につき算定する。調剤日数の変更は、患者が次回受診日等を考慮して意図的に残薬を生じさせているのかなど、残薬調整の必要性を患者又はその家族等に確認してから行うこととし、単に７日分以上の残薬があったことをもって機械的に行ってはならない。ただし、薬剤師が患者の服薬状況等により必要性があると判断し、６日分以下相当の調剤日数の変更を行う場合には、残薬が７日分を超えないにもかかわらず調整する必要性を調剤報酬明細書に記載すること。この場合において、次回受診日（調剤日）を患者又はその家族等に確認した上で、残薬が７日分を超えないにもかかわらず調整する必要性を患者又はその家族等に説明するとともに、これらの概要を薬剤服用歴へ記録しなければならない。認知機能に問題が無い患者等について、継続的に同じような内容の処方箋の発行を受けているため残薬が７日分を超えるまで待つことが合理的な状況において、６日分以下相当の処方日数の変更を行う場合には算定できない。また、処方医が同意していることのみをもって６日分以下相当の処方日数の変更を行う場合も算定できない。なお、残薬を確認した結果、減数調剤を行うに当たって、調剤する医薬品の調剤日数又は数量を「０」とすることはできない。\n(３) 調剤時残薬調整加算は、次のいずれかにより算定する。\nア 調剤時残薬調整加算のイは、在宅患者訪問薬剤管理指導料、在宅患者緊急訪問薬剤管理指導料、在宅患者緊急時等共同指導料、居宅療養管理指導費又は介護予防居宅療養管理指導費を算定している患者において、処方箋の交付前に処方しようとする医師へ処方に係る提案を行い、当該提案に基づく処方内容の処方箋を受け付けた場合に算定する。\nイ 調剤時残薬調整加算のロは、在宅患者訪問薬剤管理指導料、在宅患者緊急訪問薬剤管理指導料、在宅患者緊急時等共同指導料、居宅療養管理指導費又は介護予防居宅療養管理指導費を算定している患者において、（１）又は（２）を実施した場合に算定する。\nウ 調剤時残薬調整加算のハは、服薬管理指導料「１のイ」又は「２のイ」を算定する患者において、（１）又は（２）を実施した場合に算定する。\nエ 調剤時残薬調整加算のニは、アからウまで以外の場合において、（１）又は（２）を実施した場合に算定する。\n(４) 残薬が確認され、調剤する医薬品の数量を減らした場合は、次に掲げる内容について実施すること。\nア 患者の残薬の状況、その理由及び実際に患者へ交付した薬剤の投与量、患者への説明内容等について、原則、翌営業日までに当該減数調剤に係る処方箋を発行した保険医療機関に情報提供すること。なお、電子処方箋管理サービスのコメント機能に当該内容を記載することにより、処方医が当該情報を確認できる場合には、当該記載をもって処方医への情報提供に代えることができる。\nイ 患者に対して次回受診時に処方医へ残薬の状況を報告することを促すこと。\nウ 手帳を用いて服薬管理指導を行う場合には当該手帳に記載すること。\nエ 処方医に連絡・確認した内容の要点、変更した医薬品の品目名と数量等を、薬剤服用歴等に記載すること。\n(５) 当該加算を算定する場合においては、残薬が生じる理由を分析するとともに、処方医に対して連絡・確認する際に必要に応じてその理由を処方医に情報提供すること。\n(６) 「７日分以上相当」とは、内服薬等、日数単位で処方される医薬品については、調剤日数を７日分以上減じた場合を指す。屯服薬においては７回分以上、外用薬においては１回使用量に鑑みて７回分以上の使用量のことをいう。また、隔日投与等の指示により患者が服用しない日がある医薬品の場合は、実際に服薬する日数によるものとする。\n(７) ６日分以下相当の処方日数の変更を行う理由は、がん化学療法薬等の高額な医薬品であるため患者負担等の軽減する必要が特に高いこと又は薬学的専門的な観点によることとする。\n(８) 調剤管理料を算定していない場合は、当該加算は算定できない。\n(９) 調剤時残薬調整加算は、複数の処方について実施した場合であっても、処方箋受付１回につき１回のみ算定可能とする。", "label": "２. 調剤時残薬調整加算"}, {"id": "s30", "category": "薬学管理料", "kubun": "区分１０の２ 調剤管理料", "title": "３ 薬学的有害事象等防止加算", "body": "３ 薬学的有害事象等防止加算\n(１) 薬学的有害事象等防止加算は、薬剤服用歴等又は患者及びその家族等からの情報等に基づき、次に掲げる内容について、処方医に対して連絡・確認を行い、処方の変更（残薬調整に係るものを除く。）が行われた場合に処方箋受付１回につき算定する。\nア 併用薬との重複投薬（薬理作用が類似する場合を含む。）\nイ 併用薬、飲食物等との相互作用\nウ そのほか薬学的観点から必要と認める事項\n(２) 薬学的有害事象等防止加算は、次に掲げる区分により算定する。\nア 薬学的有害事象等防止加算のイは、在宅患者訪問薬剤管理指導料、在宅患者緊急訪問薬剤管理指導料、在宅患者緊急時等共同指導料、居宅療養管理指導費又は介護予防居宅療養管理指導費を算定している患者において、処方箋の交付前に処方しようとする医師へ処方に係る提案（残薬調整に係るものを除く。）を行い、当該提案に基づく処方内容の処方箋を受け付けた場合に算定する。\nイ 薬学的有害事象等防止加算のロは、在宅患者訪問薬剤管理指導料、在宅患者緊急訪問薬剤管理指導料、在宅患者緊急時等共同指導料、居宅療養管理指導費又は介護予防居宅療養管理指導費を算定している患者において、（１）を実施した場合に算定する。\nウ 薬学的有害事象等防止加算のハは、服薬管理指導料「１のイ」又は「２のイ」を算定する患者において、（１）を実施した場合に算定する。\nエ 薬学的有害事象等防止加算のニは、アからウまで以外の場合において、（１）を実施した場合に算定する。\n(３) 当該加算を算定する場合においては、重複投薬が生じる理由を分析するとともに、処方医に対して連絡・確認する際に必要に応じてその理由を処方医に情報提供すること。\n(４) 薬学的有害事象等防止加算の対象となる事項について、処方医に連絡・確認を行った内容の要点、変更内容を薬剤服用歴等に記載する。\n(５) 調剤管理料を算定していない場合は、当該加算は算定できない。\n(６) 同時に複数の処方箋を受け付け、複数の処方箋について薬剤を変更した場合であっても、１回に限り算定する。", "label": "３. 薬学的有害事象等防止加算"}, {"id": "s31", "category": "薬学管理料", "kubun": "区分１０の３ 服薬管理指導料", "title": "１ 通則", "body": "１ 通則\n(１) 服薬管理指導料は、同一患者の１回目の処方箋受付時から算定できる。\n(２) 服薬管理指導料は、在宅患者訪問薬剤管理指導料を算定している患者の場合、当該患者の薬学的管理指導計画に係る疾病と別の疾病又は負傷に係る臨時の処方箋によって調剤を行った場合に限り算定できる（服薬管理指導料「４のロ」及び「４のハ」を除く。）。\n(３) 算定に当たっては、薬学管理料の通則（４）の薬剤服用歴等を活用して必要な情報提供及び指導を行うものであり、指導後は、その要点を薬剤服用歴等に速やかに記載すること。\n(４) 算定に当たっては、「必要な指導等」として次に掲げる事項を全て行うこと。\nア 患者ごとに作成した薬剤服用歴等に基づいて、処方された薬剤の重複投薬、相互作用、薬物アレルギー等を確認した上で、次に掲げる事項その他の事項を文書又はこれに準ずるもの（以下「薬剤情報提供文書」という。）により患者又はその家族等に情報提供し、薬剤の服用に関し、基本的な説明を行うこと。また、必要に応じて、製造販売業者が作成する医薬品リスク管理計画（Risk Management Plan：以下「ＲＭＰ」という。）に基づく患者向け資材を活用すること。\n(イ) 当該薬剤の名称（一般名処方による処方箋又は後発医薬品への変更が可能な処方箋の場合においては、現に調剤した薬剤の名称）、形状（色、剤形等）\n(ロ) 用法、用量、効能及び効果\n(ハ) 副作用及び相互作用\n(ニ) 服用及び保管取扱い上の注意事項\n(ホ) 調剤した薬剤に対する後発医薬品又はバイオ後続品に関する情報\n(ヘ) 保険薬局の名称、情報提供を行った保険薬剤師の氏名\n(ト) 保険薬局又は保険薬剤師の連絡先等\nイ 服薬状況等の情報を踏まえた薬学的知見に基づき、処方された薬剤について、薬剤の服用等に関して、次に掲げる指導を行うこと。\n(イ) 薬剤服用歴等を参照しつつ、患者又はその家族等と対話することにより、当該患者の服薬状況、服薬期間中の体調の変化、残薬の状況等の情報を収集し、それを踏まえて、投与される薬剤の適正使用のために必要な服薬指導を行うこと。なお、副作用に係る自覚症状の有無の確認に当たって、特に重大な副作用が発現するおそれがある医薬品については、「重篤副作用疾患別対応マニュアル」（厚生労働省）等を参考とすること。\n(ロ) 以下の事項については、処方箋の受付後、薬を取りそろえる前に、保険薬剤師が患者等に確認すること。\n① 患者の体質（アレルギー歴、副作用歴等を含む）、薬学的管理に必要な患者の生活像及び後発医薬品の使用に関する患者の意向\n② 疾患に関する情報（既往歴、合併症及び他科受診において加療中の疾患に関するものを含む。）\n③ 併用薬（要指導医薬品、一般用医薬品、医薬部外品及び健康食品を含む。）等の状況及び服用薬と相互作用が認められる飲食物の摂取状況\n④ 服薬状況（残薬の状況を含む。）\n⑤ 患者の服薬中の体調の変化（副作用が疑われる症状など）及び患者又はその家族等からの相談事項の要点\n(ハ) 手帳を用いる場合は、調剤を行った薬剤について、調剤日、当該薬剤の名称（一般名処方による処方箋又は後発医薬品への変更が可能な処方箋の場合においては、現に調剤した薬剤の名称）、用法、用量その他必要に応じて服用に際して注意すべき事項等を患者の手帳に経時的に記載すること。\n(ニ) 残薬の状況について、薬剤服用歴等を踏まえつつ、患者又はその家族等に残薬の有無を確認し、残薬が確認された場合はその理由も把握すること。患者に残薬が一定程度認められると判断される場合には、患者の残薬の状況及びその理由を患者の手帳や薬剤服用歴、電子処方箋管理サービス等に簡潔に記載し、処方医に対して情報提供するよう努めること。また、残薬が相当程度認められると判断される場合には、処方医に対して連絡し、投与日数等の確認を行うよう努めること。\n(ホ) 当該保険薬局と他の保険薬局又は保険医療機関等の間で円滑に連携が行えるよう、患者が日常的に利用する保険薬局があれば、その名称及び保険薬局又は保険薬剤師の連絡先等を手帳に記載するよう患者に促すこと。\n(へ) 一般名処方が行われた医薬品については、原則として後発医薬品又はバイオ後続品を調剤することとするが、患者に対し後発医薬品又はバイオ後続品の有効性、安全性や品質について適切に説明した上で、後発医薬品又はバイオ後続品を調剤しなかった場合は、その理由を調剤報酬明細書の摘要欄に記載する。\n(ト) 抗微生物薬の適正使用を推進する観点から、「抗微生物薬適正使用の手引き」（厚生労働省結核感染症課）を参考に、必要な指導等を行うこと。また、必要な指導等を円滑に実施するため、抗菌薬の適正使用が重要であることの普及啓発に資する取組を行っていることが望ましい。\n(チ) ポリファーマシーへの対策の観点から、「高齢者の医薬品適正使用の指針（総論編）」（厚生労働省）、「高齢者の医薬品適正使用の指針（各論編（療養環境別））」（厚生労働省）及び日本老年医学会の関連ガイドライン（高齢者の安全な薬物療法ガイドライン）等を参考に、必要な指導等を行うこと。また、必要に応じて、患者に対してポリファーマシーに関する一般的な注意の啓発や、日本老年医学会及び日本老年薬学会が作成する「日本版抗コリン薬リスクスケール」や「高齢者施設の服薬簡素化提言」に準じた対応を行うこと。その際、同学会が作成する「高齢者が気を付けたい多すぎる薬と副作用」等を参考にすること。なお、ここでいうポリファーマシーとは、「単に服用する薬剤数が多いことではなく、それに関連して薬物有害事象のリスク増加、服薬過誤、服薬アドヒアランス低下等の問題につながる状態」をいう。\nウ 手帳を用いる場合は、調剤日、投薬に係る薬剤の名称、用法、用量その他服用に際して注意すべき事項を手帳に記載すること。\nエ これまでに投薬された薬剤のうち服薬していないものの有無の確認に基づき、必要な指導を行うこと。\nオ 薬剤情報提供文書により、投薬に係る薬剤に対する後発医薬品又はバイオ後続品に関する情報（後発医薬品又はバイオ後続品の有無及び価格に関する情報を含む。）を患者に提供すること。\nカ 処方された薬剤について、薬剤交付後においても、当該患者の服薬状況、服薬期間中の体調の変化等について、継続的かつ的確に把握するとともに、必要に応じて次に掲げる指導等を実施すること。\n(イ) 保険薬剤師が、患者の服用している薬剤の特性や患者の服薬状況等に応じてその必要性を個別に判断した上で適切な方法で実施すること。\n(ロ) 保険薬剤師が必要と認める場合は、薬剤交付後においても電話等により、（４）のイの（ロ）に掲げる内容について、保険薬剤師が患者等に確認し、その内容を踏まえ、必要な指導等を実施すること。\n(ハ) （ロ）の対応は情報通信機器を用いた方法（ＡＩを活用して患者の状態に応じたフォローアップ等の内容を作成する場合を含む。）により実施して差し支えないが、この場合においては、フォローアップ等のために送信する内容及び送信する時期について当該保険薬局の保険薬剤師が確認した上で送信し、その後の患者とのやりとり内容を踏まえ、当該保険薬剤師の判断により適切に介入を行うなど、個々の患者の状況等に応じて対応する必要があること。\n(ニ) 継続的服薬指導に当たっては、「薬剤使用期間中の患者フォローアップ～適正な薬物治療共同管理計画に向けたフォローを実施するために～」等を参考とすること。\n(５) 指導等に係る留意点（４）の業務を行うに当たっては、以下の点に留意すること。\nア 情報提供等\n(イ) （４）のアの薬剤情報提供文書により行う薬剤に関する情報提供は、調剤を行った全ての薬剤の情報が一覧できるようなものとする。ただし、調剤した薬剤を複数の薬袋に入れ交付する場合は、薬袋ごとに一覧できる文書とすることができる。なお、薬剤情報提供文書については、処方内容が前回と同様の場合等においては、必ずしも指導の都度、患者に交付する必要はないが、患者の意向等を踏まえた上で交付の必要性を判断すること。\n(ロ) （４）のアの薬剤情報提供文書における「これに準ずるもの」とは、ボイスレコーダー等への録音、視覚障害者に対する点字その他のものをいう。\n(ハ) 効能、効果、副作用及び相互作用に関する記載は、患者等が理解しやすい表現によるものとする。また、提供する情報の内容については正確を期すこととし、文書において薬剤の効能や効果等について誤解を招く表現を用いることや、調剤した薬剤と無関係の事項を記載しないこと。\n(ニ) 情報提供に当たって、抗悪性腫瘍剤や複数の異なる薬効を有する薬剤等であって特に配慮が必要と考えられるものについては、情報提供の前に処方箋発行医に確認する等慎重に対応すること。\n(ホ) (４)のアの(ホ)の「後発医薬品及びバイオ後続品に関する情報」とは、次に掲げる事項とし、薬剤情報提供文書により提供するとともに、必要な説明を行うこと。また、後発医薬品及びバイオ後続品の情報に関しては、可能であれば一般的名称も併せて記載することが望ましい。なお、ここでいう後発医薬品及びバイオ後続品とは、「「新指標の割合の算出に当たって対象となる後発医薬品」等について」の別紙１に掲げられたものに加え、別紙２に掲げられたものも含むものであること。\n① 該当する後発医薬品及びバイオ後続品の薬価基準への収載の有無\n② 該当する後発医薬品及びバイオ後続品のうち、自局において支給可能又は備蓄している後発医薬品及びバイオ後続品の名称及びその価格（当該保険薬局において備蓄しておらず、かつ、支給もできない場合はその旨）\n(ヘ) 指導の内容等について、処方医へ情報提供した場合は、その要点について薬剤服用歴等に記載すること。\nイ 手帳\n(イ) 「手帳」とは、経時的に薬剤の記録が記入でき、かつ次の①から④までに掲げる事項を記録する欄がある薬剤の記録用の手帳をいう。\n① 患者の氏名、生年月日、連絡先等患者に関する記録\n② 患者のアレルギー歴、副作用歴等薬物療法の基礎となる記録\n③ 患者の主な既往歴等疾患に関する記録\n④ 患者が日常的に利用する保険薬局の名称、保険薬局又は保険薬剤師の連絡先等\n①から③までの手帳の欄については、保険薬局において適切に記載されていることを確認する。手帳を有効に活用する観点から、記載されていない場合には、患者に聴取の上記入する、又は患者本人による記入を指導する。④については、当該保険薬局と他の保険薬局又は保険医療機関等の間で円滑に連携が行えるよう、患者が当該保険薬局を日常的に利用している場合には、当該保険薬局が手帳に記入し、患者が他の保険薬局を日常的に利用している場合には、その名称及び保険薬局又は保険薬剤師の連絡先等を手帳に記載するよう患者に促すこと。\n(ロ) 手帳については、患者に対して、手帳を活用することの意義、役割及び利用方法等について十分な説明を行い、患者の理解を得た上で提供することとし、患者の意向等を確認した上で手帳を用いないこととした場合にあっては、その理由を薬剤服用歴等に記載する。なお、手帳を活用しているが、持参を忘れたこと等により提示できない患者に対しては、「注３」のとおり、服薬管理指導料２の点数を算定することになる旨を説明するとともに、次回以降は手帳を提示するよう指導すること。\n(ハ) (４)のイの（ハ）の手帳への記載による情報提供は、調剤を行った全ての薬剤について行うこととする。この場合において、「服用に際して注意すべき事項」とは、重大な副作用又は有害事象等を防止するために特に患者が服用時や日常生活上注意すべき事項、あるいは投薬された薬剤により発生すると考えられる症状（相互作用を含む。）等であり、投薬された薬剤や患者の病態に応じるものである。また、薬学管理料やその加算を算定する場合に、患者等への確認内容、指導の要点等について手帳への記載が求められている場合には、当該内容を簡潔に記載すること。\n(ニ) 手帳による情報提供に当たっては、患者に対して、保険医療機関を受診する際には医師又は歯科医師に手帳を提示するよう指導を行う。また、患者が、保険医療機関や他の保険薬局から交付されたものを含め、複数の手帳を所有していないか確認するとともに、所有している場合は患者の意向を確認した上で、同一の手帳で管理できると判断した場合は１冊にまとめる。なお、１冊にまとめなかった場合については、その理由を薬剤服用歴等に記載する。\n(ホ) 患者が手帳の持参を忘れたことにより提示できない場合は、手帳に追加すべき事項が記載されている文書（シール等）を交付し、患者が現に利用している手帳に貼付するよう患者に対して説明することで、既に患者が保有している手帳が有効に活用されるよう努めるとともに、当該患者が次回以降に手帳を提示した場合は、当該文書が貼付されていることを確認する。\n(ヘ) 電子版の手帳については、「電子版お薬手帳ガイドラインについて」（令和５年３月 31 日薬生総発第 0331 第１号）の「２．運営事業者等が留意すべき事項」を満たした手帳であれば、紙媒体の手帳と同様の取扱いとする。その際、保険薬局においては、同通知の「３．提供施設が留意すべき事項」を満たす必要がある。\n(ト) 手帳の媒体（紙媒体又は電子媒体）は患者が選択するものであり、手帳の提供に当たっては、患者に対して個人情報の取扱い等の必要事項を説明した上で、患者の意向を踏まえて提供する媒体を判断すること。\n(チ) 紙媒体の手帳を利用している患者に対して、患者の希望により電子版の手帳を提供する場合には、電子版の手帳にこれまでの紙媒体の情報を利用できるようにするなど、提供する保険薬局が紙媒体から電子媒体への切り替えを適切に実施できるよう対応すること。\nウ その他\n(４)のイの（ニ）の残薬の状況の確認に当たり、患者又はその家族等から確認できなかった場合には、次回の来局時には確認できるよう指導し、その旨を薬剤服用歴等に記載する。\n(６) 服薬管理指導料は、特別調剤基本料Ｂを算定している保険薬局は算定できない。", "label": "１. 通則"}, {"id": "s32", "category": "薬学管理料", "kubun": "区分１０の３ 服薬管理指導料", "title": "２ 服薬管理指導料１及び２", "body": "２ 服薬管理指導料１及び２\n(１) 服薬管理指導料１及び２は、保険薬剤師が、患者の薬剤服用歴等及び服用中の医薬品等について確認した上で、１の(４)の「必要な指導等」の全てを対面により行った場合に、以下の区分により算定する。\nア 服薬管理指導料「１のイ」３月以内に再度処方箋を持参した患者であって、手帳を提示したもののうち、当該患者又はその家族等が選択した特定の保険薬剤師（以下「かかりつけ薬剤師」という。）が継続的及び一元的に服薬管理しているもの\nイ 服薬管理指導料「１のロ」以下のいずれかに該当する患者\n(イ) ３月以内に再度処方箋を持参した患者であって、手帳を提示したもののうち、かかりつけ薬剤師が勤務する保険薬局において、かかりつけ薬剤師以外の保険薬剤師が服薬指導したもの\n(ロ) ３月以内に再度処方箋を持参した患者であって、手帳を提示したもののうち、かかりつけ薬剤師を持たないもの\nウ 服薬管理指導料「２のイ」以下のいずれかに該当する患者であって、かかりつけ薬剤師が継続的及び一元的に服薬管理しているもの\n(イ) ３月を超えて再度処方箋を持参した患者\n(ロ) ３月以内に再度処方箋を持参した患者であって、手帳を提示しないもの\nエ 服薬管理指導料「２のロ」初めて処方箋を持参した患者等、アからウまでのいずれにも該当しないもの\n(２) 服薬管理指導料「１のイ」及び「２のイ」に係るかかりつけ薬剤師による指導等に係る留意点\nア 服薬管理指導料「１のイ」及び「２のイ」は、かかりつけ薬剤師が、保険医と連携して患者の服薬状況を継続的及び一元的に把握した上で、当該指導等に係る同意を得た患者に対して服薬指導等を行った場合に算定できる。\nイ 算定に当たっては、当該指導料を算定しようとする保険薬剤師本人が、かかりつけ薬剤師の業務内容やかかりつけ薬剤師を持つことの意義、役割等を説明した上で、患者又はその家族等から同意を得ること。\nウ 患者又はその家族等からかかりつけ薬剤師として選択され、同意を取得した際は、当該患者の持つ手帳に１の（５）のイの（イ）の①から④までの事項及び薬剤師の氏名の近傍に「かかりつけ」の文字を記入し、これらが記載されたページのコピー等を当該保険薬局において保管し、当該患者の薬剤服用歴等にその旨を記載すること。原則として、別の保険薬局のかかりつけ薬剤師の氏名が記載されている手帳に上書きしてはならないこと。患者の選択によりかかりつけ薬剤師を変更する場合には、薬剤服用歴にもその旨を記載すること。\nエ 同意取得は、当該保険薬局に複数回来局している患者に行うこととする。また、患者又はその家族等の同意を得た後、その際の処方箋受付時から算定できる。なお、１人の患者に対して、１か所の保険薬局における１人の保険薬剤師のみについて服薬管理指導料の「１のイ」又は「２のイ」を算定できるものであり、同一月内は同一の保険薬局における同一の保険薬剤師について算定すること。\nオ 患者に対する服薬指導等の業務はかかりつけ薬剤師が行うことを原則とする。ただし、やむを得ない事由により、かかりつけ薬剤師が業務を行えない場合は、当該保険薬局に勤務する他の保険薬剤師が服薬指導等を行っても差し支えないが、この場合は服薬管理指導料「１のロ」又は「２のロ」を算定するとともに、他の保険薬剤師が服薬指導等で得た情報については、かかりつけ薬剤師と情報を共有すること。\nカ かかりつけ薬剤師は、担当患者に対して、以下の服薬指導等を行う。\n(イ) 患者の理解に応じた適切な服薬指導等を行うこと。\n(ロ) 患者が服用中の薬剤等について、患者を含めた関係者が一元的、継続的に確認できるよう、患者の意向を確認した上で、服薬指導等の内容を手帳等に記載すること。\n(ハ) 患者が受診している全ての保険医療機関の情報を把握し、服用している処方薬をはじめ、要指導医薬品及び一般用医薬品（以下「要指導医薬品等」という。）並びに健康食品等について全て把握するとともに、その内容を薬剤服用歴等に記載すること。また、当該患者に対して、保険医療機関を受診する場合や他の保険薬局で調剤を受ける場合には、かかりつけ薬剤師を有している旨を明示するよう説明すること。\n(ニ) 患者がかかりつけ薬剤師からの服薬指導等を受けられるよう、当該保険薬局における勤務日等の必要な情報を伝えること。\n(ホ) 患者から休日、夜間を含む時間帯の相談に応じる体制をとり、開局時間外の連絡先を伝えること。原則として、かかりつけ薬剤師が相談に対応することとするが、当該保険薬局のかかりつけ薬剤師以外の別の保険薬剤師が相談等に対応しても差し支えない。ただし、この場合において、かかりつけ薬剤師以外の他の保険薬剤師は、開局時間外に当該患者から連絡があった旨とその内容、調剤や服薬指導等を行った場合にはその内容、その他当該患者について得た情報について、かかりつけ薬剤師と共有すること。また、やむを得ない事由により、患者からの電話等による問い合わせに応じることができなかった場合は、速やかに折り返して連絡することができる体制がとられていること。なお、自宅等の当該保険薬局以外の場所で対応する場合にあっては、必要に応じて薬剤服用歴等が閲覧できる体制が整備されていることが望ましい。\n(へ) 患者が他の保険薬局等で調剤を受けた場合は、その服用薬等の情報を入手し、薬剤服用歴等に記載すること。\n(ト) 継続的な薬学的管理のため、患者に対して、服用中の薬剤等を保険薬局に持参する動機付けのために薬剤等を入れる袋等を必要に応じて提供し、その取組（いわゆるブラウンバッグ運動）の意義等を説明すること。\n(チ) 必要に応じ、患者が入手している調剤及び服薬指導に必要な血液・生化学検査結果の提示について、患者の同意が得られた場合は当該情報を参考として、薬学的管理及び指導を行うこと。\nキ 服薬管理指導料「１のイ」又は「２のイ」を算定する患者以外の患者への服薬指導等又は地域住民からの要指導医薬品等の使用に関する相談及び健康の維持増進に関する相談に対しても、丁寧に対応した上で、必要に応じて保険医療機関へ受診勧奨を行うよう努める。\nク 育児休業、介護休業等育児又は家族介護を行う労働者の福祉に関する法律（平成３年法律第 76 号）第 16 条の８で定める期間に、当該保険薬局の勤務時間が週 31 時間に満たない保険薬剤師が算定する場合には、次に掲げる対応を行う。\n(イ) 同意取得に当たっては、勤務時間が通常より短いことや、休日、夜間の時間帯を含む開局時間外に相談があった場合の対応を他の保険薬剤師が行う場合は、その旨を説明する。\n(ロ) 当該保険薬局に勤務する他の保険薬剤師と当該患者についての情報を共有し、患者から問い合わせがあった場合等に、他の保険薬剤師が円滑に対応できる体制を整えておく。\nケ 令和８年５月 31 日以前に取得した同意はその効力を有するが、ウについて未実施である場合には対応すること。ただし、患者又はその家族等が同意の取消しを申し出た場合は、この限りでない。", "label": "２. 服薬管理指導料１及び２"}, {"id": "s33", "category": "薬学管理料", "kubun": "区分１０の３ 服薬管理指導料", "title": "３ 服薬管理指導料３", "body": "３ 服薬管理指導料３\n(１) 服薬管理指導料３は、以下のいずれかの場合に算定できる。\nア 保険薬剤師が地域密着型介護老人福祉施設若しくは介護老人福祉施設に入所している患者又は短期入所生活介護若しくは介護予防短期入所生活介護を受けている患者（以下「介護老人福祉施設等の患者」という。）を訪問し、当該患者等（当該患者の薬剤を管理している当該施設の職員を含む。）に対して対面により必要な指導等を行った場合\nイ 介護医療院又は介護老人保健施設に入所している患者であって、医師が高齢者の医療の確保に関する法律の規定による療養の給付等の取扱い及び担当に関する基準（昭和 58 年厚生省告示第 14 号）第 20 条第４号ハに係る処方箋を交付した場合に、保険薬剤師が患者を訪問し、当該患者等（当該患者の薬剤を管理している当該施設の職員を含む。）に対して対面により必要な指導等を行った場合\n(２) 算定にあたっては、「必要な指導等」として１の（４）に掲げる事項を行うこと。ただし、情報提供に係る事項は、患者又は現にその看護に当たっている者及び当該患者の薬剤を管理している当該施設の職員に対して実施することとする。\n(３) 服薬管理指導料３は月に４回に限り算定する。\n(４) 「注 16」に規定する交通費は実費とする。", "label": "３. 服薬管理指導料３"}, {"id": "s34", "category": "薬学管理料", "kubun": "区分１０の３ 服薬管理指導料", "title": "４ 服薬管理指導料４", "body": "４ 服薬管理指導料４\n(１) 服薬管理指導料４は、オンライン服薬指導等を行った場合に、以下の区分により算定する。\nア 服薬管理指導料「４のイ」\n(イ) ３月以内に再度処方箋を持参した患者であって、手帳を提示したもの\n(ロ) 介護老人福祉施設等の患者\nイ 服薬管理指導料「４のロ」在宅で療養を行っている患者であって、通院が困難なもの（ただし、ウを除く。）\nウ 服薬管理指導料「４のハ」在宅で療養を行っている患者であって、通院が困難なもののうち、状態の変化等を伴うもの\nエ 服薬管理指導料「４のニ」アからウまでに該当せず、以下のいずれかに該当する患者\n(イ) 初めて処方箋を提出した患者\n(ロ) ３月を超えて再度処方箋を提出した患者\n(ハ) ３月以内に再度処方箋を提出した患者であって、手帳を提示していないもの\n(２) 服薬管理指導料４の留意点\nア オンライン服薬指導等により、「必要な指導等」として１の（４）に掲げる事項を行うこと。\nイ 患者の薬剤服用歴等を経時的に把握するため、原則として、手帳により薬剤服用歴等及び服用中の医薬品等について確認すること。また、患者が服用中の医薬品等について、患者を含めた関係者が継続的及び一元的に確認できるよう必要な情報を手帳に添付又は記載すること。\nウ 当該服薬指導を行う際の情報通信機器の運用に要する費用及び医薬品等を患者に配送する際に要する費用は、療養の給付と直接関係ないサービス等の費用として、社会通念上妥当な額の実費を別途徴収できる。\nエ 薬剤を患者に配送する場合は、その受領の確認を行うこと。\n(３) 服薬管理指導料「４のイ」の留意点介護老人福祉施設等の患者に対して、情報通信機器を用いた薬剤管理指導を行った場合に、服薬管理指導料３及び服薬管理指導料「４のイ」を合わせて月４回に限り算定する。\n(４) 服薬管理指導料「４のロ」の留意点\nア 服薬管理指導料「４のロ」は、訪問薬剤管理指導を行っている保険薬局において、在宅での療養を行っている患者であって通院が困難なものに対して、情報通信機器を用いた薬剤管理指導（訪問薬剤管理指導と同日に行う場合を除く。）を行った場合に、在宅患者訪問薬剤管理指導料１から３まで並びに服薬管理指導料「４のロ」を合わせて月４回（末期の悪性腫瘍の患者、注射による麻薬の投与が必要な患者又は中心静脈栄養法の対象患者にあっては、週２回かつ月８回）に限り算定する。\nイ 当該指導料は、保険薬剤師１人につき、在宅患者訪問薬剤管理指導料１から３までと合わせて週 40 回に限り算定できる。\nウ 訪問診療を行った医師に対して、在宅患者オンライン薬剤管理指導の結果について必要な情報提供を文書で行うこと。\nエ 在宅患者訪問薬剤管理指導料又は服薬管理指導料「４のロ」を月２回以上算定する場合（末期の悪性腫瘍の患者、注射による麻薬の投与が必要な患者又は中心静脈栄養法の対象患者に対するものを除く。）は、算定回数は週１回を限度とする。末期の悪性腫瘍の患者、注射による麻薬の投与が必要な患者又は中心静脈栄養法の対象患者については、在宅患者訪問薬剤管理指導料１から３までと合わせて週２回かつ月８回に限り算定できる。\n(５) 服薬管理指導料「４のハ」の留意点服薬管理指導料「４のハ」は、訪問薬剤管理指導を行っている保険薬局において、在宅での療養を行っている患者であって通院が困難なものの状態の変化等に伴い、情報通信機器を用いた薬剤管理指導を行った場合（訪問薬剤管理指導と同日に行う場合を除く。）に、在宅患者緊急訪問薬剤管理指導料１及び２並びに服薬管理指導料「４のハ」を合わせて月４回（末期の悪性腫瘍の患者又は注射による麻薬の投与が必要な患者にあっては、月８回）に限り算定する。この場合において、在宅患者緊急訪問薬剤管理指導料は算定できない。", "label": "４. 服薬管理指導料４"}, {"id": "s35", "category": "薬学管理料", "kubun": "区分１０の３ 服薬管理指導料", "title": "５ 麻薬管理指導加算", "body": "５ 麻薬管理指導加算\n(１) 麻薬管理指導加算は、当該患者又はその家族等に対して、調剤後、継続的に電話等により投与される麻薬の服用状況、残薬の状況及び保管状況について確認し、残薬の適切な取扱方法も含めた保管取扱い上の注意等に関し必要な指導を行うとともに、麻薬による鎮痛等の効果や患者の服薬中の体調の変化（副作用が疑われる症状など）の有無の確認を行い、必要な薬学的管理及び指導を行った場合に算定する。\n(２) （１）の電話等による確認方法については、電話の他に情報通信機器を用いた方法も含まれるが、患者等に一方的に情報発信すること（例えば、一律の内容の電子メールを一斉送信すること）のみでは継続的服薬指導を実施したことにはならないため、個々の患者の状況等に応じた必要な対応を行うこと。\n(３) （１）の麻薬による鎮痛等の効果や患者の服薬中の体調の変化の有無の確認等に当たっては、「がん疼痛の薬物療法に関するガイドライン」（日本緩和医療学会）、「新版 がん緩和ケアガイドブック」（日本医師会監修 厚生労働科学特別研究事業「適切な緩和ケア提供のための緩和ケアガイドブックの改訂に関する研究」班」）等の緩和ケアに関するガイドラインを参照して実施すること。", "label": "５. 麻薬管理指導加算"}, {"id": "s36", "category": "薬学管理料", "kubun": "区分１０の３ 服薬管理指導料", "title": "６ 特定薬剤管理指導加算１", "body": "６ 特定薬剤管理指導加算１\n(１) 特定薬剤管理指導加算１は、服薬管理指導料を算定するに当たって行った薬剤の管理及び指導等に加えて、特に安全管理が必要な医薬品が処方された患者又はその家族等に当該薬剤が特に安全管理が必要な医薬品である旨を伝え、当該薬剤についてこれまでの指導内容等も踏まえ適切な指導を行った場合に算定する。なお、「薬局におけるハイリスク薬の薬学的管理指導に関する業務ガイドライン」（日本薬剤師会）等を参照し、特に安全管理が必要な医薬品に関して薬学的管理及び指導等を行う上で必要な情報については事前に情報を収集することが望ましいが、薬局では得ることが困難な診療上の情報の収集については必ずしも必要とはしない。\n(２) イについては、新たに当該医薬品が処方された場合に限り、算定することができる。\n(３) ロについては、次のいずれかに該当する患者に対して指導を行った場合をいう。\nア 特に安全管理が必要な医薬品の用法又は用量の変更に伴い保険薬剤師が必要と認めて指導を行った患者\nイ 患者の副作用の発現状況、服薬状況等の変化に基づき保険薬剤師が必要と認めて指導を行った患者\n(４) 「特に安全管理が必要な医薬品」とは、抗悪性腫瘍剤、免疫抑制剤、不整脈用剤、抗てんかん剤、血液凝固阻止剤（内服薬に限る。）、ジギタリス製剤、テオフィリン製剤、カリウム製剤（注射薬に限る。）、精神神経用剤、糖尿病用剤、膵臓ホルモン剤及び抗ＨＩＶ薬をいう。なお、具体的な対象薬剤については、その一覧を厚生労働省のホームページに掲載している。\n(５) 特に安全管理が必要な医薬品が複数処方されている場合には、保険薬剤師が必要と認める薬学的管理及び指導を行うこと。この場合において、当該加算は処方箋受付１回につき１回に限り算定する。なお、イ及びロのいずれにも該当する場合であっても、重複して算定することはできない。\n(６) 対象となる医薬品に関して患者又はその家族等に対して確認した内容及び行った指導の要点について、薬剤服用歴等に記載すること。なお、従来と同一の処方内容の場合は、ロとして特に指導が必要と保険薬剤師が認めた場合に限り算定することができるが、この場合において、特に指導が必要と判断した理由の要点を薬剤服用歴等に記載すること。", "label": "６. 特定薬剤管理指導加算１"}, {"id": "s37", "category": "薬学管理料", "kubun": "区分１０の３ 服薬管理指導料", "title": "７ 特定薬剤管理指導加算２", "body": "７ 特定薬剤管理指導加算２\n(１) 特定薬剤管理指導加算２は、医科点数表の「Ｂ００１－２－12」の「注８」に規定する連携充実加算を届け出ている保険医療機関において、抗悪性腫瘍剤を注射された悪性腫瘍の患者に対して、抗悪性腫瘍剤等を調剤する保険薬局の保険薬剤師が以下のアからウまでの全てを実施した場合に算定する。\nア 当該患者のレジメン（治療内容）等を確認し、必要な薬学的管理及び指導を行うこと。\nイ 当該患者が注射又は投薬されている抗悪性腫瘍剤及び制吐剤等の支持療法に係る薬剤に関し、電話等により服用状況、患者の服薬中の体調の変化（副作用が疑われる症状など）の有無等について患者又はその家族等に確認すること。\nウ イの確認結果を踏まえ、当該保険医療機関に必要な情報を文書により提供すること。\n(２) 「抗悪性腫瘍剤等を調剤する保険薬局」とは、患者にレジメン（治療内容）等を交付した保険医療機関の処方箋に基づき、保険薬剤師が抗悪性腫瘍剤又は制吐剤等の支持療法に係る薬剤を調剤する保険薬局をいう。\n(３) 特定薬剤管理指導加算２における薬学的管理及び指導を行おうとする保険薬剤師は、原則として、保険医療機関のホームページ等でレジメン（治療内容）等を閲覧し、あらかじめ薬学的管理等に必要な情報を把握すること。\n(４) 電話等による患者の服薬状況及び患者の服薬中の体調の変化（副作用が疑われる症状など）の有無等の確認は、電話の他、リアルタイムでの画像を介したコミュニケーション（以下「ビデオ通話」という。）による連絡及び患者が他の保険医療機関の処方箋を持参した際の確認が含まれる。電話又はビデオ通話により患者に確認を行う場合は、あらかじめ患者に対し、電話又はビデオ通話を用いて確認することについて了承を得ること。\n(５) 患者の緊急時に対応できるよう、あらかじめ保険医療機関との間で緊急時の対応方法や連絡先等について共有することが望ましい。また、患者の服薬状況の確認において、重大な副作用の発現のおそれがある場合には、患者に対して速やかに保険医療機関に連絡するよう指導することや受診勧奨を行うことなどにより、必要な対応を行うこと。\n(６) 当該加算の算定時に行う保険医療機関への文書による情報提供については、服薬情報等提供料は算定できない。\n(７) 特定薬剤管理指導加算２は、特別調剤基本料Ａを算定している保険薬局において、当該保険薬局と不動産取引等その他特別な関係を有している保険医療機関へ情報提供を行った場合は算定できない。\n(８) 患者１人につき同一月に２回以上の情報提供を行った場合においても、当該加算の算定は月１回のみとする。\n(９) 抗悪性腫瘍剤等に関する患者の服用状況及び患者の服薬中の体調の変化（副作用が疑われる症状など）の有無等の確認を行う際に、他の保険医療機関又は他の診療科で処方された薬剤に係る情報を得た場合には、必要に応じて、患者の同意を得た上で、当該他の保険医療機関等に情報提供を行うこと。この場合において、所定の要件を満たせば服薬情報等提供料を算定できる。", "label": "７. 特定薬剤管理指導加算２"}, {"id": "s38", "category": "薬学管理料", "kubun": "区分１０の３ 服薬管理指導料", "title": "８ 特定薬剤管理指導加算３", "body": "８ 特定薬剤管理指導加算３\n(１) 服薬管理指導料を算定するに当たって行った薬剤の管理及び指導等に加えて、処方された医薬品について、保険薬剤師が患者に重点的な服薬指導が必要と認め、必要な説明及び指導を行ったときに患者１人につき当該医薬品に関して最初に処方された１回に限り算定する。\n(２) イについては、「１０の２」調剤管理料の１の(１)を踏まえ、「当該医薬品の医薬品リスク管理計画に基づき製造販売業者が作成した当該医薬品に係る安全管理等に関する資料を当該患者に対して最初に用いた場合」とは、以下のいずれかの場合をいう。\n・ＲＭＰの策定が義務づけられている医薬品について、当該医薬品を新たに処方された場合に限り、患者又はその家族等に対し、ＲＭＰに基づきＲＭＰに係る情報提供資材を活用し、副作用、併用禁忌等の当該医薬品の特性を踏まえ、適正使用や安全性等に関して十分な指導を行った場合\n・処方された薬剤について緊急安全性情報、安全性速報が新たに発出された場合等に、安全性に係る情報について提供及び十分な指導を行った場合\n(３) ロに示す「調剤前に医薬品の選択に係る情報が特に必要な患者に説明及び指導を行った場合」とは、以下のいずれかの場合をいう。\n・後発医薬品が存在する先発医薬品であって、一般名処方又は銘柄名処方された医薬品について、選定療養の対象となる先発医薬品を選択しようとする患者に対して説明を行った場合\n・医薬品の供給の状況が安定していないため、調剤時に前回調剤された銘柄の必要な数量が確保できず、前回調剤された銘柄から別の銘柄の医薬品に変更して調剤された薬剤の交付が必要となる患者に対して説明を行った場合\n・バイオ医薬品の一般名処方による処方箋の交付を受けた患者又はバイオ後続品の銘柄名処方による処方箋の交付を受けた患者に対して、バイオ後続品の品質、有効性、安全性等について説明を行った場合\n(４) 対象となる医薬品が複数処方されている場合に、処方箋受付１回につきそれぞれ１回に限り算定するものであること。また、複数の項目に該当する場合であっても、重複して算定することができない。\n(５) 特定薬剤管理指導加算３を算定する場合は、それぞれの所定の要件を満たせば特定薬剤管理指導１又は特定薬剤管理指導加算２を算定できる。\n(６) 薬剤服用歴等には、対象となる医薬品が分かるように記載すること。また、医薬品の供給の状況を踏まえ説明を行った場合には、調剤報酬明細書の摘要欄に調剤に必要な数量が確保できなかった薬剤名を記載すること。", "label": "８. 特定薬剤管理指導加算３"}, {"id": "s39", "category": "薬学管理料", "kubun": "区分１０の３ 服薬管理指導料", "title": "９ 乳幼児服薬指導加算", "body": "９ 乳幼児服薬指導加算\n(１) 乳幼児服薬指導加算は、乳幼児に係る処方箋の受付の際に、年齢、体重、適切な剤形その他必要な事項等の確認を行った上で、患者の家族等に対して適切な服薬方法、誤飲防止等の必要な服薬指導を行った場合に算定する。\n(２) 乳幼児服薬指導加算を算定した処方箋中の薬剤の服用期間中に、患者の家族等から電話等により当該処方薬剤に係る問い合わせがあった場合には、適切な対応及び指導等を行うこと。", "label": "９. 乳幼児服薬指導加算"}, {"id": "s40", "category": "薬学管理料", "kubun": "区分１０の３ 服薬管理指導料", "title": "10 小児特定加算", "body": "10 小児特定加算\n(１) 小児特定加算は、児童福祉法（昭和 22 年法律第 164 号）第 56 条の６第２項に規定する障害児である 18 歳未満の患者に係る調剤において、患者又はその家族等に患者の服薬状況等を確認した上で、当該患者又はその家族等に対し、当該患者の状態に合わせた必要な薬学的管理及び指導を行った場合に算定する。\n(２) 小児特定加算は、次に掲げる薬学的管理及び指導を行った場合に算定する。\nア 患者の服薬状況及び服薬管理を行う際の希望等について、患者又はその家族等から聞き取り、当該患者の薬学的管理に必要な情報を収集する。\nイ アにおいて収集した情報を踏まえ、薬学的知見に基づき調剤方法を検討し調剤を行うとともに、服用上の注意点や適切な服用方法等について服薬指導を行う。\n(３) 小児特定加算を算定した処方箋中の薬剤の服用期間中に、患者の家族等から電話等により当該処方薬剤に係る問い合わせがあった場合には、適切な対応及び指導等を行うこと。\n(４) 当該加算は乳幼児服薬指導加算と併算定することはできない。", "label": "10. 小児特定加算"}, {"id": "s41", "category": "薬学管理料", "kubun": "区分１０の３ 服薬管理指導料", "title": "11 吸入薬指導加算", "body": "11 吸入薬指導加算\n(１) 吸入薬指導加算は、患者が吸入薬を適切に使用し、治療効果の向上や副作用の回避に繋がるよう、以下のア及びイを行った場合に６月に１回に限り算定する。ただし、当該患者に対し他の吸入薬が処方された場合であって、必要な吸入指導等を別に行ったときには、前回の吸入薬指導加算の算定から６月以内であっても算定できる。\nア 喘息又は慢性閉塞性肺疾患に対して吸入薬を用いる患者の場合は、文書及び練習用吸入器等を用いて、吸入手技の指導を行い、患者が正しい手順で吸入薬が使用されているか否かなどの確認等を行うこと。また、インフルエンザウイルス感染症に対して吸入薬を用いる患者の場合は、保険薬剤師による看視の下、吸入させること。\nイ 保険医療機関に対し、吸入指導の結果等を文書により情報提供を行うこと。\n(２) 当該加算に係る指導は以下のア又はイの場合に、患者又はその家族等の同意を得て行うものであること。\nア 保険医療機関からの求めがあった場合\nイ 患者又はその家族等の求めがあった場合等、吸入指導の必要性が認められる場合であって、医師の了解を得たとき\n(３) 当該加算に係る吸入指導を行うに当たっては、日本アレルギー学会が作成する「アレルギー総合ガイドライン」等を参照して行うこと。\n(４) （１）の「吸入指導の結果等を文書により情報提供を行うこと」とは、吸入指導の内容や患者の吸入手技の理解度等について、保険医療機関に情報提供することであり、文書の他、手帳により情報提供することでも差し支えない。ただし、患者への吸入指導等を行った結果、患者の当該吸入薬の使用について疑義等がある場合には、処方医に対して必要な照会を行うこと。\n(５) 当該加算の算定時に行う保険医療機関への文書による情報提供については、服薬情報等提供料は算定できない。\n(６) 当該加算は、特別調剤基本料Ａを算定している保険薬局において、当該保険薬局と不動産取引等その他特別な関係を有している保険医療機関へ情報提供を行った場合は算定できない。", "label": "11. 吸入薬指導加算"}, {"id": "s42", "category": "薬学管理料", "kubun": "区分１０の３ 服薬管理指導料", "title": "12 かかりつけ薬剤師フォローアップ加算", "body": "12 かかりつけ薬剤師フォローアップ加算\n(１) かかりつけ薬剤師フォローアップ加算は、患者若しくはその家族等の求めに応じて又はかかりつけ薬剤師が必要性を認めた場合において、前回の調剤後から、当該患者が再度処方箋を持参するまでの間に、かかりつけ薬剤師が電話等により、服薬状況及び残薬状況等の継続的な確認並びに必要な指導等を個別に実施していた場合に、再度処方箋を受け付けたときに、３月に１回に限り算定する。\n(２) 算定対象となる患者は、以下のいずれにも該当するものとする。\nア 服薬管理指導料「１のイ」又は「２のイ」を算定していること。\nイ 直近６月以内に外来服薬支援料１、服用薬剤調整支援料１若しくは２又は調剤管理料の調剤時残薬調整加算若しくは薬学的有害事象等防止加算を算定していること。ただし、かかりつけ薬剤師フォローアップ加算に係る業務を行うことによって当該算定に係る問題（残薬等）が解消されている場合を除く。\n(３) かかりつけ薬剤師フォローアップ加算の留意点\nア あらかじめ、患者又はその家族等に対し、次に掲げる事項を説明し、了解を得ること。\n(イ) フォローアップの電話等にて、実施する聞き取りや指導等の内容\n(ロ) かかりつけ薬剤師フォローアップ加算により発生する患者自己負担額\nイ （１）の電話等によるフォローアップの方法については、電話の他に情報通信機器を用いた方法も含まれるが、患者等に対し一方的に情報を発信すること（例えば、一律の内容の電子メールを一斉送信することその他画一的な内容の通知を行うこと）のみでは、継続的服薬指導を実施したものとは認められない。また、フォローアップにおける服薬状況及び残薬状況等の継続的な確認並びに必要な指導等については、個々の患者の状況等に応じて、双方向性を有する方法により必要な確認及び指導を行う必要があることから、アプリケーション上で患者が定型的な設問に対するチェック又は入力を行うのみで完結する形式の対応についても、当該患者の服薬状況、副作用の有無その他の状態を踏まえた個別具体的な確認及び必要な助言等を伴わない場合には、当該加算の算定の対象とならない。\nウ （１）の「前回の調剤後」については、調剤した当日は含まれない。また、「当該患者が再度処方箋を持参するまでの間」については、処方箋を持参する当日は含まれない。なお、フォローアップを実施する要因となった処方箋を発行した医療機関以外からの処方箋を持参した場合は、これに含まれない。\nエ 電話等によりフォローアップした旨及び日時、実施した聞き取りや指導等の内容等について、薬剤服用歴等に記載すること。\nオ 電話等により患者の服薬状況等の確認を行った結果、速やかに保険医療機関に伝達すべき患者の服薬中の体調の変化等の情報を入手した場合は、当該情報を患者が受診中の保険医療機関に提供するとともに、必要に応じて保険医療機関への受診勧奨を行うこと。\nカ かかりつけ薬剤師フォローアップ加算に係る業務を行ったにもかかわらず、残薬等の問題が解消されないときは、みだりにかかりつけ薬剤師フォローアップ加算に係る業務を行うのではなく、解消されなかった理由や背景等を検証した上で改善策を講じること。また、検証内容及び改善策について薬剤服用歴に記載すること。\nキ かかりつけ薬剤師フォローアップ加算に係る業務は、前回調剤した日に行うのではなく、受診間隔（調剤間隔）等を考慮して薬学的観点から適切と考えられる時に行うこと。\n(４) かかりつけ薬剤師フォローアップ加算は、調剤後薬剤管理指導料、在宅患者訪問薬剤管理指導料、居宅療養管理指導費又は介護予防居宅療養管理指導費を算定している患者については、同月において算定できない。\n(５) 複数の保険薬局において服薬管理指導料「１のイ」又は「２のイ」を算定していた場合は、いずれの保険薬局もかかりつけ薬剤師フォローアップ加算を算定できない。\n(６) かかりつけ薬剤師フォローアップ加算は、特別調剤基本料Ｂを算定している保険薬局は算定できない。", "label": "12. かかりつけ薬剤師フォローアップ加算"}, {"id": "s43", "category": "薬学管理料", "kubun": "区分１０の３ 服薬管理指導料", "title": "13 かかりつけ薬剤師訪問加算", "body": "13 かかりつけ薬剤師訪問加算\n(１) かかりつけ薬剤師訪問加算は、患者又はその家族等の求めに応じて、患家に訪問して、服用薬の管理方法の指導及び残薬の整理等を行い、その結果を保険医療機関に情報提供した場合に、６月に１回に限り算定する。\n(２) 算定対象となる患者は、服薬管理指導料「１のイ」又は「２のイ」を算定しているものとする。\n(３) かかりつけ薬剤師訪問加算の留意点\nア あらかじめ、患者又はその家族等に対し、次に掲げる事項を説明し、了解を得ること。\n(イ) 患家を訪問して、実施する指導等の内容\n(ロ) かかりつけ薬剤師訪問加算により発生する患者自己負担額（交通費を含む。）\nイ 患家を訪問した旨、患家における残薬状況、実施した指導等の内容等について、薬剤服用歴等に記載すること。\n(４) 「注 16」に規定する交通費は実費とする。\n(５) かかりつけ薬剤師訪問加算は、外来服薬支援料１、施設連携加算、在宅患者訪問薬剤管理指導料、服薬情報等提供料、居宅療養管理指導費又は介護予防居宅療養管理指導費を算定している患者については、算定できない。\n(６) 複数の保険薬局において服薬管理指導料「１のイ」又は「２のイ」を算定していた場合は、いずれの保険薬局もかかりつけ薬剤師訪問加算を算定できない。\n(７) 特別調剤基本料Ａを算定している保険薬局において、当該保険薬局と不動産取引等その他特別な関係を有している保険医療機関へ情報提供を行った場合は算定できない。\n(８) かかりつけ薬剤師訪問加算は、特別調剤基本料Ｂを算定している保険薬局は算定できない。", "label": "13. かかりつけ薬剤師訪問加算"}, {"id": "s44", "category": "薬学管理料", "kubun": "区分１０の３ 服薬管理指導料", "title": "14 服薬管理指導料の特例（手帳の活用実績が相当程度あると認められない保険薬局が算定す", "body": "14 服薬管理指導料の特例（手帳の活用実績が相当程度あると認められない保険薬局が算定する服薬管理指導料）\n(１) 「適切な手帳の活用実績が相当程度あると認められない保険薬局」とは、３月以内に再度処方箋を持参した患者への服薬管理指導料（服薬管理指導料 3 並びに服薬管理指導料 4 のイのうち介護老人福祉施設等の患者に係るもの、同 4 のロ及びハに係るものを除く。）の算定回数のうち、手帳を提示した患者への服薬管理指導料の算定回数の割合が 50％以下である保険薬局であること。算定回数の割合は小数点以下を四捨五入して算出する。\n(２) 当該特例への該当性は、調剤基本料の施設基準に定める処方箋受付回数の取扱いと同様に、前年５月１日から当年４月 30 日までの服薬管理指導料の実績をもって判断し、当年６月１日から翌年５月 31 日まで適用する。その他、新規に保険薬局に指定された薬局、開設者の変更等の取扱いについても、調剤基本料の施設基準に定める処方箋受付回数の取扱いと同様とする。\n(３) 当該特例に該当した場合であっても、直近３月間における（１）の割合が 50％を上回った場合には、（２）にかかわらず、当該割合を満たした翌月より「適切な手帳の活用実績が相当程度あると認められない保険薬局」に該当しないものとする。\n(４) 当該特例を算定する場合は、調剤管理料及び服薬管理指導料の加算は算定できない。", "label": "14. 服薬管理指導料の特例（手帳の活用実績が相当程度あると認め…"}, {"id": "s45", "category": "薬学管理料", "kubun": "区分１４の２ 外来服薬支援料", "title": "１ 外来服薬支援料１", "body": "１ 外来服薬支援料１\n(１) 外来服薬支援料１は、保険薬局の保険薬剤師が、自己による服薬管理が困難な外来の患者若しくはその家族等又は保険医療機関の求めに応じ、当該患者又はその家族等が持参した服薬中の薬剤について、治療上の必要性及び服薬管理に係る支援の必要性を判断し、当該薬剤を処方した保険医にその必要性につき了解を得た上で、一包化や服薬カレンダー等の活用により薬剤を整理し、日々の服薬管理が容易になるよう支援した場合に、「注１」及び「注２」を合わせて服薬支援１回につき、月１回に限り算定する。また、患者の来局時のほか、患者の求めに応じて保険薬剤師が患者を訪問して服用薬の整理等を行った場合でも算定できる。この場合、訪問に要した交通費（実費）は患家の負担とする。なお、服薬管理を容易にするような整理を行わずに単に服薬指導を行っただけでは算定できない。また、服用薬の整理等の支援を行った場合においては、当該支援が必要となった背景、理由等を分析し薬学的管理を実施するとともに、同様の支援が今後必要とならないように努めること。\n(２) 「注１」については、外来服薬支援を行うに当たり、患者が、当該保険薬局で調剤した薬剤以外に他の保険薬局で調剤された薬剤や保険医療機関で院内投薬された薬剤を服用していないか確認し、極力これらの薬剤も含めて一包化や服薬カレンダー等の活用により整理するよう努める。また、実際にこれらの薬剤も含めて服薬支援を行う場合には、重複投薬、相互作用等の有無を確認し、処方医に必要な照会を行い、適切な措置を講じる。なお、患者に対する服薬中の薬剤の確認や処方医への照会等を行った上で、結果として、他の保険薬局で調剤された薬剤又は保険医療機関で院内投薬された薬剤のみについて服薬支援を行うこととなった場合（当該保険薬局で調剤を受けていない患者が持参した、他の保険薬局で調剤された薬剤や保険医療機関で院内投薬された薬剤について服薬支援を行う場合を含む。）でも算定できる。\n(３) 「注２」については、患者が保険薬局に持参した服用中の薬剤等の服薬管理を行い、その結果を関係する保険医療機関へ情報提供した場合に算定できる。算定に当たっては、あらかじめ、患者又はその家族等に対して、保険薬局へ服用中の薬剤等を持参する動機付けのために薬剤等を入れる袋等を提供し、患者等が薬剤等を持参することで服薬管理を行う取組（いわゆるブラウンバッグ運動）を周知しておく。この場合において、外来服薬支援料１は、特別調剤基本料Ａを算定している保険薬局において、当該保険薬局と不動産取引等その他特別な関係を有している保険医療機関へ情報提供を行った場合は算定できない。\n(４) 外来服薬支援料１に係る外来服薬支援は、処方箋によらず、調剤済みの薬剤について服薬管理の支援を目的として行うものであるため、薬剤の一包化を行った場合でも、調剤基本料等の調剤技術料は算定できない。\n(５) 薬剤の一包化による服薬支援は、多種類の薬剤が投与されている患者においてしばしばみられる薬剤の飲み忘れ、飲み誤りを防止すること又は心身の特性により錠剤等を直接の被包から取り出して服用することが困難な患者に配慮することを目的とし、治療上の必要性が認められる場合に行うものである点に留意する。\n(６) 外来服薬支援料１を算定する場合は、服薬支援に係る薬剤の処方医の了解を得た旨又は情報提供した内容並びに当該薬剤の名称、服薬支援の内容及び理由を薬剤服用歴等に記載する。\n(７) 外来服薬支援料１は、在宅患者訪問薬剤管理指導料を算定している患者については算定できない。また、現に他の保険医療機関又は保険薬局の保険薬剤師が訪問薬剤管理指導を行っている患者についても算定できない。\n(８) 外来服薬支援料１は、特別調剤基本料Ｂを算定している保険薬局は算定できない。", "label": "１. 外来服薬支援料１"}, {"id": "s46", "category": "薬学管理料", "kubun": "区分１４の２ 外来服薬支援料", "title": "２ 外来服薬支援料２", "body": "２ 外来服薬支援料２\n(１) 外来服薬支援料２は、多種類の薬剤が投与されている患者においてしばしばみられる薬剤の飲み忘れ、飲み誤りを防止すること又は心身の特性により錠剤等を直接の被包から取り出して服用することが困難な患者に配慮することを目的とし、保険薬局の保険薬剤師が治療上の必要性が認められると判断した場合に、医師の了解を得た上で、処方箋受付ごとに、当該保険薬局で一包化及び必要な指導を行い、患者の服薬管理を支援した場合について評価するものである。\n(２) 外来服薬支援料２は、処方箋受付１回につき１回算定できるものであり、投与日数が\n42 日分以下の場合には、一包化を行った投与日数が７又はその端数を増すごとに 34 点を加算した点数を、投与日数が 43 日分以上の場合には、投与日数にかかわらず 240 点を算定する。この場合において、外来服薬支援料１は算定できない。\n(３) 一包化とは、服用時点の異なる２種類以上の内服用固形剤又は１剤であっても３種類以上の内服用固形剤が処方されているとき、その種類にかかわらず服用時点ごとに一包として患者に投与することをいう。なお、一包化に当たっては、錠剤等は直接の被包から取り出した後行うものである。\n(４) 保険薬剤師が一包化の必要を認め、医師の了解を得た後に一包化を行った場合は、その旨及び保険薬剤師が一包化を必要と認めた理由を薬剤服用歴等に記載する。\n(５) 患者の服薬管理を支援するため、一包化した当該保険薬局の保険薬剤師が必要な服薬指導を行った上で、調剤後も患者の服用薬や服薬状況に関する情報等を把握し、必要に応じ処方医に情報提供する。\n(６) 患者の服薬及び服用する薬剤の識別を容易にすること等の観点から、錠剤と散剤を別々に一包化した場合、臨時の投薬に係る内服用固形剤とそれ以外の内服用固形剤を別々に一包化した場合等も算定できるが、処方箋受付１回につき１回に限り算定する。\n(７) 同一保険薬局で同一処方箋に係る分割調剤（調剤基本料の「注９」の長期保存の困難性等の理由による分割調剤又は「注 10」の後発医薬品の試用のための分割調剤に限る。）をした上で、２回目以降の調剤について一包化を行った場合は、１回目の調剤から通算した日数に対応する点数から前回までに請求した点数を減じて得た点数を所定点数に加算する。\n(８) 外来服薬支援料２を算定した範囲の薬剤については、自家製剤加算及び計量混合調剤加算は算定できない。\n(９) 外来服薬支援料２を算定する場合は、当該処方箋の調剤に係る調剤技術料を同時に算定できる。\n(10) 医薬品医療機器等法において、調剤の業務のうち当該業務に著しい影響を与えない定型的な業務であって、他の薬局開設者に委託を行うことが認められているものについて委託を行う場合は、委託する保険薬局が外来服薬支援料２を算定すること。なお、受託する薬局においては、当該処方箋受付に係る調剤報酬については算定することができない。なお、この場合の費用については両者の合議とする。\n(11) 外来服薬支援料２は、特別調剤基本料Ｂを算定している保険薬局は算定できない。", "label": "２. 外来服薬支援料２"}, {"id": "s47", "category": "薬学管理料", "kubun": "区分１４の２ 外来服薬支援料", "title": "３ 施設連携加算", "body": "３ 施設連携加算\n(１) 施設連携加算は、保険薬剤師が患者の入所している地域密着型介護老人福祉施設又は介護老人福祉施設を訪問し、当該施設職員と協働して、日常の服薬管理が容易になるよう薬学的観点から支援や指導等を実施することを評価するものである。\n(２) 当該患者又はその家族等の同意を得て、当該薬剤を処方した保険医にその必要性につき了解を得た上で実施すること。\n(３) 当該患者の服薬状況等に基づき継続的に適切な服薬が行えるよう、特に重点的な服薬管理の支援を行うことが必要な以下のいずれかの場合に限り、外来服薬支援料２に加えて算定することとし、該当する理由について、調剤報酬明細書の摘要欄に記載すること。\nア 地域密着型介護老人福祉施設又は介護老人福祉施設への入所時であって、服用している薬剤が多く、入所後の服薬管理について当該施設職員と協働した服薬支援が必要と保険薬剤師が認めた場合\nイ 新たな薬剤が処方された若しくは薬剤の用法又は用量が変更となった患者のうち、これまでの服薬管理とは異なる方法等での服薬支援が必要と保険薬剤師が認めた場合\nウ 患者が服薬している薬剤に関する副作用等の状況、体調の変化等における当該施設職員からの相談に基づき保険薬剤師が当該患者の服薬状況等の確認を行った結果、これまでの服薬管理とは異なる方法等での服薬支援が必要と保険薬剤師が認めた場合\n(４) 日常の服薬管理が容易になるような支援については、当該保険薬局が調剤した薬剤以外に他の保険薬局で調剤された薬剤や保険医療機関で院内投薬された薬剤等の調剤済みの薬剤も含めて一包化等の調製を行うこと。\n(５) （１）の当該施設職員との協働した服薬管理については、施設における患者の療養生活の状態を保険薬剤師自らが直接確認し、薬剤の保管状況、服薬状況、残薬の状況、投薬後の併用薬剤、投薬後の併診に関する情報、患者の服薬中の体調の変化（副作用が疑われる症状など）、重複服用、相互作用、実施する服薬支援措置、施設職員が服薬の支援・管理を行う上で留意すべき事項等に関する確認等を行った上で実施すること。また、実施した内容の要点を薬剤服用歴等に記載すること。\n(６) 単に当該施設の要望に基づき服用薬剤の一包化等の調製を行い、当該施設の職員に対して服薬の支援・管理に関する情報共有等を行ったのみの場合は算定できない。", "label": "３. 施設連携加算"}, {"id": "s48", "category": "薬学管理料", "kubun": "区分１４の３ 服用薬剤調整支援料", "title": "区分１４の３ 服用薬剤調整支援料", "body": "(１) 服用薬剤調整支援料１\nア 服用薬剤調整支援料１は、内服を開始して４週間以上経過した内服薬６種類以上を保険薬局で調剤している患者に対して、当該保険薬局の保険薬剤師が、当該患者の意向を踏まえ、当該患者の服薬アドヒアランス及び副作用の可能性等を検討した上で、処方医に減薬の提案を行い、その結果、処方される内服薬が減少した場合について評価したものである。\nイ 服用薬剤調整支援料１は、当該保険薬局で調剤している当該内服薬の種類数が２種類以上（うち少なくとも１種類は当該保険薬局の保険薬剤師が提案したものとする。）減少し、その状態が４週間以上継続した場合に算定する。\nウ 保険医療機関名及び保険医療機関における調整前後の薬剤の種類数を調剤報酬明細書の摘要欄に記載すること。\nエ 調剤している内服薬の種類数に屯服薬は含めない。また、当該内服薬の服用を開始して４週間以内の薬剤については、調整前の内服薬の種類数から除外する。また、調剤している内服薬と同一薬効分類の有効成分を含む配合剤及び内服薬以外の薬剤への変更を保険薬剤師が提案したことで減少した場合は、減少した種類数に含めない。\nオ 内服薬の種類数の計算に当たっては、錠剤、カプセル剤、散剤、顆粒剤及び液剤については、１銘柄ごとに１種類として計算する。\nカ 患者の服用する薬剤の副作用の可能性の検討等を行うに当たっては、「高齢者の医薬品適正使用の指針（総論編）」（厚生労働省）、「高齢者の医薬品適正使用の指針（各論編（療養環境別））」（厚生労働省）、「病院における高齢者のポリファーマシー対策の始め方と進め方」（厚生労働省）及び日本老年医学会の関連ガイドライン（高齢者の安全な薬物療法ガイドライン）等を参考にすること。\nキ 保険薬剤師は処方医へ提案を行う際に、減薬に係る患者の意向や提案に至るまでに薬学的見地から検討した内容を薬剤服用歴等に記載する。また、保険医療機関から提供された処方内容の調整結果に係る情報は、薬剤服用歴等に添付する等の方法により保存しておくこと。\nク 当該保険薬局で服用薬剤調整支援料１を１年以内に算定した場合においては、前回の算定に当たって減少した後の内服薬の種類数から更に２種類以上減少したときに限り、新たに算定することができる。\n(２) 服用薬剤調整支援料２\nア 服用薬剤調整支援料２は、複数の保険医療機関から内服薬が合計で６種類以上処方されている患者に対して、患者若しくはその家族等の求めに応じて、かかりつけ薬剤師が、当該患者の服用中の薬剤を継続的及び一元的に把握した結果、服用中の薬剤の調整を必要と認める場合であって、患者の服薬状況等に係る総合的な管理及び評価（以下「服用薬剤総合評価」という。）を実施した上で、処方医に対して、当該調整について文書を用いて提案した場合に、同一の患者に対して６月に１回に限り、かかりつけ薬剤師１人につき月４回まで算定することができる。\nイ 服用薬剤調整支援料２の算定に当たっては、服用薬剤総合評価を行うために必要な研修を修了したかかりつけ薬剤師が服用薬剤総合評価を行うこと。「服用薬剤総合評価を行うために必要な研修を修了したかかりつけ薬剤師」とは、日本老年薬学会の提供する老年薬学服薬総合評価研修会を修了したかかりつけ薬剤師又は日本老年薬学会が定める老年薬学認定薬剤師であるかかりつけ薬剤師をいう。\nウ 服用薬剤総合評価の実施に当たっては、別紙様式２を用いるとともに、薬剤服用歴に保存すること。\nエ 服用薬剤調整支援料２の算定にあたっては、服用薬剤総合評価として、次に掲げる事項を全て行うこと。なお、主観的情報の聴取にあたっては、「ポリファーマシー対策のための持参薬鑑別評価シート開発に関する研究」（国立高度専門医療研究センター横断的研究推進費）で作成された「おくすり問診票」を必要に応じて活用すること。\n(イ) 薬物治療に関する患者又はその家族等からの主観的情報の聴取\n(ロ) 検査値等の薬物治療に必要な客観的情報の収集\n(ハ) 服薬支援に必要な患者の生活状況及び意向に関する情報の聴取\n(ニ) 各服用薬剤がもたらす治療効果及び有害事象の評価\n(ホ) 解決すべき薬剤関連問題の特定及び整理\n(へ) 服用薬剤調整後の観察計画及び対応案の立案\nオ 服用薬剤総合評価の実施に当たっては、日本老年医学会及び日本老年薬学会が作成する「日本版抗コリン薬リスクスケール」や「高齢者施設の服薬簡素化提言」を参照すること。\nカ 服用薬剤調整支援料２は、在宅で療養を行っている患者であって通院が困難なものについて、在宅患者訪問薬剤管理指導料等を算定している場合であっても、「１０の３」服薬管理指導料の２（２）に掲げる事項に基づき、患者からかかりつけ薬剤師としての同意を取得した上で、服用薬剤総合評価を実施したときは、算定可能である。\nキ 服用薬剤調整支援料２の算定にあたっては、あらかじめ、患者又はその家族等に対し、次に掲げる事項を説明し、了解を得ること。\n(イ) 服用薬剤総合評価を実施する意義\n(ロ) 服用薬剤調整支援料２により発生する患者自己負担額\nク 服用薬剤総合評価の実施にあたっては、次に掲げる事項等を患者又はその家族等に対して結果の伝達を行うこと。ただし、患者又はその家族等に対して結果の伝達を行う際には、一律の内容ではなく、患者若しくはその家族等又は医療従事者との関係性等を踏まえて内容を適宜変更すること。\n(イ) 患者への聞き取り等により確認した内容\n(ロ) 薬物有害事象であると疑われる症状\n(ハ) 服薬の状況（薬剤の管理状況等も含む。）\n(ニ) 医療従事者と共有する内容\n(ホ) 今後生活を送る上での注意点\nケ 服用薬剤調整支援料２は、特別調剤基本料Ａを算定している保険薬局において、当該保険薬局と不動産取引等その他特別な関係を有している保険医療機関へ情報提供を行った場合は算定できない。\nコ 服用薬剤調整支援料２は、特別調剤基本料Ｂを算定している保険薬局は算定できない。\nサ 服用薬剤調整支援料２は、令和８年６月１日から令和９年５月 31 日までの間は算定できない。", "label": "区分１４の３ 服用薬剤調整支援料"}, {"id": "s49", "category": "薬学管理料", "kubun": "区分１４の４ 調剤後薬剤管理指導料", "title": "区分１４の４ 調剤後薬剤管理指導料", "body": "(１) 調剤後薬剤管理指導料１は、新たに糖尿病用剤が処方等された患者に対し、薬物治療を適切に継続する観点から、地域支援・医薬品供給対応体制加算の２から５までのいずれかを届け出ている保険薬局の保険薬剤師が、調剤後に電話等により、その使用状況、患者の服薬中の体調の変化（副作用が疑われる症状など）の有無等について患者に確認する等、必要な薬学的管理指導を行うとともに、その結果等を受診中の保険医療機関に文書により情報提供した場合に算定する。\n(２) （１）の「新たに糖尿病用剤が処方等された患者」とは次のいずれかに該当する患者をいう。\nア 新たに糖尿病用剤が処方された患者\nイ 糖尿病用剤の用法・用量の変更があった患者\n(３) 調剤後薬剤管理指導料２は、心疾患による入院歴のある作用機序が異なる複数の治療薬の処方を受けている慢性心不全患者に対し、薬物治療を適切に継続するとともに、特に入院歴を有する慢性心不全患者の再入院を抑制する観点から、地域支援・医薬品供給対応体制加算の２から５までのいずれかを届け出ている保険薬局の保険薬剤師が、調剤後に電話等により、その使用状況、患者の服薬中の体調の変化（副作用が疑われる症状など）の有無等について患者に確認する等、必要な薬学的管理指導を行うとともに、その結果等を受診中の保険医療機関に文書により情報提供した場合に算定する。なお、当該指導料に係る薬剤の調剤と同日に電話等により使用状況の確認等を行った場合には算定できない。\n(４) （３）の「心疾患による入院歴のある作用機序が異なる複数の治療薬の処方を受けている慢性心不全患者」とは、日本循環器学会及び日本心不全学会が作成する最新の「急性・慢性心不全診療ガイドライン」等を参照し、複数の作用機序の異なる循環器疾患に係る治療薬の処方を受けている慢性心不全患者をいう。\n(５) 調剤後薬剤管理指導料に係る電話等による当該治療薬の服薬状況の確認等は、以下のいずれかの場合に患者の同意を得て行うものであること。なお、電話等による確認方法については、電話の他に情報通信機器を用いた方法も含まれるが、患者等に一方的に情報発信すること（例えば、一律の内容の電子メールを一斉送信すること）のみでは、継続的服薬指導を実施したことにはならず、個々の患者の状況等に応じて必要な対応を行うこと。\nア 保険医療機関からの求めがあった場合\nイ 患者若しくはその家族等の求めがあり、保険薬剤師が調剤後の薬剤管理指導を必要と認め、医師の了解を得た場合\n(６) 調剤後薬剤管理指導料に係る調剤後の糖尿病又は慢性心不全の治療薬の服薬状況等の確認は、処方医等の求めに応じて実施するものであり、計画的な電話等による確認を原則とすること。この場合において、あらかじめ患者等に対し、電話等を用いて確認することについて了承を得ること。\n(７) 電話等による患者の糖尿病又は慢性心不全の治療薬の服薬状況等の確認を行った結果、速やかに保険医療機関に伝達すべき患者の服薬中の体調の変化等の情報を入手した場合は、当該情報を患者が受診中の保険医療機関に提供するとともに、必要に応じて保険医療機関への受診勧奨を行うこと。\n(８) 医療機関への情報提供に当たっては、単に確認された服薬状況、副作用の状況を記載して情報提供するだけでなく、医療機関との連携の下で、処方医等の求めに応じた情報の収集と、薬学的分析及び評価に基づく情報提供を実施するとともに、必要に応じて処方に係る提案等を行うこと。この際、体重の増減、塩分摂取、飲水の状況など、薬学的管理に密接に関係する情報も積極的に収集し、活用することが望ましい。また、医療従事者間のＩＣＴを活用した服薬状況等の情報共有等により対応した場合には、処方提案等の行為を行った日時が記録され、必要に応じてこれらの内容を随時確認できることが望ましい。\n(９) 当該指導料に係る薬剤の調剤と同日及びその次に処方箋を受け付ける日に電話等により使用状況の確認等を行った場合には算定できない。なお、電話等により使用状況の確認等を行った結果、受診勧奨により患者が保険医療機関を受診し、その処方箋を持参した場合及び調剤後薬剤管理指導料の要因となった処方箋を発行した医療機関以外からの処方箋を持参した場合は、この限りではない。\n(10) 調剤後薬剤管理指導料の算定時に行う保険医療機関への文書による情報提供については、服薬情報等提供料は算定できない。\n(11) 調剤後薬剤管理指導料は、特別調剤基本料Ａを算定している保険薬局において、当該保険薬局と不動産取引等その他特別な関係を有している保険医療機関へ情報提供を行った場合は算定できない。", "label": "区分１４の４ 調剤後薬剤管理指導料"}, {"id": "s50", "category": "薬学管理料", "kubun": "区分１５ 在宅患者訪問薬剤管理指導料", "title": "１ 在宅患者訪問薬剤管理指導料", "body": "１ 在宅患者訪問薬剤管理指導料\n(１) 在宅患者訪問薬剤管理指導料は、在宅での療養を行っている患者であって通院が困難なものに対して、あらかじめ名称、所在地、開設者の氏名及び在宅患者訪問薬剤管理指導（以下「訪問薬剤管理指導」という。）を行う旨を地方厚生（支）局長に届け出た保険薬局の保険薬剤師が、医師の指示に基づき、薬学的管理指導計画を策定し、患家を訪問して、薬歴管理、服薬指導、服薬支援、薬剤服用状況、薬剤保管状況及び残薬の有無の確認等の薬学的管理指導を行い、当該指示を行った医師に対して訪問結果について必要な情報提供を文書で行った場合に、在宅患者訪問薬剤管理指導料１から３まで及び服薬管理指導料「４のロ」を合わせて月４回（末期の悪性腫瘍の患者、注射による麻薬の投与が必要な患者及び中心静脈栄養法の対象患者にあっては、週２回かつ月８回）に限り算定する。在宅患者訪問薬剤管理指導料は、定期的に訪問して訪問薬剤管理指導を行った場合の評価であり、継続的な訪問薬剤管理指導の必要のない者や通院が可能な者に対して安易に算定してはならない。例えば、少なくとも独歩で家族又は介助者等の助けを借りずに来局ができる者等は、来局が容易であると考えられるため、在宅患者訪問薬剤管理指導料は算定できない。なお、在宅療養を担う保険医療機関の保険医と連携する他の保険医の求めにより、患家を訪問して必要な薬学的管理指導を行った場合は、当該保険医に加え、当該患者の在宅療養を担う保険医療機関の保険医にも必要な情報提供を文書で行うこと。また、在宅療養を担う保険医療機関の保険医と連携する他の保険医については、担当医に確認し、薬学的管理指導計画書等に当該医師の氏名と医療機関名を記載すること。\n(２) 在宅患者訪問薬剤管理指導料は、単一建物診療患者の人数に従い算定する。ここでいう「単一建物診療患者の人数」とは、当該患者が居住する建築物に居住する者のうち、当該保険薬局が訪問薬剤管理指導料を算定する者の人数をいう。なお、ユニット数が３以下の認知症対応型共同生活介護事業所については、それぞれのユニットにおいて、在宅患者訪問薬剤管理指導料を算定する人数を、単一建物診療患者の人数とみなすことができる。\n(３) 「在宅での療養を行っている患者」とは、保険医療機関又は介護老人保健施設で療養を行っている患者以外の患者をいう。ただし、「要介護被保険者等である患者について療養に要する費用の額を算定できる場合」（平成20年厚生労働省告示第128号）、「特別養護老人ホーム等における療養の給付の取扱いについて」（平成 18 年３月 31 日保医発第 0331002 号）等に規定する場合を除き、患者が医師若しくは薬剤師の配置が義務付けられている病院、診療所、施設等に入院若しくは入所している場合又は現に他の保険医療機関若しくは保険薬局の保険薬剤師が訪問薬剤管理指導を行っている場合には、在宅患者訪問薬剤管理指導料は算定できない。\n(４) 在宅協力薬局\nア （３）にかかわらず、訪問薬剤管理指導を主に行っている保険薬局（以下「在宅基幹薬局」という。）が、連携する他の保険薬局（以下「在宅協力薬局」という。）と薬学的管理指導計画の内容を共有していること及び緊急その他やむを得ない事由がある場合には、在宅基幹薬局の保険薬剤師に代わって当該患者又はその家族等に訪問薬剤管理指導を行うことについて、あらかじめ当該患者又はその家族等の同意を得ている場合であって、在宅基幹薬局に代わって在宅協力薬局が訪問薬剤管理指導を行ったときには、在宅患者訪問薬剤管理指導料を算定できる。ただし、訪問薬剤管理指導に係る費用については、在宅基幹薬局と在宅協力薬局の合議とする。\nイ 在宅協力薬局の保険薬剤師が在宅基幹薬局の保険薬剤師に代わって訪問薬剤管理指導を行った場合には、薬剤服用歴等を記載し、在宅基幹薬局と当該記録の内容を共有することとするが、訪問薬剤管理指導の指示を行った医師又は歯科医師に対する訪問結果についての報告等は在宅基幹薬局が行う。なお、調剤報酬明細書に当該訪問薬剤管理指導を行った在宅協力薬局名及び当該訪問薬剤管理指導を行った日付を記載する。また、在宅協力薬局が処方箋を受け付け、調剤を行った在宅協力薬局が訪問薬剤管理指導を行った場合には、算定については、調剤技術料及び薬剤料等は在宅協力薬局、また、在宅患者訪問薬剤管理指導料の算定は在宅基幹薬局が行うこととし、調剤報酬明細書の摘要欄には在宅協力薬局が処方箋を受け付けた旨を記載する。\n(５) 薬学的管理指導計画\nア 「薬学的管理指導計画」は、処方医から提供された診療状況を示す文書等に基づき、又は必要に応じ、処方医と相談するとともに、他の医療関係職種（歯科訪問診療を実施している保険医療機関の保険医である歯科医師、訪問看護ステーションの看護師等）との間で情報を共有しながら、患者の心身の特性及び処方薬剤を踏まえ策定されるものであり、薬剤の管理方法、薬剤特性（薬物動態、副作用、相互作用等）を確認した上、実施すべき指導の内容、患家への訪問回数、訪問間隔等を記載する。\nイ 策定した薬学的管理指導計画書は、薬剤服用歴等に添付する等の方法により保存する。\nウ 薬学的管理指導計画は、原則として、患家を訪問する前に策定する。\nエ 訪問後、必要に応じ新たに得られた患者の情報を踏まえ計画の見直しを行う。\nオ 薬学的管理指導計画は少なくとも１月に１回は見直しを行うほか、処方薬剤の変更があった場合及び他職種から情報提供を受けた場合にも適宜見直しを行う。\n(６) 必要に応じて、処方医以外の医療関係職種に対しても、訪問薬剤管理指導の結果及び当該医療関係職種による当該患者に対する療養上の指導に関する留意点について情報提供する。\n(７) 訪問薬剤管理指導は、当該保険薬局の調剤した薬剤の服用期間内に、患者の同意を得て実施する。なお、調剤を行っていない月に訪問薬剤管理指導を実施した場合は、当該調剤年月日及び投薬日数を調剤報酬明細書の摘要欄に記入する。\n(８) 在宅患者訪問薬剤管理指導料及び服薬管理指導料「４のロ」を合わせて月２回以上算定する場合（末期の悪性腫瘍の患者、注射による麻薬の投与が必要な患者又は中心静脈栄養法の対象患者に対するものを除く。）は、算定回数は、週１回を限度とする。末期の悪性腫瘍の患者、注射による麻薬の投与が必要な患者又は中心静脈栄養法の対象患者については、服薬管理指導料「４のロ」と合わせて週２回かつ月８回に限り算定できる。\n(９) 保険薬剤師１人につき在宅患者訪問薬剤管理指導料１、２及び３並びに服薬管理指導料「４のロ」を合わせて週 40 回に限り算定できる。\n(10) 在宅患者訪問薬剤管理指導料を算定するためには、薬剤服用歴等に薬学管理料の通則（４）の記載事項に加えて、少なくとも次の事項について記載されていなければならない。\nア 訪問の実施日、訪問した保険薬剤師の氏名\nイ 処方医から提供された情報の要点\nウ 訪問に際して実施した薬学的管理指導の内容（薬剤の保管状況、服薬状況、残薬の状況、投薬後の併用薬剤、投薬後の併診、患者の服薬中の体調の変化（副作用が疑われる症状など）、重複服用、相互作用等に関する確認、実施した服薬支援措置等）\nエ 処方医に対して提供した訪問結果に関する情報の要点\nオ 処方医以外の医療関係職種との間で情報を共有している場合にあっては、当該医療関係職種から提供された情報の要点及び当該医療関係職種に提供した訪問結果に関する情報の要点\nカ 在宅協力薬局の保険薬剤師が訪問薬剤管理指導を行った場合には、（４）のイで規定する事項\n(11) 在宅患者訪問薬剤管理指導料を算定した月においては、服薬管理指導料（服薬管理指導料「４のロ」及び「４のハ」は除く。）は、当該患者の薬学的管理指導計画に係る疾病と別の疾病又は負傷に係る臨時の処方箋によって調剤を行った場合を除いて算定できない。また、在宅患者訪問薬剤管理指導料を算定した月においては、外来服薬支援料１又は服薬情報等提供料は算定できない。\n(12) １つの患家に在宅患者訪問薬剤管理指導料の対象となる同居する同一世帯の患者が２人以上いる場合は、患者ごとに「単一建物診療患者が１人の場合」を算定する。また、単一の建築物において、当該保険薬局が在宅患者訪問薬剤管理指導料を算定する者の数が、当該建築物の戸数の 10％以下の場合又は当該建築物の戸数が 20 戸未満であって、当該保険薬局が在宅患者訪問薬剤管理指導料を算定する者の数が２人以下の場合には、それぞれ「単一建物診療患者が１人の場合」を算定する。\n(13) 当該保険薬局又は在宅協力薬局との連携により、休日及び夜間を含む開局時間外であっても調剤及び訪問薬剤管理指導に対応できるよう、原則として初回の訪問薬剤管理指導時に（変更があった場合はその都度）、当該保険薬局の保険薬剤師と連絡がとれる連絡先電話番号及び緊急時の注意事項（在宅協力薬局との連携により、休日及び夜間を含む開局時間外に調剤及び訪問薬剤管理指導に対応できる体制を整備している保険薬局においては、在宅協力薬局の所在地、名称及び連絡先電話番号等を含む。）等について、事前に患者又はその家族等に対して説明の上、文書（これらの事項が記載された薬袋を含む。）により交付すること。また、やむを得ない事由により、患者又はその家族等からの電話等による問い合わせに応じることができなかった場合は、速やかに折り返しの連絡を行うこと。\n(14) 在宅患者訪問薬剤管理指導料は、特別調剤基本料Ｂを算定している保険薬局は算定できない。\n(15) 在宅患者訪問薬剤管理指導料を算定しようとする保険薬局は、別紙様式３を用いて、あらかじめ在宅患者訪問薬剤管理指導を行う旨を地方厚生局長等に届け出なければならない。", "label": "１. 在宅患者訪問薬剤管理指導料"}, {"id": "s51", "category": "薬学管理料", "kubun": "区分１５ 在宅患者訪問薬剤管理指導料", "title": "２ 麻薬管理指導加算", "body": "２ 麻薬管理指導加算\n(１) 麻薬管理指導加算は、麻薬の投薬が行われている患者に対して、定期的に、投与される麻薬の服用状況、残薬の状況及び保管状況について確認し、残薬の適切な取扱方法も含めた保管取扱い上の注意等に関し必要な指導を行うとともに、麻薬による鎮痛等の効果や患者の服薬中の体調の変化（副作用が疑われる症状など）の有無の確認を行い、処方医に対して必要な情報提供を行った場合に算定する。\n(２) 麻薬管理指導加算は、在宅患者訪問薬剤管理指導料が算定されていない場合は算定できない。\n(３) （１）の麻薬による鎮痛等の効果や患者の服薬中の体調の変化の有無の確認等に当たっては、「がん疼痛の薬物療法に関するガイドライン」（日本緩和医療学会）、「新版がん緩和ケアガイドブック」（日本医師会監修 厚生労働科学特別研究事業「適切な緩和ケア提供のための緩和ケアガイドブックの改訂に関する研究」班」）等の緩和ケアに関するガイドラインを参照して実施すること。\n(４) 麻薬管理指導加算を算定するためには、薬剤服用歴等に薬学管理料の通則（４）及び「１５」在宅患者訪問薬剤管理指導料の１の（10）の記載事項に加えて、少なくとも次の事項について記載されていなければならない。\nア 訪問に際して実施した麻薬に係る薬学的管理指導の内容（麻薬の保管管理状況、服薬状況、残薬の状況、麻薬注射剤等の併用薬剤、疼痛緩和等の状況、麻薬の継続又は増量投与による患者の服薬中の体調の変化（副作用が疑われる症状など）の有無などの確認等）\nイ 訪問に際して行った患者・家族への指導の要点（麻薬に係る服薬指導、残薬の適切な取扱方法も含めた保管管理の指導等）\nウ 処方医に対して提供した訪問結果に関する情報（麻薬の服薬状況、疼痛緩和及び患者の服薬中の体調の変化（副作用が疑われる症状など）等の状況、服薬指導の要点等に関する事項を含む。）の要点\nエ 患者又はその家族等から返納された麻薬の廃棄に関する事項（都道府県知事に届け出た麻薬廃棄届の写しを薬剤服用歴等に添付することで差し支えない。）", "label": "２. 麻薬管理指導加算"}, {"id": "s52", "category": "薬学管理料", "kubun": "区分１５ 在宅患者訪問薬剤管理指導料", "title": "３ 在宅患者医療用麻薬持続注射療法加算", "body": "３ 在宅患者医療用麻薬持続注射療法加算\n(１) 在宅患者医療用麻薬持続注射療法加算は、在宅において医療用麻薬持続注射療法を行っている患者又はその家族等に対して、患家を訪問し、麻薬の投与状況、残液の状況及び保管状況について確認し、残液の適切な取扱方法も含めた保管取扱い上の注意等に関し必要な指導を行うとともに、麻薬による鎮痛等の効果や患者の服薬中の体調の変化（副作用が疑われる症状など）の有無を確認し、薬学的管理及び指導を行い、処方医に対して必要な情報提供を行った場合に算定する。\n(２) 当該患者が麻薬の投与に使用している高度管理医療機器について、保健衛生上の危害の発生の防止に必要な措置を講ずること。\n(３) 必要に応じて、処方医以外の医療関係職種に対しても、麻薬の投与状況、残液の状況、保管状況、残液の適切な取扱方法も含めた保管取扱い上の注意等について情報提供すること。\n(４) 在宅患者医療用麻薬持続注射療法加算は、在宅患者訪問薬剤管理指導料が算定されていない場合は算定できない。\n(５) 在宅患者医療用麻薬持続注射療法加算を算定するためには、薬剤服用歴等に薬学管理料の通則（４）及び「１５」在宅患者訪問薬剤管理指導料の１の（10）の記載事項に加えて、少なくとも次の事項について記載されていなければならない。\nア 訪問に際して実施した麻薬に係る薬学的管理指導の内容（麻薬の保管管理状況、投与状況、残液の状況、併用薬剤、疼痛緩和等の状況、麻薬の継続又は増量投与による患者の服薬中の体調の変化（副作用が疑われる症状など）の有無などの確認等）\nイ 訪問に際して行った患者又はその家族等への指導の要点（麻薬に係る服薬指導、残液の適切な取扱方法も含めた保管管理の指導等）\nウ 処方医に対して提供した訪問結果に関する情報（麻薬の投与状況、疼痛緩和及び患者の服薬中の体調の変化（副作用が疑われる症状など）等の状況、服薬指導の要点等に関する事項を含む。）の要点\nエ 患者又はその家族等から返納された麻薬の廃棄に関する事項（都道府県知事に届け出た麻薬廃棄届の写しを薬剤服用歴等に添付することで差し支えない。）\n(６) 在宅患者医療用麻薬持続注射療法加算については、麻薬管理指導加算を算定している患者については算定できない。", "label": "３. 在宅患者医療用麻薬持続注射療法加算"}, {"id": "s53", "category": "薬学管理料", "kubun": "区分１５ 在宅患者訪問薬剤管理指導料", "title": "４ 乳幼児加算", "body": "４ 乳幼児加算乳幼児加算は、乳幼児に係る薬学的管理指導の際に、体重、適切な剤形その他必要な事項等の確認を行った上で、患者の家族等に対して適切な服薬方法、誤飲防止等の必要な服薬指導を行った場合に算定する。", "label": "４. 乳幼児加算"}, {"id": "s54", "category": "薬学管理料", "kubun": "区分１５ 在宅患者訪問薬剤管理指導料", "title": "５ 小児特定加算", "body": "５ 小児特定加算小児特定加算は、児童福祉法第 56 条の６第２項に規定する障害児である 18 歳未満の患者に係る薬学的管理指導の際に、服薬状況等を確認した上で、患家を訪問し、患者又はその家族等に対し、当該患者の状態に合わせた必要な薬学的管理及び指導を行った場合に算定する。ただし、乳幼児加算を併算定することはできない。", "label": "５. 小児特定加算"}, {"id": "s55", "category": "薬学管理料", "kubun": "区分１５ 在宅患者訪問薬剤管理指導料", "title": "６ 在宅中心静脈栄養法加算", "body": "６ 在宅中心静脈栄養法加算\n(１) 在宅中心静脈栄養法加算は、在宅中心静脈栄養法を行っている患者に係る薬学的管理指導の際に、患家を訪問し、患者の状態、投与環境その他必要な事項等の確認を行った上で、患者又はその家族等に対して保管方法、配合変化防止に係る対応方法等の必要な薬学的管理指導を行い、処方医に対して必要な情報提供を行った場合に算定する。\n(２) 当該患者に対し２種以上の注射薬が同時に投与される場合には、中心静脈栄養法に使用する薬剤の配合変化を回避するために、必要に応じて、処方医以外の医療関係職種に対しても、当該患者が使用する注射剤に係る配合変化に関する留意点、輸液バッグの遮光の必要性等について情報提供する。\n(３) 在宅中心静脈栄養法加算は、在宅患者訪問薬剤管理指導料が算定されていない場合は算定できない。\n(４) 在宅中心静脈栄養法加算を算定するためには、薬剤服用歴等に薬学管理料の通則（４）及び「１５」在宅患者訪問薬剤管理指導料の１の（10）の記載事項に加えて、少なくとも次の事項について記載されていなければならない。\nア 訪問に際して実施した在宅患者中心静脈栄養法に係る薬学的管理指導の内容（輸液製剤の投与状況、保管管理状況、残薬の状況、栄養状態等の状況、輸液製剤による患者の体調の変化（副作用が疑われる症状など）の有無、薬剤の配合変化の有無などの確認等）\nイ 訪問に際して行った患者又はその家族等への指導の要点（輸液製剤に係る服薬指導、適切な保管方法の指導等）\nウ 処方医及び関係する医療関係職種に対して提供した訪問結果、輸液製剤の保管管理に関する情報（輸液製剤の投与状況、栄養状態及び患者の服薬中の体調の変化（副作用が疑われる症状など）等の状況、服薬指導の要点等に関する事項を含む。）の要点", "label": "６. 在宅中心静脈栄養法加算"}, {"id": "s56", "category": "薬学管理料", "kubun": "区分１５ 在宅患者訪問薬剤管理指導料", "title": "７ その他留意点", "body": "７ その他留意点\n(１) 保険薬局（在宅協力薬局を含む。）の所在地と患家の所在地との距離が 16 キロメートルを超える訪問薬剤管理指導については、患家の所在地から 16 キロメートルの圏域の内側に、在宅患者訪問薬剤管理指導を行う旨を届け出ている保険薬局が存在しないなど、当該保険薬局からの訪問薬剤管理指導を必要とする特殊な事情がある場合に認められるものであって、この場合の在宅患者訪問薬剤管理指導料の算定については 16 キロメートル以内の場合と同様に算定する。特殊な事情もなく、特に患家の希望により 16キロメートルを超えて訪問薬剤管理指導を行った場合の在宅患者訪問薬剤管理指導料は保険診療としては認められないことから、患者負担とする。この場合において、「保険薬局の所在地と患家の所在地との距離が 16 キロメートルを超えた場合」とは、患家を中心とする半径 16 キロメートルの圏域の外側に当該保険薬局が所在する場合をいう。ただし、平成 24 年３月 31 日以前に「注１」に規定する医師の指示があった患者については、当該規定は適用しないものであること。\n(２) 「注８」に規定する交通費は実費とする。", "label": "７. その他留意点"}, {"id": "s57", "category": "薬学管理料", "kubun": "区分１５の２ 在宅患者緊急訪問薬剤管理指導料",
