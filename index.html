 "title": "区分１５の２ 在宅患者緊急訪問薬剤管理指導料", "body": "(１) 在宅患者緊急訪問薬剤管理指導料は、訪問薬剤管理指導を実施している保険薬局の保険薬剤師が、在宅での療養を行っている患者であって通院が困難なものの状態の変化等に伴い、当該患者の在宅療養を担う保険医療機関の保険医又は当該保険医療機関と連携する他の保険医療機関の保険医（以下この項で単に「保険医」という。）の求めにより、当該患者に係る計画的な訪問薬剤管理指導とは別に、予め定めた訪問の計画以外で患家を訪問して必要な薬学的管理指導を行い、当該保険医に対して訪問結果について必要な情報提供を文書で行った場合に、在宅患者緊急訪問薬剤管理指導料１及び２並びに服薬管理指導料「４のハ」を合わせて月４回に限り算定する。\n(２) （１）の規定にかかわらず、末期の悪性腫瘍の患者又は注射による麻薬の投与が必要な患者に対して、在宅患者緊急訪問薬剤管理指導料に係る業務を実施する場合は、１と２及び服薬管理指導料「４のハ」を合わせて原則として月８回まで算定できる。ただし、特に医療上の必要がある場合であって、保険医の発行した処方箋に基づくときに限り、月８回を超えて算定することができる。ただし、この場合にあっては、保険医からの指示内容、訪問が必要になった患者の容態等について、必要な薬学的分析を実施し、薬剤服用歴等に記載した上で、当該訪問が必要であった理由を調剤報酬明細書の摘要欄に簡潔に記載すること。\n(３) 在宅患者緊急訪問薬剤管理指導料１は、当該患者に係る計画的な訪問薬剤管理指導の対象疾患の変化等に関して、保険医の求めにより、予め定めた訪問の計画以外で患家を訪問して必要な薬学的管理指導を行い、訪問結果について当該保険医に必要な情報提供を文書で行った場合に算定する。\n(４) 在宅患者緊急訪問薬剤管理指導料２は、当該患者に係る計画的な訪問薬剤管理指導の対象となっていない疾患の変化等に関して、保険医の求めにより、予め定めた訪問の計画以外で患家を訪問して必要な薬学的管理指導を行い、訪問結果について当該保険医に必要な情報提供を文書で行った場合に算定する。\n(５) （３）及び（４）については、情報通信機器を用いて療養上必要な薬学的管理指導を行った場合は、服薬管理指導料「４のハ」を算定すること。この場合において、在宅患者緊急訪問薬剤管理指導料は算定できない。\n(６) （３）から（５）までについては、在宅療養を担う保険医療機関の保険医と連携する他の保険医の求めにより、予め定めた訪問の計画以外で患家を訪問して必要な薬学的管理指導を行った場合は、当該保険医に加え、当該患者の在宅療養を担う保険医療機関の保険医にも必要な情報提供を文書で行うこと。在宅療養を担う保険医療機関の保険医と連携する他の保険医については、担当医に確認し、薬学的管理指導計画書等に当該医師の氏名と医療機関名を記載すること。\n(７) 「１５」在宅患者訪問薬剤管理指導料の１の（４）に規定する同意を得ている場合において、在宅基幹薬局に代わって在宅協力薬局が緊急訪問薬剤管理指導を行った場合は、在宅患者緊急訪問薬剤管理指導料を算定できる。なお、その場合においては、「１５」在宅患者訪問薬剤管理指導料の１の（４）の取扱いに準ずること。\n(８) 在宅患者緊急訪問薬剤管理指導料を算定するためには、薬剤服用歴等に薬学管理料の通則（４）の記載事項に加えて、少なくとも次の事項について記載されていなければならない。\nア 訪問の実施日、訪問した保険薬剤師の氏名\nイ 当該患者の在宅療養を担う保険医療機関の保険医又は当該保険医と連携する他の保険医から予め定めた訪問の計画以外の要請があった日付及び当該要請の内容並びに当該要請に基づき訪問薬剤管理指導を実施した旨\nウ 訪問に際して実施した薬学的管理指導の内容（服薬状況、副作用、相互作用等に関する確認等を含む。）\nエ 保険医に対して提供した訪問結果に関する情報の要点\n(９) 麻薬管理指導加算\nア 麻薬管理指導加算は、麻薬の投薬が行われている患者に対して、投与される麻薬の服用状況、残薬の状況及び保管状況について確認し、残薬の適切な取扱方法も含めた保管取扱い上の注意等に関し必要な指導を行うとともに、麻薬による鎮痛等の効果や患者の服薬中の体調の変化（副作用が疑われる症状など）の有無の確認を行い、当該患者の在宅療養を担う保険医療機関の保険医に対して必要な情報提供を行った場合に算定する。\nイ 麻薬管理指導加算は、在宅患者緊急訪問薬剤管理指導料が算定されていない場合は算定できない。\nウ アの麻薬による鎮痛等の効果や患者の服薬中の体調の変化の有無の確認等に当たっては、「がん疼痛の薬物療法に関するガイドライン」（日本緩和医療学会）、「新版 がん緩和ケアガイドブック」（日本医師会監修 厚生労働科学特別研究事業「適切な緩和ケア提供のための緩和ケアガイドブックの改訂に関する研究」班」）等の緩和ケアに関するガイドラインを参照して実施すること。\nエ 麻薬管理指導加算を算定するためには、薬剤服用歴等に薬学管理料の通則（４）及び「１５の２」在宅患者緊急訪問薬剤管理指導料の（８）の記載事項に加えて、少なくとも次の事項について記載されていなければならない。\n(イ) 訪問に際して実施した麻薬に係る薬学的管理指導の内容（麻薬の保管管理状況、服薬状況、残薬の状況、麻薬注射剤等の併用薬剤、疼痛緩和等の状況、麻薬の継続又は増量投与による患者の服薬中の体調の変化（副作用が疑われる症状など）の有無などの確認等）\n(ロ) 訪問に際して行った患者又はその家族等への指導の要点（麻薬に係る服薬指導、残薬の適切な取扱方法も含めた保管管理の指導等）\n(ハ) 当該患者の在宅療養を担う保険医療機関の保険医に対して提供した訪問結果に関する情報（麻薬の服薬状況、疼痛緩和及び患者の服薬中の体調の変化（副作用が疑われる症状など）等の状況、服薬指導の要点等に関する事項を含む。）の要点\n(ニ) 患者又は家族から返納された麻薬の廃棄に関する事項（都道府県知事に届け出た麻薬廃棄届の写しを薬剤服用歴等に添付することで差し支えない。）\n(10) 在宅患者医療用麻薬持続注射療法加算\nア 在宅患者医療用麻薬持続注射療法加算は、在宅において医療用麻薬持続注射療法を行っている患者又はその家族等に対して、患家を訪問し、麻薬の投与状況、残液の状況及び保管状況について確認し、残液の適切な取扱方法も含めた保管取扱い上の注意等に関し必要な指導を行うとともに、麻薬による鎮痛等の効果や患者の服薬中の体調の変化（副作用が疑われる症状など）の有無を確認し、薬学的管理及び指導を行い、処方医に対して必要な情報提供を行った場合に算定する。\nイ 当該患者が麻薬の投与に使用している高度管理医療機器について、保健衛生上の危害の発生の防止に必要な措置を講ずること。\nウ 必要に応じて、処方医以外の医療関係職種に対しても、麻薬の投与状況、残液の状況、保管状況、残液の適切な取扱方法も含めた保管取扱い上の注意等について情報提供すること。\nエ 在宅患者医療用麻薬持続注射療法加算は、在宅患者緊急訪問薬剤管理指導料が算定されていない場合は算定できない。\nオ 在宅患者医療用麻薬持続注射療法加算を算定するためには、薬剤服用歴等に薬学管理料の通則（４）及び「１５の２」在宅患者緊急訪問薬剤管理指導料の（８）の記載事項に加えて、少なくとも次の事項について記載されていなければならない。\n(イ) 訪問に際して実施した麻薬に係る薬学的管理指導の内容（麻薬の保管管理状況、投与状況、残液の状況、併用薬剤、疼痛緩和等の状況、麻薬の継続又は増量投与による患者の服薬中の体調の変化（副作用が疑われる症状など）の有無などの確認等）\n(ロ) 訪問に際して行った患者又はその家族等への指導の要点（麻薬に係る服薬指導、残液の適切な取扱方法も含めた保管管理の指導等）\n(ハ) 処方医に対して提供した訪問結果に関する情報（麻薬の投与状況、疼痛緩和及び患者の服薬中の体調の変化（副作用が疑われる症状など）等の状況、服薬指導の要点等に関する事項を含む。）の要点\n(ニ) 患者又はその家族等から返納された麻薬の廃棄に関する事項（都道府県知事に届け出た麻薬廃棄届の写しを薬剤服用歴等に添付することで差し支えない。）\nカ 在宅患者医療用麻薬持続注射療法加算については、麻薬管理指導加算を算定している患者については算定できない。\n(11) 乳幼児加算は、乳幼児に係る薬学的管理指導の際に、体重、適切な剤形その他必要な事項等の確認を行った上で、患者の家族等に対して適切な服薬方法、誤飲防止等の必要な服薬指導を行った場合に算定する。\n(12) 小児特定加算は、児童福祉法第 56 条の６第２項に規定する障害児である 18 歳未満の患者に係る薬学的管理指導の際に、服薬状況等を確認した上で、患家を訪問し、患者又はその家族等に対し、当該患者の状態に合わせた必要な薬学的管理及び指導を行った場合に算定する。ただし、乳幼児加算を併算定することはできない。\n(13) 在宅中心静脈栄養法加算\nア 在宅中心静脈栄養法加算は、在宅中心静脈栄養法を行っている患者に係る薬学的管理指導の際に、患者の状態、投与環境その他必要な事項等の確認を行った上で、患家を訪問し、患者又はその家族等に対して保管方法、配合変化防止に係る対応方法等の必要な薬学的管理指導を行い、処方医に対して必要な情報提供を行った場合に算定する。\nイ 当該患者に対し２種以上の注射薬が同時に投与される場合には、中心静脈栄養法に使用する薬剤の配合変化を回避するために、必要に応じて、処方医以外の医療関係職種に対しても、当該患者が使用する注射剤に係る配合変化に関する留意点、輸液バッグの遮光の必要性等について情報提供する。\nウ 在宅中心静脈栄養法加算は、在宅患者緊急訪問薬剤管理指導料が算定されていない場合は算定できない。\nエ 在宅中心静脈栄養法加算を算定するためには、薬剤服用歴等に薬学管理料の通則（４）及び「１５の２」在宅患者緊急訪問薬剤管理指導料の（８）の記載事項に加えて、少なくとも次の事項について記載されていなければならない。\n(イ) 訪問に際して実施した在宅患者中心静脈栄養法に係る薬学的管理指導の内容（輸液製剤の投与状況、保管管理状況、残薬の状況、栄養状態等の状況、輸液製剤による患者の服薬中の体調の変化（副作用が疑われる症状など）の有無、薬剤の配合変化の有無などの確認等）\n(ロ) 訪問に際して行った患者又はその家族等への指導の要点（輸液製剤に係る服薬指導、適切な保管方法の指導等）\n(ハ) 処方医及び関係する医療関係職種に対して提供した訪問結果、輸液製剤の保管管理に関する情報（輸液製剤の投与状況、栄養状態及び患者の服薬中の体調の変化（副作用が疑われる症状など）等の状況、服薬指導の要点等に関する事項を含む。）の要点\n(14) 保険薬局（在宅協力薬局を含む。）の所在地と患家の所在地との距離が 16 キロメートルを超える訪問薬剤管理指導については、患家の所在地から 16 キロメートルの圏域の内側に、在宅患者訪問薬剤管理指導を行う旨を届け出ている保険薬局が存在しないなど、当該保険薬局からの訪問薬剤管理指導を必要とする特殊な事情がある場合に認められるものであって、この場合の在宅患者緊急訪問薬剤管理指導料の算定については 16 キロメートル以内の場合と同様に算定する。特殊な事情もなく、特に患家の希望により 16 キロメートルを超えて訪問薬剤管理指導を行った場合の在宅患者緊急訪問薬剤管理指導料は保険診療としては認められないことから、患者負担とする。この場合において、「保険薬局の所在地と患家の所在地との距離が 16 キロメートルを超えた場合」とは、患家を中心とする半径 16 キロメートルの圏域の外側に当該保険薬局が所在する場合をいう。ただし、平成 24 年３月 31 日以前に在宅患者訪問薬剤管理指導料の「注１」に規定する医師の指示があった患者については、当該規定は適用しないものであること。\n(15) 「注８」に規定する交通費は実費とする。\n(16) 夜間訪問加算、休日訪問加算及び深夜訪問加算\nア 夜間訪問加算、休日訪問加算及び深夜訪問加算は、末期の悪性腫瘍の患者及び注射による麻薬の投与が必要な患者に対して、保険医の求めにより、以下に掲げる夜間、休日又は深夜時間帯に、保険薬局の保険薬剤師が、予め定めた訪問の計画以外で患家を訪問して必要な薬学的管理及び指導を行った場合に算定する。ただし、当該夜間、休日又は深夜に、常態として開局している保険薬局は除く。\n(イ) 夜間訪問加算の対象となる時間帯は、午前８時前と午後６時以降であって深夜を除く時間帯とする。ただし、休日訪問加算に該当する休日の場合は、休日訪問加算により算定する。(ロ） 休日訪問加算の対象となる休日とは、日曜日及び国民の祝日に関する法律第３条に規定する休日をいう。なお、１月２日、３日、12 月 29 日、30 日及び 31 日は休日として取り扱う。ただし、深夜に該当する場合は深夜訪問加算により算定する。\n(ハ) 深夜訪問加算の対象となる時間帯は、深夜（午後 10 時から午前６時までの間）とする。\nイ 訪問時間については、保険医から日時指定の指示のある場合を除き、処方箋の受付時間又は保険医の指示より直ちに患家を訪問して薬学的管理及び指導を行った場合に限るものであること。\nウ 夜間訪問加算、休日訪問加算又は深夜訪問加算を算定する患者については、処方箋の受付時間（又は保険医から指示を受けた時間）及び患家を訪問した時間について、当該患者の薬剤服用歴等に記載すること。\nエ 「１５」在宅患者訪問薬剤管理指導料の１の（４）に規定する同意を得ている場合において、在宅基幹薬局に代わって在宅協力薬局が当該夜間、休日又は深夜時間帯に緊急訪問薬剤管理指導を行った場合（ただし、当該夜間、休日又は深夜に、常態として開局している場合は除く。）は、夜間訪問加算、休日訪問加算又は深夜訪問加算を算定できる。なお、その場合においては、「１５」在宅患者訪問薬剤管理指導料の１の（４）の取扱いに準ずること。\nオ 夜間訪問加算、休日訪問加算又は深夜訪問加算を算定する保険薬局は、開局時間及び当該加算の費用について、患者又はその家族等に対して説明すること。\n(17) 「注 10」については、患家又は宿泊施設若しくは入所中の施設を保険薬剤師が予め定めた訪問の計画以外で訪問し、当該患者又はその家族等（現にその看護に当たっている者及び当該患者の薬剤を管理している当該施設の職員を含む。）に対して、必要な薬学的管理及び指導を実施し、薬剤を交付した場合に「注１」に規定する計画的な訪問薬剤管理指導の実施の有無によらず算定できる。また、この場合において、服薬管理指導料は、別に算定できない。\n(18) 在宅患者緊急訪問薬剤管理指導料は、特別調剤基本料Ｂを算定している保険薬局は算定できない。", "label": "区分１５の２ 在宅患者緊急訪問薬剤管理指導料"}, {"id": "s58", "category": "薬学管理料", "kubun": "区分１５の３ 在宅患者緊急時等共同指導料", "title": "区分１５の３ 在宅患者緊急時等共同指導料", "body": "(１) 在宅患者緊急時等共同指導料は、在宅での療養を行っている患者の状態の変化や診療方針の変更等の際、当該患者に対する診療等を行う医療関係職種等（居宅介護支援事業者の介護支援専門員を含む。当該区分において以下同じ。）が一堂に会す等によりカンファレンスを行うことで、より適切な治療方針を立てることが可能となるとともに、カンファレンスの参加者の間で診療方針の変更等の情報を的確に共有することができ、患者及び家族が安心して療養生活を送ることに資することから、そのような取組を評価するものである。\n(２) 在宅患者緊急時等共同指導料は、訪問薬剤管理指導を実施している保険薬局の保険薬剤師が、在宅での療養を行っている患者であって通院が困難なものの病状の変化や、診療方針の大幅な変更等の必要が生じたことに伴い、当該患者の在宅療養を担う保険医療機関の保険医又は当該保険医療機関と連携する他の保険医療機関の保険医の求めにより、関係する医療関係職種等と共同でカンファレンスを行うとともに、共有した当該患者の診療情報及び当該カンファレンスの結果を踏まえ、計画的な訪問薬剤管理指導の内容に加えて、患家を訪問した上で患者に対し療養上必要な薬学的管理指導を行った場合に、月２回に限り算定する。なお、当該カンファレンスを行った日と異なる日に当該薬学的管理指導を行った場合でも算定できるが、当該カンファレンスを行った日以降速やかに薬学的管理指導を行うものであること。また、カンファレンス及びそれに基づく薬学的管理指導１回につき１回に限り算定する。\n(３) （１）及び（２）については、在宅療養を担う保険医療機関の保険医と連携する他の保険医の求めにより、患家を訪問して必要な薬学的管理指導を行った場合は、当該保険医に加え、当該患者の在宅療養を担う保険医療機関の保険医にも必要な情報提供を文書で行うこと。また、在宅療養を担う保険医療機関の保険医と連携する他の保険医については、担当医に確認し、薬学的管理指導計画書等に当該医師の氏名と医療機関名を記載すること。\n(４) 当該カンファレンスは、保険薬局の保険薬剤師が、ビデオ通話が可能な機器を用いて参加することができる。ただし、当該患者に対する診療等を行う医療関係職種等の１者以上は、患家に赴きカンファレンスを行っていること。\n(５) （４）において、患者の個人情報を当該ビデオ通話の画面上で共有する際は、患者の同意を得ていること。また、保険医療機関の電子カルテなどを含む医療情報システムと共通のネットワーク上の端末においてカンファレンスを実施する場合には、厚生労働省「医療情報システムの安全管理に関するガイドライン」に対応していること。\n(６) 在宅患者緊急時等共同指導料を算定するためには、薬剤服用歴等に薬学管理料の通則（４）の記載事項に加えて、少なくとも次の事項について記載されていなければならない。\nア カンファレンス及び薬学的管理指導の実施日、薬学的管理指導を行った保険薬剤師の氏名並びにカンファレンスに参加した医療関係職種等の氏名\nイ 当該患者の在宅療養を担う保険医療機関の保険医又は当該保険医と連携する他の保険医から要請があって患家を訪問し、他の医療関係職種等と共同してカンファレンスを行い、その結果を踏まえて薬学的管理指導を実施した旨及びその理由\nウ カンファレンスの要点及びカンファレンスの結果を踏まえて実施した薬学的管理指導の内容（服薬状況、副作用、相互作用等に関する確認等を含む。）\nエ 保険医に対して提供した訪問結果に関する情報の要点\n(７) 在宅患者緊急時等共同指導料を算定する場合は、在宅患者訪問薬剤管理指導料は別に算定できない。また、情報通信機器を用いて療養上必要な薬学的管理指導を行った場合は、服薬管理指導料「４のハ」を算定し、在宅患者緊急時等共同指導料は算定できない。\n(８) 在宅患者緊急時等共同指導料は、特別調剤基本料Ｂを算定している保険薬局は算定できない。\n(９) 麻薬管理指導加算\nア 麻薬管理指導加算は、麻薬の投薬が行われている患者に対して、投与される麻薬の服用状況、残薬の状況及び保管状況について確認し、残薬の適切な取扱方法も含めた保管取扱い上の注意等に関し必要な指導を行うとともに、麻薬による鎮痛等の効果や患者の服薬中の体調の変化（副作用が疑われる症状など）の有無の確認を行い、必要な薬学的管理指導を行った場合に算定する。\nイ 麻薬管理指導加算は、在宅患者緊急時等共同指導料が算定されていない場合は算定できない。\nウ アの麻薬による鎮痛等の効果や患者の服薬中の体調の変化の有無の確認等に当たっては、「がん疼痛の薬物療法に関するガイドライン」（日本緩和医療学会）、「新版 がん緩和ケアガイドブック」（日本医師会監修 厚生労働科学特別研究事業「適切な緩和ケア提供のための緩和ケアガイドブックの改訂に関する研究」班」）等の緩和ケアに関するガイドラインを参照して実施すること。\nエ 麻薬管理指導加算を算定するためには、薬剤服用歴等に薬学管理料の通則（４）及び「１５の３」在宅患者緊急時等共同指導料の（６）の記載事項に加えて、少なくとも次の事項について記載されていなければならない。\n(イ) 訪問に際して実施した麻薬に係る薬学的管理指導の内容（麻薬の保管管理状況、服薬状況、残薬の状況、麻薬注射剤等の併用薬剤、疼痛緩和等の状況、麻薬の継続又は増量投与による患者の服薬中の体調の変化（副作用が疑われる症状など）の有無などの確認等）\n(ロ) 訪問に際して行った患者又はその家族等への指導の要点（麻薬に係る服薬指導、残薬の適切な取扱方法も含めた保管管理の指導等）\n(ハ) 当該患者の在宅療養を担う保険医療機関の保険医に対して提供した訪問結果に関する情報（麻薬の服薬状況、疼痛緩和及び患者の服薬中の体調の変化（副作用が疑われる症状など）等の状況、服薬指導の要点等に関する事項を含む。）の要点\n(ニ) 患者又は家族から返納された麻薬の廃棄に関する事項（都道府県知事に届け出た麻薬廃棄届の写しを薬剤服用歴等に添付することで差し支えない。）\n(10) 在宅患者医療用麻薬持続注射療法加算\nア 在宅患者医療用麻薬持続注射療法加算は、在宅において医療用麻薬持続注射療法を行っている患者又はその家族等に対して、患家を訪問し、麻薬の投与状況、残液の状況及び保管状況について確認し、残液の適切な取扱方法も含めた保管取扱い上の注意等に関し必要な指導を行うとともに、麻薬による鎮痛等の効果や患者の服薬中の体調の変化（副作用が疑われる症状など）の有無を確認し、薬学的管理及び指導を行い、処方医に対して必要な情報提供を行った場合に算定する。\nイ 当該患者が麻薬の投与に使用している高度管理医療機器について、保健衛生上の危害の発生の防止に必要な措置を講ずること。\nウ 必要に応じて、処方医以外の医療関係職種に対しても、麻薬の投与状況、残液の状況、保管状況、残液の適切な取扱方法も含めた保管取扱い上の注意等について情報提供すること。\nエ 在宅患者医療用麻薬持続注射療法加算は、在宅患者緊急時等共同指導料が算定されていない場合は算定できない。\nオ 在宅患者医療用麻薬持続注射療法加算を算定するためには、薬剤服用歴等に薬学管理料の通則（４）及び「１５の３」在宅患者緊急時等共同指導料の（６）の記載事項に加えて、少なくとも次の事項について記載されていなければならない。\n(イ) 訪問に際して実施した麻薬に係る薬学的管理指導の内容（麻薬の保管管理状況、投与状況、残液の状況、併用薬剤、疼痛緩和等の状況、麻薬の継続又は増量投与による患者の服薬中の体調の変化（副作用が疑われる症状など）の有無などの確認等）\n(ロ) 訪問に際して行った患者又はその家族等への指導の要点（麻薬に係る服薬指導、残液の適切な取扱方法も含めた保管管理の指導等）\n(ハ) 処方医に対して提供した訪問結果に関する情報（麻薬の投与状況、疼痛緩和及び患者の服薬中の体調の変化（副作用が疑われる症状など）等の状況、服薬指導の要点等に関する事項を含む。）の要点\n(ニ) 患者又はその家族等から返納された麻薬の廃棄に関する事項（都道府県知事に届け出た麻薬廃棄届の写しを薬剤服用歴等に添付することで差し支えない。）\nカ 在宅患者医療用麻薬持続注射療法加算については、麻薬管理指導加算を算定している患者については算定できない。\n(11) 乳幼児加算は、乳幼児に係る薬学的管理指導の際に、体重、適切な剤形その他必要な事項等の確認を行った上で、患者の家族等に対して適切な服薬方法、誤飲防止等の必要な服薬指導を行った場合に算定する。\n(12) 小児特定加算は、児童福祉法第 56 条の６第２項に規定する障害児である 18 歳未満の患者に係る薬学的管理指導の際に、服薬状況等を確認した上で、患家を訪問し、患者又はその家族等に対し、当該患者の状態に合わせた必要な薬学的管理及び指導を行った場合に算定する。また、乳幼児加算を併算定することはできない。\n(13) 在宅中心静脈栄養法加算\nア 在宅中心静脈栄養法加算は、在宅中心静脈栄養法を行っている患者に係る薬学的管理指導の際に、患者の状態、投与環境その他必要な事項等の確認を行った上で、患家を訪問し、患者又はその家族等に対して保管方法、配合変化防止に係る対応方法等の必要な薬学的管理指導を行い、処方医に対して必要な情報提供を行った場合に算定する。\nイ 当該患者に対し２種以上の注射薬が同時に投与される場合には、中心静脈栄養法に使用する薬剤の配合変化を回避するために、必要に応じて、処方医以外の医療関係職種に対しても、当該患者が使用する注射剤に係る配合変化に関する留意点、輸液バッグの遮光の必要性等について情報提供する。\nウ 在宅中心静脈栄養法加算は、在宅患者緊急時等共同指導料が算定されていない場合は算定できない。\nエ 在宅中心静脈栄養法加算を算定するためには、薬剤服用歴等に薬学管理料の通則（４）及び「１５の３」在宅患者緊急時等共同指導料の（６）の記載事項に加えて、少なくとも次の事項について記載されていなければならない。\n(イ) 訪問に際して実施した在宅患者中心静脈栄養法に係る薬学的管理指導の内容（輸液製剤の投与状況、保管管理状況、残薬の状況、栄養状態等の状況、輸液製剤による患者の服薬中の体調の変化（副作用が疑われる症状など）の有無、薬剤の配合変化の有無などの確認等）\n(ロ) 訪問に際して行った患者又はその家族等への指導の要点（輸液製剤に係る服薬指導、適切な保管方法の指導等）\n(ハ) 処方医及び関係する医療関係職種に対して提供した訪問結果、輸液製剤の保管管理に関する情報（輸液製剤の投与状況、栄養状態及び患者の服薬中の体調の変化（副作用が疑われる症状など）等の状況、服薬指導の要点等に関する事項を含む。）の要点\n(14) 保険薬局の所在地と患家の所在地との距離が 16 キロメートルを超える訪問薬剤管理指導については、患家の所在地から 16 キロメートルの圏域の内側に、在宅患者訪問薬剤管理指導を行う旨を届け出ている保険薬局が存在しないなど、当該保険薬局からの訪問薬剤管理指導を必要とする特殊な事情がある場合に認められるものであって、この場合の在宅患者緊急時等共同指導料の算定については 16 キロメートル以内の場合と同様に算定する。特殊な事情もなく、特に患家の希望により 16 キロメートルを超えて療養上必要な指導を行った場合の在宅患者緊急時等共同指導料は保険診療としては認められないことから、患者負担とする。この場合において、「保険薬局の所在地と患家の所在地との距離が 16 キロメートルを超えた場合」とは、患家を中心とする半径 16 キロメートルの圏域の外側に当該保険薬局が所在する場合をいう。ただし、平成 24 年３月 31 日以前に在宅患者訪問薬剤管理指導料の「注１」に規定する医師の指示があった患者については、当該規定は適用しないものであること。", "label": "区分１５の３ 在宅患者緊急時等共同指導料"}, {"id": "s59", "category": "薬学管理料", "kubun": "区分１５の４ 退院時共同指導料", "title": "区分１５の４ 退院時共同指導料", "body": "(１) 退院時共同指導料は、保険医療機関に入院中の患者について、当該患者の退院後の訪問薬剤管理指導を担う保険薬局として当該患者が指定する保険薬局の保険薬剤師が、原則として当該患者が入院している保険医療機関（以下「入院保険医療機関」という。）に赴いて、患者の同意を得て、退院後の在宅での療養上必要な薬剤に関する説明及び指導を、入院保険医療機関の保険医又は看護師等、薬剤師、管理栄養師、理学療法士、作業療法士、言語聴覚士若しくは社会福祉士と共同して行った上で、文書により情報提供した場合に、当該入院中１回（別に厚生労働大臣が定める疾病等の患者については２回）に限り算定できる。なお、ここでいう入院とは、医科点数表の第１章第２部通則５に定める入院期間が通算される入院のことをいう。\n(２) 退院時共同指導料の共同指導は、保険薬局の薬剤師が、ビデオ通話が可能な機器を用いて共同指導した場合でも算定可能である。\n(３) （２）において、患者の個人情報を当該ビデオ通話の画面上で共有する際は、患者の同意を得ていること。また、保険医療機関の電子カルテなどを含む医療情報システムと共通のネットワーク上の端末においてカンファレンスを実施する場合には、厚生労働省「医療情報システムの安全管理に関するガイドライン」に対応していること。\n(４) 退院時共同指導料は、患者の家族等、退院後に患者の看護を担当する者に対して指導を行った場合にも算定できる。\n(５) 退院時共同指導料を算定する場合は、当該患者の薬剤服用歴等に、入院保険医療機関において当該患者に対して行った服薬指導等の要点を記載する。また、患者又はその家族等に提供した文書の写しを薬剤服用歴等に添付する。\n(６) 退院時共同指導料は、退院後在宅での療養を行う患者が算定の対象となり、他の保険医療機関、社会福祉施設、介護老人保健施設、介護老人福祉施設に入院若しくは入所する患者又は死亡退院した患者については、対象とはならない。\n(７) 退院時共同指導料は、特別調剤基本料Ｂを算定している保険薬局は算定できない。", "label": "区分１５の４ 退院時共同指導料"}, {"id": "s60", "category": "薬学管理料", "kubun": "区分１５の５ 服薬情報等提供料", "title": "区分１５の５ 服薬情報等提供料", "body": "(１) 服薬情報等提供料は、保険薬局において調剤後も患者の服用薬や服薬状況に関する情報等を把握し、保険医療機関に当該情報を提供することにより、医師の処方設計及び患者の服薬の継続又は中断の判断の参考とする等、保険医療機関と保険薬局の連携の下で医薬品の適正使用を推進することを目的とするものである。\n(２) 服薬情報等提供料１は、保険医療機関から（５）のアからウに掲げる情報提供の求めがあった場合にその理由とともに、患者の同意を得て、現に患者が受診している保険医療機関に対して、当該患者の服薬状況等について文書等により提供した場合に算定できる。これには、次に掲げる場合が含まれる。なお、残薬に係る情報提供に関しては、単に確認された残薬の状況を記載するだけではなく、その後の残薬が生じないために必要な内容を併せて記載すべきであり、情報提供後の当該患者の服薬状況を継続して把握しておくこと。\nア 処方箋を発行した保険医療機関が患者の服用薬の残薬の報告を求めており、保険薬局において患者の服用薬の残薬を確認し、残薬が生じている場合はその理由を薬学的に分析した上で当該保険医療機関に対して情報提供を行った場合\nイ 調剤基本料の「注 11」に掲げる医師の指示による分割調剤及びリフィル処方箋による調剤において、２回目以降の調剤時に患者の服薬状況、服薬期間中の体調の変化等について確認し、処方医に対して情報提供を行った場合この場合において、次に掲げる事項を含めるものとする。\n・残薬の有無\n・残薬が生じている場合はその量及び理由\n・副作用の有無\n・副作用が生じている場合はその原因の可能性がある薬剤の推定\nウ 保険医療機関からの求めに応じ、入院前の患者の服用薬について確認し、依頼元の医療機関に情報提供した場合\n(３) 服薬情報等提供料２は、保険薬剤師が患者の服薬状況等について薬学的な分析に基づき患者の薬学的管理に必要な情報を文書により以下のとおり情報提供した場合に算定できる。なお、残薬に係る情報提供に関しては、単に確認された残薬の状況を記載するだけではなく、その後の残薬が生じないために必要な内容を併せて記載するとともに、情報提供後の当該患者の服薬状況を継続して把握しておくこと。\nア 服薬情報等提供料「２のイ」保険薬局の保険薬剤師が薬剤服用歴等に基づき患者の服薬に関する（５）のアからエまでに掲げる情報提供の必要性を認めた場合であって、患者の同意を得て、現に患者が受診している保険医療機関に対して、当該患者の服薬状況等について文書等により提供した場合。これには、保険薬局において患者の服用薬の残薬、副作用の発現状況等を確認し、処方箋を発行した保険医療機関に対して情報提供を行った場合、現に歯科医療機関を受診している患者について、当該歯科医療機関に対して他の医療機関の処方に基づく当該患者の服用薬、服薬状況等の情報提供を行った場合が含まれる。\nイ 服薬情報等提供料「２のロ」保険薬局の保険薬剤師がリフィル処方箋に基づく調剤後、処方医に対して当該患者の服薬状況等について文書等により提供した場合。\nウ 服薬情報等提供料「２のハ」保険薬局の保険薬剤師が薬剤服用歴等に基づき患者の服薬に関する（５）のアからエまでに掲げる情報提供の必要性を認め、介護支援専門員が関与する要介護又は要支援認定を受けた患者で、居宅療養管理指導を同一月に算定していない場合において、患者の同意を得て、当該患者の介護支援専門員に対して、患者の服薬状況等を踏まえた薬学的な分析に基づき、特に必要な情報を文書等により提供した場合。なお、この場合において、介護支援専門員からの情報提供の求めがあった場合においても保険薬局の保険薬剤師が情報提供の必要性を認めたうえで要件を満たせば算定することができる。\n(４) 服薬情報等提供料３は、以下の場合に算定できる。\nア 入院を予定している患者について、保険医療機関の求めがあった場合において、患者が服用中の薬剤について、当該患者若しくはその家族等への聞き取り又は他の保険薬局若しくは保険医療機関への聞き取り等により、一元的に把握し、必要に応じて当該患者が保険薬局に持参した服用薬の整理を行うとともに、患者が入院を予定している保険医療機関に対して、当該患者の服薬状況等について文書等により提供した場合に算定できる。\nイ 保険医療機関の求めについては、患者が入院を予定している保険医療機関からの求めのほか、患者が受診している他の保険医療機関からの求めを含む。\nウ 患者の服用薬等については、当該保険薬局で調剤した薬剤、他の保険薬局で調剤された薬剤、保険医療機関で院内投薬された薬剤等を一元的に把握すること。\nエ 算定に当たっては、別紙様式１－２又はこれに準ずるものを用いて、以下の内容について保険医療機関への情報提供を行うこと。\n・受診中の保険医療機関、診療科等に関する情報\n・服用中の薬剤の一覧\n・患者の服薬状況\n・併用薬剤等の情報\n(５) 保険医療機関に対する情報提供の内容は次のとおりとする。\nア 当該患者の服用薬及び服薬状況\nイ 当該患者に対する服薬指導の要点\nウ 服薬期間中の患者の状態の変化等、自覚症状がある場合はその原因の可能性がある薬剤の推定\nエ 当該患者が容易に又は継続的に服用できるための技術工夫等の調剤情報\n(６) 服薬期間中の体調の変化等の患者の訴えや自覚症状がある場合には、患者の自覚症状が薬剤の副作用によるものか否かに関する分析結果を踏まえて服薬指導し、当該分析及び指導の要点を情報提供することとし、また、患者に対する服薬指導は、当該分析結果を踏まえたものとする。なお、患者の自覚症状の分析に当たっては、「重篤副作用疾患別対応マニュアル」（厚生労働省）等を参考とすることが望ましい。\n(７) （５）のエについては、処方箋の記入上の疑義照会等では算定できない。\n(８) 保険医療機関への情報提供については、次の場合に算定する。\nア 患者１人につき同一月に２回以上服薬情報等の提供を行った場合においても、月１回のみの算定とする。\nイ 複数の保険医療機関の医師又は歯科医師に対して服薬情報等の提供を行った場合は、当該保険医療機関の医師又は歯科医師ごとに月１回に限り算定できる。\nウ 処方箋を発行していない保険医療機関の医師又は歯科医師に対して服薬情報等の提供を行った場合は、必要に応じて処方箋を発行した医療機関の医師又は歯科医師に対して同様の服薬情報等を提供すること。この場合においては、当該保険医療機関の医師又は歯科医師ごとに月１回に限り算定できる。\n(９) 介護支援専門員に対して服薬情報等を提供し服薬情報等提供料２を算定した場合であって、処方箋を発行した保険医療機関の医師又は歯科医師に対しても同様の服薬情報等の提供を行った場合においては、服薬情報等提供料２を別に算定できる。ただし、情報提供の内容については、（10）に示すように相手方に応じたものとすること。\n(10) 保険医療機関への情報提供に当たっては、別紙様式１－１、別紙様式１－２又はこれに準ずる様式の文書等に必要事項を記載し、患者が現に診療を受けている保険医療機関に交付すること。介護支援専門員への情報提供に当たっては、「多職種連携推進のための在宅患者訪問薬剤管理指導ガイド」（令和４年度・令和５年度厚生労働科学研究費補助金 長寿科学政策研究事業 薬学的視点を踏まえた自立支援・重度化防止推進のための研究）等を参照されたい。また、介護支援専門員への情報提供については、「多職種連携推進のための在宅患者訪問薬剤管理指導ガイド」別添の報告書様式及び薬学的評価シートを参考に当該患者の生活様式を踏まえた薬学的分析を行うとともに、情報提供の際には介護支援専門員が理解しやすい表現で実施すること。\n(11) 服薬情報等提供料は、特別調剤基本料Ａを算定している保険薬局において、当該保険薬局と不動産取引等その他特別な関係を有している保険医療機関へ情報提供を行った場合は算定できない。また、在宅患者訪問薬剤管理指導料を算定している患者に係る情報提供を行った場合は算定できない。\n(12) 服薬情報等提供料は、特別調剤基本料Ｂを算定している保険薬局は算定できない。", "label": "区分１５の５ 服薬情報等提供料"}, {"id": "s61", "category": "薬学管理料", "kubun": "区分１５の７ 経管投薬支援料", "title": "区分１５の７ 経管投薬支援料", "body": "(１) 経管投薬支援料は、胃瘻若しくは腸瘻による経管投薬又は経鼻経管投薬を行っている患者に対して、簡易懸濁法による薬剤の服用に関して必要な支援を行った場合に算定する。\n(２) 当該加算に係る服薬支援は、以下の場合に患者の同意を得て行うものであること。\nア 保険医療機関からの求めがあった場合\nイ 家族等の求めがあった場合等、服薬支援の必要性が認められる場合であって、医師の了解を得たとき\n(３) 「簡易懸濁法」とは、錠剤の粉砕やカプセルの開封等を行わず、経管投薬の前に薬剤を崩壊及び懸濁させ、投薬する方法のことをいう。\n(４) 「必要な支援」とは主に次に掲げる内容をいう。\nア 簡易懸濁法に適した薬剤の選択の支援\nイ 患者の家族又は介助者が簡易懸濁法により経管投薬を行うために必要な指導\nウ 必要に応じて保険医療機関への患者の服薬状況及びその患者の家族等の理解度に係る情報提供\n(５) 患者１人につき複数回の支援を行った場合においても、１回のみの算定とする。\n(６) 患者の服薬状況等を保険医療機関に情報提供した場合であって所定の要件を満たすときは、服薬情報等提供料１、２又は３を算定できる。\n(７) 経管投薬支援料は、特別調剤基本料Ｂを算定している保険薬局は算定できない。", "label": "区分１５の７ 経管投薬支援料"}, {"id": "s62", "category": "薬学管理料", "kubun": "区分１５の８ 在宅移行初期管理料", "title": "区分１５の８ 在宅移行初期管理料", "body": "(１) 在宅移行初期管理料は、在宅での療養に移行する予定の服薬管理に係る支援が必要な患者に対して、計画的な訪問薬剤管理指導を実施する前に、保険薬剤師が患家を訪問して、当該患者の在宅療養を担う保険医療機関等の多職種と連携しながら、退院時の処方内容を踏まえた薬剤の調整、残薬の整理、適切な服薬方法の提案等の必要な薬学的管理及び指導を行うことを評価するものである。\n(２) 在宅移行初期管理料は、以下のア及びイを満たす患者のうち、薬学的管理の観点から保険薬剤師が患家を訪問して特に重点的な服薬支援の行う必要性があると判断したものを対象とする。\nア 認知症患者、精神障害者である患者など自己による服薬管理が困難な患者、児童福祉法第 56 条の６第２項に規定する障害児である 18 歳未満の患者、６歳未満の乳幼児、末期のがん患者又は注射による麻薬の投与が必要な患者。\nイ 在宅患者訪問薬剤管理指導料（単一建物診療患者が１人の場合に限る。）、居宅療養管理指導費及び介護予防居宅療養管理指導費（いずれも保険薬局の保険薬剤師が行う場合に限り、単一建物居住者が１人の場合に限る。）に係る医師の指示のある患者。\n(３) （２）のイの場合においては、「１５」在宅患者訪問薬剤管理指導料の１の（２）及び（12）に規定する単一建物診療患者の取扱いに準ずること。\n(４) 必要な薬学的管理及び指導として、薬物療法に係る円滑な在宅療養への移行及び在宅療養の継続の観点から、以下に掲げる業務を実施すること。\nア 患者及びその家族等から、服薬状況、居住環境、家族関係等の薬学的管理に必要な情報を収集すること。\nイ 患家における残薬の確認及び整理並びに服薬管理方法の検討及び調整を行うこと。\nウ 日常の服薬管理を適切に行うことができるよう、ポリファーマシーへの対応や服用回数を減らすための観点も踏まえ、必要に応じて医師等と使用する薬剤の内容を調整すること。\nエ 在宅での療養に必要な情報を当該患者の在宅療養を担う保険医療機関等の多職種と共有すること。\nオ 退院直後の患者の場合は、入院していた医療機関と連携し、入院中の処方内容に関する情報や、患者の退院に際して実施された指導の内容などに関する情報提供文書を活用した服薬支援を実施することが望ましい。\n(５) 実施した薬学的管理及び指導の内容等について薬剤服用歴等に記載し、必要に応じて、薬学的管理指導計画書を作成・見直しすること。また、当該患者の在宅療養を担う保険医療機関の医師及び居宅介護支援事業者の介護支援専門員に対して必要な情報提供を文書で行うこと。なお、この場合の文書での情報提供については、服薬情報等提供料を別途算定できない。\n(６) 在宅移行初期管理料は、計画的な訪問薬剤管理指導を実施する前であって別の日に患家を訪問して（４）に掲げる業務を実施した場合に算定する。なお、この場合に実施した服薬管理の支援等については、外来服薬支援料１を別途算定できない。\n(７) 在宅移行初期管理料は、当該患者において在宅患者訪問薬剤管理指導料（単一建物診療患者が１人の場合に限る。）、居宅療養管理指導費及び介護予防居宅療養管理指導費（いずれも保険薬局の保険薬剤師が行う場合に限り、単一建物居住者が１人の場合に限る。）を初めて算定する月又はその前月に在宅移行に係る初期管理を実施した場合に、当該初回算定月に１回に限り算定する。\n(８) 在宅移行初期管理料に係る業務について、「１５」在宅患者訪問薬剤管理指導料の１の（４）に規定する在宅協力薬局が実施した場合は算定できない。\n(９) （６）に掲げる訪問を実施した日付について、調剤報酬明細書の摘要欄に記載すること。\n(10) 「注２」に規定する交通費は実費とする。\n(11) かかりつけ薬剤師訪問加算を算定している場合については、算定できない。\n(12) 在宅移行初期管理料は、特別調剤基本料Ｂを算定している保険薬局は算定できない。", "label": "区分１５の８ 在宅移行初期管理料"}, {"id": "s63", "category": "薬学管理料", "kubun": "区分１５の９ 訪問薬剤管理医師同時指導料", "title": "区分１５の９ 訪問薬剤管理医師同時指導料", "body": "(１) 訪問薬剤管理医師同時指導料は、在宅での療養を行っている患者であって通院が困難なものに対し、当該患者又はその家族等の同意を得て、当該患者に対して在宅患者訪問薬剤管理指導又は居宅療養管理指導を実施している保険薬剤師が、訪問診療を実施している保険医療機関の保険医と同時に患家を訪問し、薬学的管理指導を行った場合に、６月に１回に限り算定する。\n(２) 算定対象となる患者は、以下のいずれかに該当するものとする。\nア 在宅患者訪問薬剤管理指導料を算定している患者（単一建物診療患者が１人の場合に限る。）\nイ 在宅患者緊急訪問薬剤管理指導料を算定している患者（単一建物診療患者が１人の場合に限る。）\nウ 居宅療養管理指導費（薬局の薬剤師が行う場合に限り、単一建物居住者が１人の場合に限る。）を算定している患者\nエ 介護予防居宅療養管理指導費（薬局の薬剤師が行う場合に限り、単一建物居住者が１人の場合に限る。）を算定している患者\n(３) 同時に訪問を行う「訪問診療を実施している保険医療機関の保険医」は、所属する保険医療機関において在宅時医学総合管理料を算定し、当該患家の患者の主治医であることとする。\n(４) 在宅患者緊急時等共同指導料又は在宅移行初期管理料に係る必要な指導等を同日に行った場合は、算定できない。\n(５) 訪問薬剤管理医師同時指導料は、特別調剤基本料Ｂを算定している保険薬局は算定できない。", "label": "区分１５の９ 訪問薬剤管理医師同時指導料"}, {"id": "s64", "category": "薬学管理料", "kubun": "区分１５の１０ 複数名薬剤管理指導訪問料", "title": "区分１５の１０ 複数名薬剤管理指導訪問料", "body": "(１) 複数名薬剤管理指導訪問料は、在宅での療養を行っている患者であって通院が困難なもののうち、処方医が複数名訪問の必要性があると認めるものに対し、当該患者又はその家族等に同意を得て、当該患者の訪問薬剤管理指導を実施している保険薬局の保険薬剤師が、当該保険薬局又は在宅協力薬局に勤務する職員（薬剤師以外の者を含む。）とともに複数名で患家を訪問し、薬学的管理指導を行った場合に算定する。\n(２) 算定対象となる患者は、以下のいずれかに該当するものとする。\nア 在宅患者訪問薬剤管理指導料を算定している患者（単一建物診療患者が１人の場合に限る。）\nイ 在宅患者緊急訪問薬剤管理指導料を算定している患者（単一建物診療患者が１人の場合に限る。）\nウ 居宅療養管理指導費（薬局の薬剤師が行う場合に限り、単一建物居住者が１人の場合に限る。）を算定している患者\nエ 介護予防居宅療養管理指導費（薬局の薬剤師が行う場合に限り、単一建物居住者が１人の場合に限る。）を算定している患者\n(３) 複数名薬剤管理指導訪問料の留意点\nア 保険薬局の保険薬剤師が、当該薬剤師以外の職員とともに複数名による訪問を行い、複数名薬剤管理指導訪問料を算定するに当たっては、複数名訪問が必要であると処方医が認めていることについて、当該処方医が処方箋の備考欄にて示していること等が確認できること。\nイ 複数名訪問が必要であると処方医が認めている理由について、当該患者の薬剤服用歴等に記載すること。\nウ 「複数名訪問の必要性」については、保険薬局の保険薬剤師が訪問薬剤管理指導を行うに当たっての利便性に基づく理由によるものではなく、患者が興奮又は攻撃性を示すこと等により、保険薬剤師単独での訪問では当該指導の実施が担保できないおそれがある場合など、当該指導の安全かつ確実な実施を確保する観点から判断されるものであること。\n(４) 在宅患者緊急時等共同指導料、在宅移行初期管理料又は訪問薬剤管理医師同時指導料に係る必要な指導等を同日に行った場合は、算定できない。\n(５) 複数名薬剤管理指導訪問料は、特別調剤基本料Ｂを算定している保険薬局は算定できない。", "label": "区分１５の１０ 複数名薬剤管理指導訪問料"}, {"id": "s65", "category": "薬剤料", "kubun": "区分２０ 使用薬剤料", "title": "区分２０ 使用薬剤料", "body": "(１) 投薬時における薬剤の容器を交付する場合は、その実費を徴収できる。なお、患者に直接投薬する目的で製品化されている薬剤入りチューブ及び薬剤入り使い捨て容器のように再使用できない薬剤の容器については、患者に容器代金を負担させることはできない。\n(２) 保険薬局が患者に喘息治療剤の施用のため小型吸入器及び鼻腔・口腔内治療剤の施用のため噴霧・吸入用器具（散粉器）を交付した場合は、患者にその実費を負担させて差し支えないが、患者が当該吸入器を返還した場合は当該実費を返還する。\n(３) 患者が保険薬局より薬剤の交付を受け、持ち帰りの途中又は自宅において薬品を紛失したため（天災地変その他やむを得ない場合を除く。）再交付された処方箋に基づいて、保険薬局が調剤した場合は、当該薬剤の費用は、患者の負担とする。\n(４) 内服用液剤を投与する際には常水（水道水、自然水）を使用するが、特に蒸留水を使用しなければならない理由があれば使用して差し支えない。\n(５) 薬包紙、薬袋の費用は、別に徴収又は請求することはできない。\n(６) 「注２」の多剤投与の場合の算定\nア 「注２」の算定は、特別調剤基本料Ａ及び特別調剤基本料Ｂを算定する保険薬局に限り、１回の処方箋受付のうち、内服薬（内服用滴剤を含む。以下、（イ）及び（ホ）について同じ。）についてのみ対象とする。この場合の「種類」については、次のように計算する。\n(イ) 内服薬の種類に屯服薬は含めない。\n(ロ) 錠剤、カプセル剤については、１銘柄ごとに１種類と計算する。\n(ハ) 散剤、顆粒剤、液剤、浸煎薬及び湯薬については、１銘柄ごとに１種類と計算する。\n(ニ) (ハ)の薬剤を混合して服薬できるよう調剤を行ったものについては、１種類とする。\n(ホ) 複数の診療科を標榜する同一保険医療機関における異なる診療科の複数の保険医が発行する処方箋を同時に受け付けた場合は、内服薬の「種類」については、それぞれの処方箋の内服薬の「種類」を合計して計算する。\nイ 「注２」の「所定点数」とは、１回の処方箋受付のうち、所定単位（内服薬（浸煎薬及び湯薬を除く。以下同じ。）にあっては１剤１日分、湯薬にあっては内服薬に準じ１調剤ごとに１日分、内服用滴剤、浸煎薬にあっては１調剤分）ごとの内服薬の薬剤料（単位薬剤料に調剤数量を乗じて得た点数）をいう。", "label": "区分２０ 使用薬剤料"}, {"id": "s66", "category": "特定保険医療材料料", "kubun": "区分３０ 特定保険医療材料", "title": "区分３０ 特定保険医療材料", "body": "(１) 保険薬局で交付できる特定保険医療材料とは、別表２に掲げるものとし、次に該当する器材については算定できない。\nア 別表３に掲げる薬剤の自己注射以外の目的で患者が使用する注射器\nイ 在宅医療以外の目的で患者が使用する「特定保険医療材料及びその材料価格（材料価格基準）」（平成 20 年厚生労働省告示第 61 号）の別表のⅠに規定されている特定保険医療材料\n(２) 特定保険医療材料の定義については、「特定保険医療材料の定義について」（令和８年３月５日保医発 0305 第４号）を参照すること。", "label": "区分３０ 特定保険医療材料"}, {"id": "s67", "category": "その他", "kubun": "区分４０ 調剤ベースアップ評価料", "title": "区分４０ 調剤ベースアップ評価料", <script>
const SECTIONS = JSON.parse(document.getElementById('sectiondata').textContent);

const CHAPTERS = ["通則","調剤技術料","薬学管理料","薬剤料","特定保険医療材料料","その他"];
const CHAPTER_SHORT = {
  "通則":"通則",
  "調剤技術料":"調剤技術料",
  "薬学管理料":"薬学管理料",
  "薬剤料":"薬剤料",
  "特定保険医療材料料":"特材料",
  "その他":"その他"
};

let currentChapter = "ALL";
let currentQuery = "";
let currentDetailId = null;

const contentEl = document.getElementById('content');
const searchbox = document.getElementById('searchbox');
const searchmeta = document.getElementById('searchmeta');
const clearbtn = document.getElementById('clearbtn');
const tabsEl = document.getElementById('tabs');

// ---------- Build tabs ----------
function buildTabs(){
  let html = '<button class="tab-btn all" data-ch="ALL">全体</button>';
  for(const ch of CHAPTERS){
    html += `<button class="tab-btn" data-ch="${ch}">${CHAPTER_SHORT[ch]}</button>`;
  }
  tabsEl.innerHTML = html;
  tabsEl.querySelectorAll('.tab-btn').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      currentChapter = btn.dataset.ch;
      currentDetailId = null;
      updateTabsActive();
      render();
    });
  });
  updateTabsActive();
}
function updateTabsActive(){
  tabsEl.querySelectorAll('.tab-btn').forEach(b=>{
    b.classList.toggle('active', b.dataset.ch === currentChapter);
  });
}

// ---------- Search utilities ----------
function normalize(s){
  // full-width space -> half-width, trim, and normalize full-width alphanumerics to half-width
  let out = s.replace(/\u3000/g,' ').trim();
  out = out.replace(/[Ａ-Ｚａ-ｚ０-９]/g, ch => String.fromCharCode(ch.charCodeAt(0) - 0xFEE0));
  return out;
}
function escapeHtml(s){
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function escapeRegex(s){
  return s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
}
function countOccurrences(text, term){
  if(!term) return 0;
  let count = 0, idx = 0;
  while(true){
    idx = text.indexOf(term, idx);
    if(idx === -1) break;
    count++;
    idx += term.length;
  }
  return count;
}
function highlight(text, terms, strong){
  if(!terms.length) return escapeHtml(text);
  const esc = escapeHtml(text);
  // build alternation regex sorted by length desc to avoid partial overshadow
  const sorted = [...terms].sort((a,b)=>b.length-a.length).map(t=>escapeRegex(escapeHtml(t)));
  const re = new RegExp('(' + sorted.join('|') + ')', 'gi');
  return esc.replace(re, m => `<mark${strong? ' class="strong"':''}>${m}</mark>`);
}
function makeSnippet(body, terms, radius){
  radius = radius || 60;
  if(!terms.length) return body.slice(0, 140) + (body.length>140?'…':'');
  let bestIdx = -1;
  for(const t of terms){
    const idx = body.indexOf(t);
    if(idx !== -1 && (bestIdx === -1 || idx < bestIdx)) bestIdx = idx;
  }
  if(bestIdx === -1) return body.slice(0,140) + (body.length>140?'…':'');
  const start = Math.max(0, bestIdx - radius);
  const end = Math.min(body.length, bestIdx + radius*2);
  let snippet = (start>0?'…':'') + body.slice(start,end) + (end<body.length?'…':'');
  return snippet;
}

function searchSections(query){
  const q = normalize(query);
  if(!q) return null;
  const terms = q.split(/\s+/).filter(Boolean);
  let results = [];
  for(const s of SECTIONS){
    const normBody = normalize(s.body);
    const normLabelKubun = normalize(s.label + '\n' + s.kubun);
    let scoreAnd = 0, matchedAll = true, totalHits = 0;
    for(const t of terms){
      const bodyHits = countOccurrences(normBody, t);
      const labelHits = countOccurrences(normLabelKubun, t);
      const hits = bodyHits + labelHits;
      if(hits === 0){ matchedAll = false; }
      totalHits += hits;
      scoreAnd += bodyHits * 1 + labelHits * 6;
    }
    if(totalHits > 0){
      results.push({ s, score: scoreAnd, matchedAll, totalHits });
    }
  }
  const andResults = results.filter(r=>r.matchedAll);
  const useResults = andResults.length ? andResults : results;
  useResults.sort((a,b)=> b.score - a.score);
  return { terms, list: useResults, isPartial: andResults.length===0 && results.length>0 };
}

// ---------- Rendering ----------
function render(){
  if(currentDetailId){
    renderDetail(currentDetailId);
    return;
  }
  if(currentQuery.trim()){
    renderSearchResults();
  } else {
    renderBrowse();
  }
}

function renderBrowse(){
  searchmeta.textContent = '';
  let chaptersToShow = currentChapter === 'ALL' ? CHAPTERS : [currentChapter];
  let html = '';
  for(const ch of chaptersToShow){
    const secsInChapter = SECTIONS.filter(s=>s.category===ch);
    if(!secsInChapter.length) continue;
    // group by kubun preserving order
    const kubunOrder = [];
    const byKubun = {};
    for(const s of secsInChapter){
      if(!(s.kubun in byKubun)){ byKubun[s.kubun]=[]; kubunOrder.push(s.kubun); }
      byKubun[s.kubun].push(s);
    }
    html += `<div class="chapter-block"><div class="chapter-heading">${escapeHtml(ch)}</div>`;
    for(const kubun of kubunOrder){
      const items = byKubun[kubun];
      const kubunId = 'k_' + items[0].id;
      html += `<div class="kubun-group">
        <div class="kubun-title" data-target="${kubunId}">
          <span>${escapeHtml(kubun)}</span><span class="chev">▶</span>
        </div>
        <div class="kubun-items" id="${kubunId}">`;
      for(const it of items){
        // skip rendering the redundant top item whose title equals kubun (whole-block sections) without a real sub-label
        html += `<div class="item" data-id="${it.id}">
          <div class="label">${escapeHtml(it.label)}</div>
        </div>`;
      }
      html += `</div></div>`;
    }
    html += `</div>`;
  }
  if(!html){
    html = `<div class="empty-note"><span class="big">該当する項目がありません</span></div>`;
  }
  contentEl.innerHTML = html;

  contentEl.querySelectorAll('.kubun-title').forEach(el=>{
    el.addEventListener('click', ()=>{
      el.classList.toggle('open');
      document.getElementById(el.dataset.target).classList.toggle('open');
    });
  });
  contentEl.querySelectorAll('.item').forEach(el=>{
    el.addEventListener('click', (e)=>{
      e.stopPropagation();
      currentDetailId = el.dataset.id;
      render();
      window.scrollTo(0,0);
    });
  });
}

function renderSearchResults(){
  const result = searchSections(currentQuery);
  if(!result || !result.list.length){
    searchmeta.innerHTML = `一致する項目が見つかりませんでした`;
    contentEl.innerHTML = `<div class="empty-note"><span class="big">検索結果がありません</span>キーワードを変えてお試しください（例：麻薬管理指導加算 / 特定薬剤管理指導加算 / 分割調剤 / 服薬情報等提供料 など）</div>`;
    return;
  }
  const list = currentChapter==='ALL' ? result.list : result.list.filter(r=>r.s.category===currentChapter);
  searchmeta.innerHTML = `<b>${list.length}件</b> ヒットしました${result.isPartial? '（すべての語を含む項目はありません。一部一致で表示しています）':''}`;
  if(!list.length){
    contentEl.innerHTML = `<div class="empty-note"><span class="big">このタブでは該当なし</span>「全体」タブで確認してください</div>`;
    return;
  }
  let html = `<div class="results-header">「${escapeHtml(currentQuery)}」の検索結果</div>`;
  for(const r of list.slice(0,80)){
    const s = r.s;
    const snippet = makeSnippet(s.body, result.terms);
    html += `<div class="result-card" data-id="${s.id}">
      <div class="result-crumb">${escapeHtml(s.category)} ｜ ${escapeHtml(s.kubun)}</div>
      <div class="result-label">${highlight(s.label, result.terms)}</div>
      <div class="result-snippet">${highlight(snippet, result.terms)}</div>
    </div>`;
  }
  contentEl.innerHTML = html;
  contentEl.querySelectorAll('.result-card').forEach(el=>{
    el.addEventListener('click', ()=>{
      currentDetailId = el.dataset.id;
      render();
      window.scrollTo(0,0);
    });
  });
}

function renderDetail(id){
  const s = SECTIONS.find(x=>x.id===id);
  if(!s){ currentDetailId=null; render(); return; }
  const terms = currentQuery.trim() ? searchSections(currentQuery).terms : [];
  searchmeta.textContent = '';
  const body = terms.length ? highlight(s.body, terms, true) : escapeHtml(s.body);
  contentEl.innerHTML = `
    <button class="back-btn" id="backbtn">← 一覧に戻る</button>
    <div class="detail-card">
      <div class="detail-crumb">${escapeHtml(s.category)} ｜ ${escapeHtml(s.kubun)}</div>
      <div class="detail-label">${escapeHtml(s.label)}</div>
      <div class="detail-body">${body}</div>
    </div>
  `;
  document.getElementById('backbtn').addEventListener('click', ()=>{
    currentDetailId = null;
    render();
  });
}

// ---------- Events ----------
let debounceTimer;
searchbox.addEventListener('input', ()=>{
  clearbtn.style.display = searchbox.value ? 'block' : 'none';
  clearTimeout(debounceTimer);
  debounceTimer = setTimeout(()=>{
    currentQuery = searchbox.value;
    currentDetailId = null;
    render();
  }, 120);
});
clearbtn.addEventListener('click', ()=>{
  searchbox.value='';
  currentQuery='';
  clearbtn.style.display='none';
  currentDetailId=null;
  render();
  searchbox.focus();
});

buildTabs();
render();
</script>
</body>
</html>
